<!DOCTYPE html>
<html>
<head>
  <title>NM Auctions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1b2b;
      color: #111;
    }

    .header {
      background: #0b1b2b;
      text-align: center;
      padding: 20px 10px;
    }

    .logo {
      width: 220px;
    }

    .container {
      background: #f3f4f6;
      min-height: 100vh;
      padding: 20px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 16px;
      font-weight: bold;
      color: #1f2937;
    }

    .card-desc {
      font-size: 13px;
      color: #6b7280;
      margin-top: 5px;
    }

    .logout {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #ef4444;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <div class="title">
    Internal Operations
  </div>

  <div class="grid">

    <div class="card" onclick="goTo('initial-visit')">
      <div class="card-title">🏠 Initial Visit</div>
      <div class="card-desc">Capture items at consigners home</div>
    </div>

    <div class="card" onclick="goTo('dropoff')">
      <div class="card-title">🚚 Drop Off</div>
      <div class="card-desc">Receive items into warehouse</div>
    </div>

    <div class="card" onclick="goTo('items')">
      <div class="card-title">📦 Item Library</div>
      <div class="card-desc">View and manage all items</div>
    </div>

    <div class="card" onclick="goTo('workflow')">
      <div class="card-title">🔄 Workflow</div>
      <div class="card-desc">Track processing stages</div>
    </div>

  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

function goTo(page) {
  window.location.href = "/" + page + ".html";
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = "/";
}
</script>

</body>
</html>
