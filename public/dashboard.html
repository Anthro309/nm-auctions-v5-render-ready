<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="notification" class="notification"></div>

<div class="container">

  <div class="grid">

    <div class="button-card" onclick="go('/initial-visit.html')">
      <div class="button-title">Initial Visit</div>
      <div class="button-sub">Capture consignments on-site</div>
    </div>

    <div class="button-card" onclick="go('/dropoff.html')">
      <div class="button-title">Received at Studio</div>
      <div class="button-sub">Scan and confirm intake</div>
    </div>

    <div class="button-card" onclick="go('/items.html')">
      <div class="button-title">Item Library</div>
      <div class="button-sub">View all consigners</div>
    </div>

    <div class="button-card" onclick="go('/reports.html')">
      <div class="button-title">Daily Reports</div>
      <div class="button-sub">Close out and print</div>
    </div>

  </div>

</div>

<script>
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function go(p){
  window.location.href = p;
}

/* 🔔 HANDOFF NOTIFICATION SYSTEM */
function showNotification(text){
  const n = document.getElementById("notification");
  n.innerText = text;
  n.style.display = "block";

  setTimeout(()=>{
    n.style.display = "none";
  },3000);
}

/* Example trigger (you’ll call this after handoffs) */
setTimeout(()=>{
  showNotification("New items ready for review");
},2000);
</script>

</body>
</html>
