<!DOCTYPE html>
<html>
<head>
  <title>NM Auctions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    .wrapper {
      max-width: 900px;
      margin: auto;
      padding: 30px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      background: #1f2937;
    }

    .primary {
      border: 2px solid #3b82f6;
    }

    .logout {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      background: #ef4444;
      border: none;
      border-radius: 8px;
      color: white;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <h1>NM Auctions</h1>
  <p id="welcome"></p>

  <div class="grid">

    <div class="card primary" onclick="goTo('initial-visit')">
      🏠 Initial Visit
    </div>

    <div class="card" onclick="goTo('dropoff')">
      🚚 Drop Off (Receive Items)
    </div>

    <div class="card" onclick="goTo('items')">
      📦 Item Library
    </div>

    <div class="card" onclick="goTo('workflow')">
      🔄 Workflow
    </div>

  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

document.getElementById('welcome').innerText =
  "Welcome " + user.name;

function goTo(page) {
  window.location.href = "/" + page + ".html";
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = "/";
}
</script>

</body>
</html>
