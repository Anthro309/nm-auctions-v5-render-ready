<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center"><img src="/logo.png"></div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card" onclick="go('/initial-visit.html')">
    <div class="title">Initial Visit</div>
  </div>

  <div class="card" onclick="go('/dropoff.html')">
    <div class="title">Received at Studio</div>
  </div>

  <div class="card" onclick="go('/items.html')">
    <div class="title">Item Library</div>
  </div>

  <div class="card" onclick="go('/reports.html')">
    <div class="title">Reports</div>
  </div>

</div>

<script>
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function go(p){
  window.location.href = p;
}
</script>

</body>
</html>
