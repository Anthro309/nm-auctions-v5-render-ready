<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NM Auctions | Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1b2b;
      color: white;
    }

    .header {
      background: #0f2a3d;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .logout {
      font-size: 14px;
      cursor: pointer;
      color: #ccc;
    }

    .container {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: #132a3a;
      padding: 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.15s;
    }

    .card:hover {
      background: #173a52;
    }

    .card-title {
      font-size: 20px;
      font-weight: bold;
    }

    .card-sub {
      margin-top: 6px;
      color: #a8b7c7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title" onclick="goHome()">Auction Legacy</div>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="container">

    <div class="card" onclick="goInitialVisit()">
      <div class="card-title">Initial Visit</div>
      <div class="card-sub">Capture consignments and print labels</div>
    </div>

    <div class="card" onclick="goScanner()">
      <div class="card-title">Scanner</div>
      <div class="card-sub">Scan items and move through workflow</div>
    </div>

    <div class="card" onclick="goItems()">
      <div class="card-title">Item Library</div>
      <div class="card-sub">Browse all items</div>
    </div>

    <div class="card" onclick="goReports()">
      <div class="card-title">Reports</div>
      <div class="card-sub">View daily reports</div>
    </div>

  </div>

  <script>
    function goHome() {
      window.location.href = "/dashboard.html";
    }

    function goInitialVisit() {
      window.location.href = "/initial-visit.html";
    }

    function goScanner() {
      window.location.href = "/scanner.html";
    }

    function goItems() {
      window.location.href = "/items.html";
    }

    function goReports() {
      window.location.href = "/reports.html";
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "/";
    }
  </script>

</body>
</html>
