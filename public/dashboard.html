<!DOCTYPE html>
<html>
<head>
  <title>NM Auctions</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .wrapper {
      max-width: 900px;
      margin: auto;
      padding: 30px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      color: #9ca3af;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .card {
      background: #1f2937;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
    }
