<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left">☰</div>
  <div class="nav-center">Initial Visit</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div class="container">

  <!-- CONSIGNER -->
  <div class="card">
    <h2>Start Visit</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button onclick="startVisit()">Start</button>

    <div id="codeDisplay" style="margin-top:10px;font-weight:bold;"></div>
  </div>

  <!-- ADD ITEM -->
  <div class="card">
    <h2>Add Item</h2>

    <input id="itemName" placeholder="Item Name">
    <input type="file" id="photoInput" accept="image/*" capture="environment">

    <button onclick="addItem()">Add Item</button>
  </div>

  <!-- ITEMS -->
  <div class="card">
    <h2>Items</h2>
    <div id="items"></div>
  </div>

  <!-- PRINT SHEET -->
  <div class="card">
    <button onclick="printSheet()" style="background:#16a34a;">
      🖨️ Print Label Sheet
    </button>
  </div>

</div>

<script>
let consignerCode = null;
let consignerName = "";

// =========================
// START VISIT
// =========================
function startVisit(){
  const f = first.value.trim().toUpperCase();
  const l = last.value.trim().toUpperCase();

  if(!f || !l) return alert("Enter names");

  consignerCode = f.slice(0,3) + l.slice(0,3);
  consignerName = f + " " + l;

  codeDisplay.innerText = "Consigner Code: " + consignerCode;
}

// =========================
// ADD ITEM
// =========================
async function addItem(){
  if(!consignerCode) return alert("Start visit first");

  const name = itemName.value;

  let photoPath = null;

  if(photoInput.files[0]){
    const form = new FormData();
    form.append("photo", photoInput.files[0]);

    const upload = await fetch('/upload', {
      method:'POST',
      body: form
    });

    const data = await upload.json();
    photoPath = data.path;
  }

  const itemsRes = await fetch('/items');
  const items = await itemsRes.json();

  const count = items.filter(i => i.code === consignerCode).length + 1;

  await fetch('/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      consigner: consignerName,
      code: consignerCode,
      number: count,
      photos: photoPath ? [photoPath] : []
    })
  });

  itemName.value = "";
  photoInput.value = "";

  loadItems();
}

// =========================
// LOAD ITEMS
// =========================
async function loadItems(){
  if(!consignerCode) return;

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i => i.code === consignerCode);

  items.innerHTML = "";

  list.forEach(i=>{
    const div = document.createElement("div");
    div.innerHTML = `${i.code}-${i.number} • ${i.name}`;
    items.appendChild(div);
  });
}

// =========================
// PRINT FULL SHEET
// =========================
async function printSheet(){
  if(!consignerCode) return alert("Start visit first");

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i => i.code === consignerCode);

  const win = window.open('', '', 'width=800,height=1000');

  win.document.write(`
    <html>
    <head>
      <style>
        body { font-family: Arial; padding: 10px; }

        .sheet {
          display: grid;
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .label {
          display: flex;
          align-items: center;
          border: 1px solid #ddd;
          border-radius: 10px;
          padding: 8px;
          height: 90px;
        }

        .qr {
          width: 70px;
          height: 70px;
          margin-right: 10px;
        }

        .text {
          font-size: 12px;
        }

        canvas {
          width: 70px !important;
          height: 70px !important;
        }
      </style>
    </head>

    <body>

      <div class="sheet" id="sheet"></div>

      <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>

      <script>
        const items = ${JSON.stringify(list)};
        const sheet = document.getElementById("sheet");

        items.forEach(i=>{
          const div = document.createElement("div");
          div.className = "label";

          div.innerHTML = \`
            <div class="qr"><canvas></canvas></div>
            <div class="text">
              <div><b>\${i.name.slice(0,40)}</b></div>
              <div>\${i.code}-\${i.number}</div>
            </div>
          \`;

          sheet.appendChild(div);

          QRCode.toCanvas(
            div.querySelector("canvas"),
            i.code + "-" + i.number,
            { width: 70 }
          );
        });

        window.print();
      <\/script>

    </body>
    </html>
  `);

  win.document.close();
}

// =========================
// NAV
// =========================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
