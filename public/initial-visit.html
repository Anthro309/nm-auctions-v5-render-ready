<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0b1b2b;
  color: white;
  padding: 20px;
}

.card {
  background: #132a3a;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.label {
  background: white;
  color: black;
  display: flex;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
}

.label-text {
  padding-left: 10px;
}
</style>
</head>

<body>

<h2 onclick="goHome()" style="cursor:pointer;">Auction Legacy</h2>

<div class="card">
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button type="button" onclick="start()">Start</button>
  <p id="code"></p>
</div>

<div class="card">
  <input id="title" placeholder="Item Name">
  <input type="file" id="photo">
  <button type="button" onclick="addItem()">Add Item + Print Label</button>
</div>

<div id="labels"></div>

<script>
let consignerCode = "";
let user = JSON.parse(localStorage.getItem("user") || "{}");

function start() {
  const first = document.getElementById("first").value.trim();
  const last = document.getElementById("last").value.trim();

  if (!first || !last) {
    alert("Enter name");
    return;
  }

  consignerCode = (first.slice(0,3) + last.slice(0,3)).toUpperCase();
  document.getElementById("code").innerText = "Consigner Code: " + consignerCode;
}

async function addItem() {
  const title = document.getElementById("title").value.trim();
  const file = document.getElementById("photo").files[0];

  if (!title) {
    alert("Enter item name");
    return;
  }

  let photoPath = null;

  if (file) {
    const formData = new FormData();
    formData.append("photo", file);

    const uploadRes = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const uploadData = await uploadRes.json();
    photoPath = uploadData.path;
  }

  const lotRes = await fetch("/next-lot-code");
  const lotData = await lotRes.json();
  const lotCode = lotData.lotCode;

  const item = {
    title,
    consignerFirstName: "",
    consignerLastName: "",
    consignerCode,
    lotCode,
    itemNumber: 1,
    partCount: 1,
    createdBy: user.name || "system",
    createdAt: new Date().toISOString(),
    photo: photoPath
  };

  const res = await fetch("/addItems", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ items:[item] })
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.message || "Error");
    return;
  }

  renderLabel(item);

  setTimeout(() => window.print(), 400);
}

function renderLabel(item) {
  const id = Date.now();

  document.getElementById("labels").innerHTML += `
    <div class="label">
      <canvas id="qr-${id}"></canvas>
      <div class="label-text">
        <strong>${item.title}</strong><br>
        Lot ${item.lotCode}<br>
        ${item.consignerCode}
      </div>
    </div>
  `;

  QRCode.toCanvas(document.getElementById(`qr-${id}`), item.lotCode);
}

function goHome() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
