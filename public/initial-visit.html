<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">

  <style>
    .camera-box {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      border: 2px dashed #d1d5db;
      border-radius: 16px;
      background: #f9fafb;
      cursor: pointer;
      font-size: 18px;
      color: #374151;
      margin-bottom: 12px;
    }

    .camera-box:active {
      transform: scale(0.98);
    }

    .preview {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">☰</div>
  <div class="nav-center">Initial Visit</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div class="container">

  <!-- START -->
  <div class="card">
    <h2>Start Visit</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button onclick="startVisit()">Start</button>

    <div id="codeDisplay" style="margin-top:10px;font-weight:bold;"></div>
  </div>

  <!-- ADD ITEM -->
  <div class="card">
    <h2>Add Item</h2>

    <input id="itemName" placeholder="Item Name">

    <!-- CAMERA BUTTON -->
    <div class="camera-box" onclick="openCamera()">
      📷 Tap to Take Photo
    </div>

    <!-- PREVIEW -->
    <img id="preview" class="preview" style="display:none;">

    <!-- HIDDEN INPUT -->
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

    <button onclick="addItem()">Add</button>
  </div>

  <!-- ITEMS -->
  <div class="card">
    <h2>Items</h2>
    <div id="items"></div>
  </div>

  <!-- PRINT -->
  <div class="card">
    <button onclick="printSheet()" style="background:#16a34a;">
      🖨️ Print Label Sheet
    </button>
  </div>

</div>

<script>
let consignerCode = null;
let consignerName = "";

// =========================
// CAMERA OPEN
// =========================
function openCamera(){
  document.getElementById("photoInput").click();
}

// =========================
// PREVIEW IMAGE
// =========================
photoInput.addEventListener("change", () => {
  const file = photoInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// =========================
// START VISIT
// =========================
function startVisit(){
  const f = first.value.trim().toUpperCase();
  const l = last.value.trim().toUpperCase();

  if(!f || !l) return alert("Enter names");

  consignerCode = f.slice(0,3) + l.slice(0,3);
  consignerName = f + " " + l;

  codeDisplay.innerText = "Consigner Code: " + consignerCode;
}

// =========================
// ADD ITEM
// =========================
async function addItem(){
  if(!consignerCode) return alert("Start visit first");

  const name = itemName.value;
  let photoPath = null;

  if(photoInput.files[0]){
    const form = new FormData();
    form.append("photo", photoInput.files[0]);

    const upload = await fetch('/upload', {
      method:'POST',
      body: form
    });

    const data = await upload.json();
    photoPath = data.path;
  }

  const itemsRes = await fetch('/items');
  const items = await itemsRes.json();

  const count = items.filter(i => i.code === consignerCode).length + 1;

  await fetch('/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      consigner: consignerName,
      code: consignerCode,
      number: count,
      photos: photoPath ? [photoPath] : []
    })
  });

  itemName.value = "";
  photoInput.value = "";
  preview.style.display = "none";

  loadItems();
}

// =========================
// LOAD ITEMS
// =========================
async function loadItems(){
  if(!consignerCode) return;

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i => i.code === consignerCode);

  items.innerHTML = "";

  list.forEach(i=>{
    const div = document.createElement("div");
    div.innerHTML = `${i.code}-${i.number} • ${i.name}`;
    items.appendChild(div);
  });
}

// =========================
// PRINT
// =========================
async function printSheet(){
  if(!consignerCode) return alert("Start visit first");

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i => i.code === consignerCode);

  const win = window.open('', '', 'width=800,height=1000');

  win.document.write(`
    <html>
    <body style="font-family:Arial;padding:10px;">
      <h3>${consignerCode}</h3>
      ${list.map(i=>`<div>${i.name}</div>`).join("")}
      <script>window.print()<\/script>
    </body>
    </html>
  `);

  win.document.close();
}

// =========================
// NAV
// =========================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
