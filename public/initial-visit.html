<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Initial Visit</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    /* KEEPING YOUR EXACT STYLES */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f3f4f6; color: #111827; padding: 20px; }
    .page { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .btn { border: none; border-radius: 12px; padding: 12px 16px; cursor: pointer; }
    .btn-primary { background: #111827; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; }
    .card { background: white; border-radius: 18px; padding: 20px; }
    input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ccc; }
    .item-card { border: 1px solid #ddd; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
    img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; }
  </style>
</head>

<body>
<div class="page">
  <div class="header">
    <h1>Initial Visit</h1>
  </div>

  <div class="grid">
    <div class="card">
      <input id="first" placeholder="First Name">
      <input id="last" placeholder="Last Name">
      <input id="name" placeholder="Item Name">

      <input type="file" id="photo">

      <button class="btn btn-primary" onclick="addItem()">Add Item</button>
    </div>

    <div class="card">
      <div id="items"></div>
    </div>
  </div>
</div>

<script>
let items = [];
let uploadedPhoto = null;

// =====================
// CONSIGNER CODE
// =====================
function codeFromName(first, last) {
  function clean(v) {
    return (v || '').replace(/[^a-z]/gi, '').toUpperCase().slice(0,3).padEnd(3,'-');
  }
  return clean(first) + clean(last);
}

// =====================
// IMAGE UPLOAD (SERVER)
// =====================
document.getElementById('photo').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('photo', file);

  const res = await fetch('/upload', {
    method: 'POST',
    body: formData
  });

  const data = await res.json();

  if (data.success) {
    uploadedPhoto = data.path;
  } else {
    alert('Upload failed');
  }
});

// =====================
// LOAD ITEMS FROM SERVER
// =====================
async function loadItems() {
  const res = await fetch('/items');
  items = await res.json();
  render();
}

// =====================
// ADD ITEM (SERVER)
// =====================
async function addItem() {
  const first = document.getElementById('first').value.trim();
  const last = document.getElementById('last').value.trim();
  const name = document.getElementById('name').value.trim();

  if (!first || !last || !name) {
    alert('Fill all fields');
    return;
  }

  const code = codeFromName(first, last);

  const existing = await fetch('/items').then(r => r.json());
  const number = existing.filter(i => i.code === code).length + 1;

  const res = await fetch('/items', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name,
      consigner: first + " " + last,
      code,
      number,
      photos: uploadedPhoto ? [uploadedPhoto] : [],
      employee: "Fabian"
    })
  });

  const data = await res.json();

  if (data.success) {
    uploadedPhoto = null;
    document.getElementById('name').value = '';
    document.getElementById('photo').value = '';
    loadItems();
  }
}

// =====================
// RENDER
// =====================
function render() {
  const el = document.getElementById('items');
  el.innerHTML = '';

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item-card';

    div.innerHTML = `
      <b>${item.code}-${item.number}</b><br>
      ${item.name}<br>
      ${item.consigner}<br>
      ${item.photos?.[0] ? `<img src="${item.photos[0]}">` : ''}
    `;

    el.appendChild(div);
  });
}

loadItems();
</script>

</body>
</html>
