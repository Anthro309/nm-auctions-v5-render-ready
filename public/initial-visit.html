<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1b2b;
  color: white;
}

/* NAVBAR */
.navbar {
  height: 70px;
  background: #0b1b2b;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  box-sizing: border-box;
}

.nav-left {
  font-size: 26px;
  cursor: pointer;
}

.nav-center {
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}

.nav-right {
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #13283b;
  padding: 20px;
  transition: 0.25s ease;
  z-index: 1000;
  box-sizing: border-box;
}

.sidebar.open {
  left: 0;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 15px 0;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 999;
}

.overlay.show {
  display: block;
}

/* CONTENT */
.container {
  padding: 15px;
}

.card {
  background: #13283b;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-sizing: border-box;
}

input,
textarea,
select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
  font-family: inherit;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  width: 100%;
  font-weight: bold;
  font-family: inherit;
  cursor: pointer;
}

button.secondary {
  background: #16a34a;
}

.hidden {
  display: none;
}

.status {
  background: #081421;
  border: 1px solid rgba(255,255,255,0.08);
  color: #cfe7ff;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  font-size: 14px;
}

.ai-grid {
  display: grid;
  gap: 10px;
}

.label {
  background: white;
  color: black;
  border-radius: 16px;
  display: flex;
  align-items: center;
  padding: 12px;
  gap: 12px;
  margin-bottom: 10px;
}

.qr {
  width: 90px;
  height: 90px;
}

.label-text {
  font-size: 13px;
  line-height: 1.35;
}

.label-name {
  font-weight: bold;
  margin-bottom: 3px;
}

.label-meta {
  color: #333;
  font-size: 12px;
}

/* PRINT */
#printSheet {
  display: none;
}

@media print {
  body * {
    visibility: hidden;
  }

  #printSheet, #printSheet * {
    visibility: visible;
  }

  #printSheet {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: block;
  }

  .sheet {
    display: grid;
    grid-template-columns: repeat(3, 2.625in);
    grid-auto-rows: 1in;
    width: 8.5in;
  }

  .print-label {
    width: 2.625in;
    height: 1in;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    box-sizing: border-box;
    overflow: hidden;
  }

  .print-qr {
    width: 0.7in;
    height: 0.7in;
    flex: 0 0 auto;
  }

  .print-text {
    font-size: 10px;
    line-height: 1.1;
    color: black;
    overflow: hidden;
  }

  .print-text strong {
    display: block;
    margin-bottom: 2px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="goHome()">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <h3>Menu</h3>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/scanner.html">Scanner</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div id="status" class="status">Ready.</div>

  <div class="card">
    <h2>Initial Visit</h2>
    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">
    <button onclick="startVisit()">Start Visit</button>
    <div id="codeDisplay" style="margin-top:10px;font-weight:bold;"></div>
  </div>

  <div id="itemSection" class="card hidden">
    <h2>Add Item</h2>

    <input id="itemName" placeholder="Item Name">

    <textarea id="itemDescription" placeholder="Quick description"></textarea>

    <div class="ai-grid">
      <input id="itemCategory" placeholder="Category">
      <input id="itemCondition" placeholder="Condition">
    </div>

    <input type="file" id="photo" accept="image/*">

    <button onclick="analyzePhoto()">Analyze Photo with AI</button>
    <button onclick="addItem()">Add Item</button>
    <button class="secondary" onclick="endVisit()">End Visit & Print Labels</button>
  </div>

  <div id="labels"></div>
  <div id="printSheet"></div>
</div>

<script>
let session = null;
let items = [];
let currentPhotoPath = null;

function setStatus(message) {
  document.getElementById('status').innerText = message;
}

function goHome() {
  window.location.href = '/dashboard.html';
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function startVisit() {
  const first = document.getElementById('first').value.trim();
  const last = document.getElementById('last').value.trim();

  if (!first || !last) {
    alert('Enter first and last name');
    return;
  }

  session = {
    first,
    last,
    code: (first.slice(0, 3) + last.slice(0, 3)).toUpperCase(),
    date: new Date().toLocaleDateString()
  };

  document.getElementById('codeDisplay').innerText = 'Code: ' + session.code;
  document.getElementById('itemSection').classList.remove('hidden');
  setStatus('Visit started.');
}

async function uploadCurrentPhoto() {
  const file = document.getElementById('photo').files[0];

  if (!file) {
    return null;
  }

  const form = new FormData();
  form.append('photo', file);

  const upload = await fetch('/upload', {
    method: 'POST',
    body: form
  });

  const data = await upload.json();

  if (!data.success) {
    throw new Error(data.message || 'Upload failed');
  }

  return data.path;
}

async function analyzePhoto() {
  if (!session) {
    alert('Start visit first');
    return;
  }

  const file = document.getElementById('photo').files[0];

  if (!file) {
    alert('Choose a photo first');
    return;
  }

  try {
    setStatus('Uploading photo...');
    currentPhotoPath = await uploadCurrentPhoto();

    setStatus('AI is analyzing the item...');
    const ai = await fetch('/analyze-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageUrl: window.location.origin + currentPhotoPath
      })
    });

    const aiData = await ai.json();

    if (!aiData.success) {
      throw new Error(aiData.message || 'AI analysis failed');
    }

    document.getElementById('itemName').value = aiData.title || '';
    document.getElementById('itemDescription').value = aiData.description || '';
    document.getElementById('itemCategory').value = aiData.category || '';
    document.getElementById('itemCondition').value = aiData.condition || '';

    setStatus('AI suggestion loaded. Edit anything you want, then add item.');
  } catch (err) {
    setStatus('AI failed: ' + err.message);
    alert('AI analysis failed: ' + err.message);
  }
}

async function addItem() {
  if (!session) {
    alert('Start visit first');
    return;
  }

  let name = document.getElementById('itemName').value.trim();
  const description = document.getElementById('itemDescription').value.trim();
  const category = document.getElementById('itemCategory').value.trim();
  const condition = document.getElementById('itemCondition').value.trim();

  if (!name) {
    alert('Enter item name');
    return;
  }

  try {
    setStatus('Preparing item...');

    if (!currentPhotoPath && document.getElementById('photo').files[0]) {
      currentPhotoPath = await uploadCurrentPhoto();
    }

    const month = 'ABCDEFGHIJKL'[new Date().getMonth()];
    const lotRes = await fetch(`/next-lot-code?month=${month}`);
    const lotData = await lotRes.json();

    if (!lotData.success || !lotData.lotCode) {
      throw new Error('Could not get lot code');
    }

    const lotCode = lotData.lotCode;

    const res = await fetch('/addItems', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: [
          {
            title: name,
            description,
            category,
            condition,
            consignerFirstName: session.first,
            consignerLastName: session.last,
            consignerCode: session.code,
            lotCode,
            photo: currentPhotoPath,
            createdBy: 'Fabian'
          }
        ]
      })
    });

    const result = await res.json();

    if (!result.success) {
      throw new Error(result.message || 'Error saving item');
    }

    items.push({
      name,
      description,
      category,
      condition,
      lotCode
    });

    document.getElementById('itemName').value = '';
    document.getElementById('itemDescription').value = '';
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemCondition').value = '';
    document.getElementById('photo').value = '';
    currentPhotoPath = null;

    renderLabels();
    setStatus('Item added.');
  } catch (err) {
    setStatus('Add item failed: ' + err.message);
    alert('Add item failed: ' + err.message);
  }
}

function renderLabels() {
  const container = document.getElementById('labels');

  container.innerHTML = items.map(i => `
    <div class="label">
      <canvas id="qr-${i.lotCode}" class="qr"></canvas>
      <div class="label-text">
        <div class="label-name">${i.name}</div>
        <div class="label-meta">Lot ${i.lotCode}</div>
        <div class="label-meta">${session.code}</div>
        ${i.category ? `<div class="label-meta">${i.category}</div>` : ''}
        ${i.condition ? `<div class="label-meta">${i.condition}</div>` : ''}
      </div>
    </div>
  `).join('');

  items.forEach(i => {
    QRCode.toCanvas(
      document.getElementById(`qr-${i.lotCode}`),
      i.lotCode,
      { width: 90, margin: 0 }
    );
  });
}

function endVisit() {
  if (!items.length) {
    alert('No items');
    return;
  }

  const confirmPrint = confirm('Print labels now?');

  if (confirmPrint) {
    buildPrintSheet();
    window.print();
  }

  session = null;
  items = [];
  currentPhotoPath = null;

  document.getElementById('labels').innerHTML = '';
  document.getElementById('printSheet').innerHTML = '';
  document.getElementById('itemSection').classList.add('hidden');
  document.getElementById('first').value = '';
  document.getElementById('last').value = '';
  document.getElementById('itemName').value = '';
  document.getElementById('itemDescription').value = '';
  document.getElementById('itemCategory').value = '';
  document.getElementById('itemCondition').value = '';
  document.getElementById('photo').value = '';
  document.getElementById('codeDisplay').innerText = '';
  setStatus('Visit ended.');
}

function buildPrintSheet() {
  const sheet = document.getElementById('printSheet');

  sheet.innerHTML = `
    <div class="sheet">
      ${items.map(i => `
        <div class="print-label">
          <canvas id="pqr-${i.lotCode}" class="print-qr"></canvas>
          <div class="print-text">
            <strong>${escapeHtml(i.name)}</strong>
            ${escapeHtml(i.lotCode)}<br>
            ${escapeHtml(session.code)}<br>
            ${escapeHtml(session.date)}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  items.forEach(i => {
    QRCode.toCanvas(
      document.getElementById(`pqr-${i.lotCode}`),
      i.lotCode,
      { width: 70, margin: 0 }
    );
  });
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>

</body>
</html>
