<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    .label-sheet {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .label-box {
      border: 1px solid black;
      padding: 6px;
      text-align: center;
      background: white;
      height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .code {
      font-size: 14px;
      font-weight: bold;
    }

    .name {
      font-size: 10px;
    }

    canvas {
      width: 70px !important;
      height: 70px !important;
      margin: auto;
    }

    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-center">Auction Legacy</div>
</div>

<div class="container">

  <div class="card">
    <h2>Initial Visit</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button onclick="startVisit()">Start Visit</button>

    <div id="codeDisplay"></div>
  </div>

  <div id="section" class="card" style="display:none;">

    <h2>Add Item</h2>

    <input id="itemName" placeholder="Item Name">
    <input type="file" id="photoInput" accept="image/*" capture="environment">

    <button onclick="addItem()">Add Item</button>

    <button onclick="printLabels()">Print Labels</button>

    <button onclick="endVisit()" style="background:#16a34a;">
      End Visit + Report
    </button>

    <div id="list" class="grid"></div>

  </div>

  <div id="printArea"></div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

let code = null;
let count = 1;

// START
function startVisit(){
  const f = first.value.trim();
  const l = last.value.trim();

  code = f.substring(0,3).toUpperCase() + l.substring(0,3).toUpperCase();

  codeDisplay.innerText = "Code: " + code;
  section.style.display = "block";

  loadItems();
}

// ADD ITEM
async function addItem(){
  const name = itemName.value;
  const file = photoInput.files[0];

  let photo = "";

  if(file){
    const form = new FormData();
    form.append("photo", file);

    const res = await fetch('/upload',{method:'POST',body:form});
    const data = await res.json();
    photo = data.path;
  }

  await fetch('/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      consigner: first.value + " " + last.value,
      code,
      number: count++,
      photos: photo ? [photo] : [],
      employee: user.name
    })
  });

  loadItems();
}

// LOAD ITEMS
async function loadItems(){
  const res = await fetch('/items');
  const items = await res.json();

  const filtered = items.filter(i => i.code === code);

  list.innerHTML = "";

  filtered.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:10px;">
        <div class="title">${i.name}</div>
      </div>
    `;

    list.appendChild(div);
  });
}

// PRINT LABELS
async function printLabels(){
  const res = await fetch('/items');
  const items = await res.json();

  const filtered = items.filter(i => i.code === code);

  printArea.innerHTML = `<div class="label-sheet" id="sheet"></div>`;
  const sheet = document.getElementById("sheet");

  for(const i of filtered){
    const div = document.createElement("div");
    div.className = "label-box";

    const qrId = "qr" + i.id;

    div.innerHTML = `
      <div class="code">${i.code}-${i.number}</div>
      <canvas id="${qrId}"></canvas>
      <div class="name">${i.name}</div>
    `;

    sheet.appendChild(div);

    await QRCode.toCanvas(
      document.getElementById(qrId),
      `${i.code}-${i.number}`,
      { width: 70 }
    );
  }

  setTimeout(()=> window.print(), 300);
}

// END VISIT + SAVE REPORT
async function endVisit(){
  const res = await fetch('/items');
  const items = await res.json();

  const filtered = items.filter(i => i.code === code);

  // 💾 SAVE REPORT
  await fetch('/intake',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      code,
      consigner: first.value + " " + last.value,
      items: filtered
    })
  });

  // PRINT
  let html = `
    <h2>Consignment Intake</h2>
    <p>${first.value} ${last.value}</p>
    <p>${new Date().toLocaleDateString()}</p>
    <hr>
  `;

  filtered.forEach(i=>{
    html += `<div><b>${i.code}-${i.number}</b> - ${i.name}</div>`;
  });

  printArea.innerHTML = html;

  setTimeout(()=> window.print(), 300);
}
</script>

</body>
</html>
