<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Initial Visit</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1b2b;
  color:white;
  padding:15px;
}

.card {
  background:#13283b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  font-weight:bold;
  background:#2563eb;
  color:white;
}

.green {
  background:#16a34a;
}

.hidden {
  display:none;
}

.label {
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  margin-top:10px;
}

.qr {
  width:80px;
  height:80px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Initial Visit</h2>
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button onclick="startVisit()">Start Visit</button>
</div>

<div id="itemSection" class="card hidden">
  <h2>Add Item</h2>

  <input id="itemName" placeholder="Item Name">
  <textarea id="desc" placeholder="Description"></textarea>

  <!-- CAMERA FIX -->
  <input type="file" id="photo" accept="image/*" capture="environment">

  <button onclick="analyze()">Analyze Photo</button>
  <button onclick="addItem()">Add Item</button>
  <button class="green" onclick="endVisit()">End Visit & Print</button>
</div>

<div id="labels"></div>

<script>
let session = null;
let items = [];
let currentPhoto = null;

function startVisit(){
  const f = first.value.trim();
  const l = last.value.trim();

  if(!f || !l){
    alert("Enter name");
    return;
  }

  session = {
    first:f,
    last:l,
    code:(f.slice(0,3)+l.slice(0,3)).toUpperCase()
  };

  itemSection.classList.remove("hidden");
}

async function upload(){
  const file = photo.files[0];
  if(!file) return null;

  const form = new FormData();
  form.append("photo", file);

  const res = await fetch("/upload", { method:"POST", body:form });
  const data = await res.json();

  return data.path;
}

async function analyze(){
  if(!session){
    alert("Start visit first");
    return;
  }

  const path = await upload();

  const res = await fetch("/analyze-image", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      imageUrl: window.location.origin + path
    })
  });

  const data = await res.json();

  if(data.success){
    itemName.value = data.title;
    desc.value = data.description;
  } else {
    alert("AI failed");
  }
}

async function addItem(){
  const name = itemName.value;

  const path = await upload();

  const lot = await fetch("/next-lot-code");
  const lotData = await lot.json();

  await fetch("/addItems", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      items:[{
        title:name,
        description:desc.value,
        consignerFirstName:session.first,
        consignerLastName:session.last,
        consignerCode:session.code,
        lotCode:lotData.lotCode,
        photo:path
      }]
    })
  });

  items.push({
    name,
    lotCode: lotData.lotCode
  });

  render();
}

function render(){
  labels.innerHTML = items.map(i=>`
    <div class="label">
      <canvas id="qr-${i.lotCode}" class="qr"></canvas>
      <div>
        <b>${i.name}</b><br>
        Lot ${i.lotCode}
      </div>
    </div>
  `).join("");

  items.forEach(i=>{
    QRCode.toCanvas(
      document.getElementById("qr-"+i.lotCode),
      i.lotCode
    );
  });
}

function endVisit(){
  if(confirm("Print labels?")){
    window.print();
  }
}
</script>

</body>
</html>
