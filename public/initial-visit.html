<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1b2b;
  color: white;
  padding: 16px;
}

.header {
  background: #0f2a3d;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.card {
  background: #132a3a;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden { display:none; }

.status {
  background: black;
  color: lime;
  padding: 10px;
  font-size: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
}

/* ========================= */
/* LABEL STYLE */
/* ========================= */

.label-sheet {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}

.label {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 10px;
  border: 1px solid #ddd;
  border-radius: 14px;
  padding: 8px;
  margin-bottom: 6px;
  align-items: center;
}

.qr canvas {
  width: 90px !important;
  height: 90px !important;
}

.text {
  overflow: hidden;
}

.title {
  font-size: 13px;
  font-weight: bold;
  line-height: 1.2;
  max-height: 32px;
  overflow: hidden;
}

.meta {
  font-size: 11px;
  color: #333;
  margin-top: 4px;
}

/* ========================= */
/* PRINT MODE */
/* ========================= */

@media print {

  body {
    background: white;
    padding: 0;
  }

  .header,
  .card,
  .status {
    display: none;
  }

  .label-sheet {
    padding: 0;
  }

  .label {
    page-break-inside: avoid;
  }

}
</style>
</head>

<body>

<div class="header">
  <div onclick="goHome()">Auction Legacy</div>
  <div onclick="logout()">Logout</div>
</div>

<div id="status" class="status">Ready...</div>

<div class="card">
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button onclick="startSession()">Start</button>
  <p id="code"></p>
</div>

<div id="itemSection" class="card hidden">
  <input id="titleInput" placeholder="Item Name">
  <input type="file" id="photoInput">
  <button onclick="addItem()">Add Item + Label</button>
  <button onclick="printLabels()">Print Labels</button>
</div>

<div class="label-sheet" id="labels"></div>

<script>
let consignerCode = "";
let started = false;

function log(msg){
  document.getElementById("status").innerText = msg;
}

function goHome(){
  window.location.href = "/dashboard.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function startSession(){
  const first = first.value.trim();
  const last = last.value.trim();

  if(!first || !last){
    log("❌ Missing name");
    return;
  }

  consignerCode = (first.slice(0,3)+last.slice(0,3)).toUpperCase();

  code.innerText = "Consigner Code: "+consignerCode;
  itemSection.classList.remove("hidden");

  started = true;

  log("✅ Session started");
}

async function safeJSON(res){
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { throw new Error(text.slice(0,100)); }
}

async function addItem(){

  if(!started){
    log("❌ Start session first");
    return;
  }

  const title = titleInput.value.trim();
  const file = photoInput.files[0];

  if(!title){
    log("❌ Missing title");
    return;
  }

  let photoPath = null;

  try {

    if(file){
      log("📸 Uploading...");
      const formData = new FormData();
      formData.append("photo", file);

      const uploadRes = await fetch("/upload",{method:"POST",body:formData});
      const uploadData = await safeJSON(uploadRes);

      if(!uploadData.success){
        log("❌ Upload failed");
        return;
      }

      photoPath = uploadData.path;
      log("✅ Upload OK");
    }

    log("🔢 Getting lot...");
    const lotRes = await fetch("/next-lot-code");
    const lotData = await safeJSON(lotRes);

    const lotCode = lotData.lotCode;

    log("💾 Saving...");
    const res = await fetch("/addItems",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        items:[{
          title,
          consignerCode,
          lotCode,
          itemNumber:1,
          partCount:1,
          createdBy:"mobile",
          createdAt:new Date().toISOString(),
          photo:photoPath
        }]
      })
    });

    const data = await safeJSON(res);

    if(!data.success){
      log("❌ Save failed");
      return;
    }

    log("✅ SAVED");

    renderLabel(title, lotCode);

  } catch(err){
    log("❌ ERROR: "+err.message);
  }
}

function renderLabel(title, lotCode){
  const id = Date.now();

  labels.innerHTML += `
    <div class="label">
      <div class="qr"><canvas id="qr-${id}"></canvas></div>
      <div class="text">
        <div class="title">${title}</div>
        <div class="meta">Lot ${lotCode} · ${consignerCode}</div>
      </div>
    </div>
  `;

  QRCode.toCanvas(document.getElementById(`qr-${id}`), lotCode);
}

function printLabels(){
  window.print();
}
</script>

</body>
</html>
