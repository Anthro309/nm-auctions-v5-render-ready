<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1b2b;
  color:white;
  padding:15px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card {
  background:#13283b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  width:100%;
  font-weight:bold;
}

.hidden {
  display:none;
}

/* LABEL STYLE (REAL VERSION) */
.label-sheet {
  display:none;
}

.label {
  background:white;
  color:black;
  border-radius:16px;
  display:flex;
  align-items:center;
  padding:12px;
  gap:12px;
  margin-bottom:10px;
}

.qr {
  width:90px;
  height:90px;
}

.label-text {
  font-size:13px;
  line-height:1.3;
}

@media print {
  body * {
    visibility:hidden;
  }

  .label-sheet, .label-sheet * {
    visibility:visible;
  }

  .label-sheet {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    display:block;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1 onclick="goDashboard()">Auction Legacy</h1>
  <div onclick="logout()">Logout</div>
</div>

<!-- START -->
<div class="card">
  <h2>Initial Visit</h2>
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button onclick="startVisit()">Start Visit</button>
</div>

<!-- ADD ITEMS -->
<div id="itemSection" class="card hidden">
  <h2>Add Item</h2>
  <input id="itemName" placeholder="Item Name">
  <input type="file" id="photo">
  <button onclick="addItem()">Add Item</button>

  <button style="background:#16a34a;" onclick="endVisit()">End Visit</button>
</div>

<!-- PREVIEW -->
<div id="labels"></div>

<!-- PRINT SHEET -->
<div id="printSheet" class="label-sheet"></div>

<script>

let session = null;
let items = [];

function goDashboard(){
  window.location.href = "/dashboard.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function startVisit(){
  const first = document.getElementById("first").value.trim();
  const last = document.getElementById("last").value.trim();

  if(!first || !last){
    alert("Enter name");
    return;
  }

  session = {
    first,
    last,
    code: (first.slice(0,3)+last.slice(0,3)).toUpperCase(),
    date: new Date().toLocaleDateString()
  };

  document.getElementById("itemSection").classList.remove("hidden");
}

async function addItem(){

  const name = document.getElementById("itemName").value;
  const file = document.getElementById("photo").files[0];

  if(!name){
    alert("Enter item name");
    return;
  }

  let photoPath = null;

  if(file){
    const fd = new FormData();
    fd.append("photo", file);

    const res = await fetch("/upload", { method:"POST", body:fd });
    const data = await res.json();
    photoPath = data.path;
  }

  const month = "ABCDEFGHIJKL"[new Date().getMonth()];
  const lotRes = await fetch(`/next-lot-code?month=${month}`);
  const lotData = await lotRes.json();

  const lotCode = lotData.lotCode;

  await fetch("/addItems", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      items:[{
        title:name,
        consignerFirstName:session.first,
        consignerLastName:session.last,
        consignerCode:session.code,
        lotCode,
        photo:photoPath,
        createdBy:"Fabian"
      }]
    })
  });

  items.push({name, lotCode});

  renderPreview();
}

function renderPreview(){
  const container = document.getElementById("labels");

  container.innerHTML = items.map(i=>`
    <div style="background:#fff;color:#000;padding:10px;border-radius:10px;margin-top:10px;">
      ${i.name} - ${i.lotCode}
    </div>
  `).join("");
}

function endVisit(){
  if(!items.length){
    alert("No items added");
    return;
  }

  const confirmPrint = confirm("Print labels now?");
  if(!confirmPrint) return;

  buildPrintSheet();
  window.print();
}

function buildPrintSheet(){
  const sheet = document.getElementById("printSheet");

  sheet.innerHTML = items.map(i=>`
    <div class="label">
      <canvas id="qr-${i.lotCode}" class="qr"></canvas>
      <div class="label-text">
        <strong>${i.name}</strong><br>
        Lot ${i.lotCode}<br>
        Receiving ${session.date}<br>
        ${session.code}
      </div>
    </div>
  `).join("");

  items.forEach(i=>{
    QRCode.toCanvas(
      document.getElementById(`qr-${i.lotCode}`),
      i.lotCode,
      { width:90 }
    );
  });
}

</script>

</body>
</html>
