<!DOCTYPE html><html>
<head>
  <title>Initial Visit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>  <style>
    .camera-box {
      display:flex;
      align-items:center;
      justify-content:center;
      height:120px;
      border:2px dashed #d1d5db;
      border-radius:16px;
      background:#f9fafb;
      cursor:pointer;
      font-size:18px;
      color:#374151;
      margin-bottom:12px;
    }

    .preview {
      width:100%;
      border-radius:12px;
      margin-bottom:10px;
      display:none;
    }

    .item-card {
      display:flex;
      gap:12px;
      align-items:center;
      background:#fff;
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;
    }

    .item-img {
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:10px;
      background:#e5e7eb;
    }

    .item-qr {
      width:70px;
      height:70px;
    }
  </style></head><body><div class="container">  <div class="card">
    <h2>Start Visit</h2>
    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">
    <button onclick="startVisit()">Start</button>
    <div id="codeDisplay"></div>
  </div>  <div class="card">
    <h2>Add Item</h2><input id="itemName" placeholder="Item Name">

<div class="camera-box" onclick="openCamera()">
  📷 Take Photo
</div>

<img id="preview" class="preview">

<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

<button onclick="addItem()">Add Item</button>

  </div>  <div class="card">
    <h2>Items</h2>
    <div id="items"></div>
  </div>  <div class="card">
    <button onclick="printLabels()">🖨️ Print Labels</button>
    <button onclick="endVisit()">✅ End Visit</button>
  </div></div><script>

let consignerCode = null;
let consignerName = "";

const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("preview");

function openCamera(){
  photoInput.value = ""; // FIX
  photoInput.click();
}

photoInput.addEventListener("change", () => {
  const file = photoInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

function startVisit(){
  const f = first.value.trim().toUpperCase();
  const l = last.value.trim().toUpperCase();

  if(!f || !l) return alert("Enter names");

  consignerCode = f.slice(0,3) + l.slice(0,3);
  consignerName = f + " " + l;

  codeDisplay.innerText = "Consigner Code: " + consignerCode;

  loadItems();
}

// =========================
// 🔥 FULL FIXED ADD ITEM
// =========================
async function addItem(){

  if(!consignerCode) return alert("Start visit first");

  const name = itemName.value.trim();
  if(!name) return alert("Enter item name");

  let photoPath = null;

  // =========================
  // UPLOAD
  // =========================
  if(photoInput.files.length > 0){

    const form = new FormData();
    form.append("photo", photoInput.files[0]);

    try {

      const uploadRes = await fetch('/upload', {
        method:'POST',
        body: form
      });

      const data = await uploadRes.json();

      alert("UPLOAD RESPONSE: " + JSON.stringify(data)); // 🔥 DEBUG

      if(!data.success || !data.path){
        return alert("UPLOAD FAILED");
      }

      photoPath = data.path;

      alert("PHOTO PATH: " + photoPath); // 🔥 DEBUG

    } catch(err){
      alert("UPLOAD ERROR");
      console.error(err);
      return;
    }
  }

  // =========================
  // CREATE ITEM
  // =========================
  const itemsRes = await fetch('/items');
  const items = await itemsRes.json();

  const count = items.filter(i => i.code === consignerCode).length + 1;

  await fetch('/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      consigner: consignerName,
      code: consignerCode,
      number: count,
      photos: photoPath ? [photoPath] : []
    })
  });

  itemName.value = "";
  photoInput.value = "";
  preview.style.display = "none";

  loadItems();
}

// =========================
// LOAD ITEMS
// =========================
async function loadItems(){

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i => i.code === consignerCode);

  items.innerHTML = "";

  list.forEach(i => {

    const div = document.createElement("div");
    div.className = "item-card";

    const qrId = "qr_" + i.id;

    div.innerHTML = `
      <canvas id="${qrId}" class="item-qr"></canvas>

      ${i.photos && i.photos[0]
        ? `<img src="${i.photos[0]}" class="item-img">`
        : `<div class="item-img">No Image</div>`}

      <div>
        <div><b>${i.code}-${i.number}</b></div>
        <div>${i.name}</div>
      </div>
    `;

    items.appendChild(div);

    QRCode.toCanvas(document.getElementById(qrId), `${i.code}-${i.number}`);
  });
}

// =========================
// PRINT
// =========================
async function printLabels(){

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i => i.code === consignerCode);

  const win = window.open("");

  win.document.write(`
    <html>
    <body>
      ${list.map(i => `
        <div style="display:flex;gap:10px;margin-bottom:10px;">
          <canvas id="qr_${i.id}"></canvas>
          <div>${i.name}</div>
        </div>
      `).join("")}
      <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>
      <script>
        const items = ${JSON.stringify(list)};
        items.forEach(i=>{
          QRCode.toCanvas(document.getElementById("qr_"+i.id), i.code+"-"+i.number);
        });
        setTimeout(()=>window.print(),500);
      <\/script>
    </body>
    </html>
  `);
}

// =========================
// END VISIT
// =========================
function endVisit(){
  alert("Visit Complete");
}

</script></body>
</html>
