<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1b2b;
  color: white;
  padding: 16px;
}

.card {
  background: #132a3a;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden {
  display: none;
}

.status {
  background: black;
  color: lime;
  padding: 10px;
  font-size: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
}

.label {
  background: white;
  color: black;
  display: flex;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2 onclick="goHome()">Auction Legacy</h2>

<div id="status" class="status">Ready...</div>

<div class="card">
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button type="button" onclick="startSession()">Start</button>
  <p id="code"></p>
</div>

<div id="itemSection" class="card hidden">
  <input id="title" placeholder="Item Name">
  <input type="file" id="photo">
  <button type="button" onclick="addItem()">Add Item</button>
</div>

<div id="labels"></div>

<script>
let consignerCode = "";
let sessionStarted = false;

function log(msg) {
  document.getElementById("status").innerText = msg;
}

function goHome() {
  window.location.href = "/dashboard.html";
}

function startSession() {
  const first = document.getElementById("first").value.trim();
  const last = document.getElementById("last").value.trim();

  if (!first || !last) {
    log("❌ Missing name");
    return;
  }

  consignerCode = (first.slice(0,3) + last.slice(0,3)).toUpperCase();

  document.getElementById("code").innerText =
    "Consigner Code: " + consignerCode;

  document.getElementById("itemSection").classList.remove("hidden");

  sessionStarted = true;

  log("✅ Session started");
}

async function addItem() {

  if (!sessionStarted) {
    log("❌ Start session first");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const file = document.getElementById("photo").files[0];

  if (!title) {
    log("❌ Missing item title");
    return;
  }

  log("📸 Uploading image...");

  let photoPath = null;

  try {

    // UPLOAD
    if (file) {
      const formData = new FormData();
      formData.append("photo", file);

      const uploadRes = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const uploadData = await uploadRes.json();

      if (!uploadData.success) {
        log("❌ Upload failed");
        return;
      }

      photoPath = uploadData.path;
      log("✅ Upload success");
    }

    // LOT CODE
    log("🔢 Getting lot code...");

    const lotRes = await fetch("/next-lot-code");
    const lotData = await lotRes.json();

    if (!lotData.lotCode) {
      log("❌ Lot code failed");
      return;
    }

    const lotCode = lotData.lotCode;

    log("💾 Saving item...");

    // SAVE
    const res = await fetch("/addItems", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        items: [{
          title,
          consignerCode,
          lotCode,
          itemNumber: 1,
          partCount: 1,
          createdBy: "mobile",
          createdAt: new Date().toISOString(),
          photo: photoPath
        }]
      })
    });

    const data = await res.json();

    if (!data.success) {
      log("❌ Save failed: " + data.message);
      return;
    }

    log("✅ Item saved");

    renderLabel(title, lotCode);

  } catch (err) {
    log("❌ ERROR: " + err.message);
  }
}

function renderLabel(title, lotCode) {
  const id = Date.now();

  document.getElementById("labels").innerHTML += `
    <div class="label">
      <canvas id="qr-${id}"></canvas>
      <div>
        <strong>${title}</strong><br>
        ${lotCode}<br>
        ${consignerCode}
      </div>
    </div>
  `;

  QRCode.toCanvas(document.getElementById(`qr-${id}`), lotCode);
}
</script>

</body>
</html>
