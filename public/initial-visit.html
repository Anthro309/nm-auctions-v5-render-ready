<script>
let consignerCode = null;
let consignerName = "";
let partCount = 1;

// CAMERA
function openCamera(){
  photoInput.click();
}

photoInput.addEventListener("change", ()=>{
  const file = photoInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// START VISIT
function startVisit(){
  const f = first.value.trim().toUpperCase();
  const l = last.value.trim().toUpperCase();

  consignerCode = f.slice(0,3)+l.slice(0,3);
  consignerName = f+" "+l;

  codeDisplay.innerText = "Consigner Code: "+consignerCode;
  loadItems();
}

// ADD ITEM WITH PARTS
async function addItem(){
  if(!consignerCode) return alert("Start visit first");

  const name = itemName.value;
  const parts = parseInt(prompt("How many parts? (1 for normal)") || "1");

  let photoPath = null;

  if(photoInput.files[0]){
    const form = new FormData();
    form.append("photo", photoInput.files[0]);

    const upload = await fetch('/upload',{method:'POST',body:form});
    const data = await upload.json();
    photoPath = data.path;
  }

  const itemsRes = await fetch('/items');
  const items = await itemsRes.json();

  let baseNumber = items.filter(i=>i.code===consignerCode).length + 1;

  for(let i=1;i<=parts;i++){
    await fetch('/items',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name,
        consigner:consignerName,
        code:consignerCode,
        number: baseNumber,
        part: parts > 1 ? `${i}/${parts}` : null,
        photos: photoPath ? [photoPath] : []
      })
    });
  }

  itemName.value="";
  photoInput.value="";
  preview.style.display="none";

  loadItems();
}

// LOAD ITEMS
async function loadItems(){
  if(!consignerCode) return;

  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i=>i.code===consignerCode);

  items.innerHTML="";

  list.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item-card";

    const qrId = "qr_"+i.id;

    div.innerHTML = `
      <canvas id="${qrId}" class="qr"></canvas>

      ${i.photos?.[0] ? `<img src="${i.photos[0]}" class="item-img">` : ""}

      <div>
        <div><strong>${i.code}-${i.number} ${i.part ? `(${i.part})` : ""}</strong></div>
        <div>${i.name}</div>
      </div>
    `;

    items.appendChild(div);

    QRCode.toCanvas(document.getElementById(qrId),
      `${i.code}-${i.number} ${i.part || ""}`
    );
  });
}

// PRINT REAL LABEL SHEET
async function printSheet(){
  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i=>i.code===consignerCode);

  const win = window.open('');

  let html = `
  <html>
  <body style="font-family:Arial;">
  `;

  for(const i of list){
    html += `
      <div style="
        display:flex;
        align-items:center;
        margin-bottom:12px;
        border-bottom:1px solid #ddd;
        padding-bottom:8px;
      ">
        <div id="qr_${i.id}"></div>

        <div style="margin-left:10px;">
          <div style="font-weight:bold;">
            ${i.name}
          </div>

          <div>
            ${i.code}-${i.number}
            ${i.part ? `(${i.part})` : ""}
          </div>
        </div>
      </div>
    `;
  }

  html += `<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>`;
  html += `<script>`;

  list.forEach(i=>{
    html += `
      QRCode.toCanvas(
        document.getElementById("qr_${i.id}"),
        "${i.code}-${i.number} ${i.part || ""}"
      );
    `;
  });

  html += `window.print()<\/script></body></html>`;

  win.document.write(html);
  win.document.close();
}

// FINALIZE INTAKE
async function closeOut(){
  const res = await fetch('/items');
  const all = await res.json();

  const list = all.filter(i=>i.code===consignerCode);

  await fetch('/intake',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      code: consignerCode,
      consigner: consignerName,
      items: list
    })
  });

  alert("Intake saved!");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href="/";
}
</script>
