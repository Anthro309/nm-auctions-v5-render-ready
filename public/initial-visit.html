<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b1b2b; }
    .header { text-align:center; padding:20px; }
    .logo { width:200px; }

    .container {
      background:#f3f4f6;
      min-height:100vh;
      padding:20px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:20px;
      margin-bottom:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ddd;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:none;
      background:#1d4ed8;
      color:white;
    }

    .item {
      margin-top:10px;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <div class="card">
    <h2>Initial Visit</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button onclick="startVisit()">Start Visit</button>

    <p id="code"></p>
  </div>

  <div class="card" id="section" style="display:none;">
    <input id="itemName" placeholder="Item Name">
    <input type="file" id="photoInput" accept="image/*">

    <button onclick="addItem()">Add Item</button>

    <div id="list"></div>
  </div>

</div>

<script>
let consigner = null;
let items = [];

function genCode(f,l){
  return (f.slice(0,3)+l.slice(0,3)).toUpperCase();
}

function startVisit(){
  const f = first.value.trim();
  const l = last.value.trim();

  if(!f || !l) return alert("Enter name");

  consigner = {
    name: f + " " + l,
    code: genCode(f,l)
  };

  code.innerText = "Code: " + consigner.code;
  section.style.display = "block";
}

async function uploadPhoto(file){
  const form = new FormData();
  form.append("photo", file);

  const res = await fetch('/upload', {
    method:'POST',
    body: form
  });

  const data = await res.json();
  return data.path;
}

async function addItem(){
  if(!consigner) return alert("Start visit first");

  const name = itemName.value.trim();
  if(!name) return alert("Enter item name");

  let photoPath = null;

  const file = photoInput.files[0];
  if(file){
    photoPath = await uploadPhoto(file);
  }

  const item = {
    name,
    consigner: consigner.name,
    code: consigner.code,
    number: items.length + 1,
    photos: photoPath ? [photoPath] : [],
    stage: "Initial Visit"
  };

  const res = await fetch('/items', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(item)
  });

  const saved = await res.json();

  items.push(saved);
  render();

  itemName.value = "";
  photoInput.value = "";
}

function render(){
  list.innerHTML = "";

  items.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = `${i.code}-${i.number} — ${i.name}`;
    list.appendChild(div);
  });
}
</script>

</body>
</html>
