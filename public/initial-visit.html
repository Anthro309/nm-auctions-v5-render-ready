<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- QR LIB -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    .label-sheet {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .label {
      border: 2px solid black;
      padding: 10px;
      text-align: center;
      background: white;
    }

    .label-code {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .label-name {
      font-size: 12px;
      margin-top: 5px;
    }

    canvas {
      margin-top: 5px;
    }

    @media print {
      body * {
        visibility: hidden;
      }
      #printArea, #printArea * {
        visibility: visible;
      }
      #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <!-- START -->
  <div class="card">
    <h2>Start Visit</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button onclick="startVisit()">Start</button>

    <div id="codeDisplay" class="label"></div>
  </div>

  <!-- ADD ITEMS -->
  <div id="section" class="card" style="display:none;">
    <h2>Add Item</h2>

    <input id="itemName" placeholder="Item Name">

    <input type="file" id="photoInput" accept="image/*" capture="environment">

    <button onclick="addItem()">Add Item</button>

    <button onclick="printLabels()" style="margin-top:10px;">
      🖨️ Print Labels
    </button>

    <div id="list" class="grid" style="margin-top:15px;"></div>
  </div>

  <div id="printArea"></div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

let code = null;
let count = 1;

// =========================
// START VISIT
// =========================
function startVisit(){
  const f = first.value.trim();
  const l = last.value.trim();

  if(!f || !l){
    alert("Enter first and last name");
    return;
  }

  const firstCode = f.substring(0,3).toUpperCase();
  const lastCode = l.substring(0,3).toUpperCase();

  code = firstCode + lastCode;

  codeDisplay.innerText = "Consigner Code: " + code;

  section.style.display = "block";

  loadItems();
}

// =========================
// ADD ITEM
// =========================
async function addItem(){
  const name = itemName.value.trim();
  const file = photoInput.files[0];

  if(!name){
    alert("Enter item name");
    return;
  }

  let photoPath = "";

  if(file){
    const form = new FormData();
    form.append("photo", file);

    const res = await fetch('/upload',{
      method:'POST',
      body: form
    });

    const data = await res.json();
    if(data.success){
      photoPath = data.path;
    }
  }

  const newItem = {
    name,
    consigner: first.value + " " + last.value,
    code,
    number: count++,
    photos: photoPath ? [photoPath] : [],
    employee: user.name
  };

  await fetch('/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(newItem)
  });

  itemName.value = "";
  photoInput.value = "";

  loadItems();
}

// =========================
// LOAD ITEMS
// =========================
async function loadItems(){
  if(!code) return;

  const res = await fetch('/items');
  const items = await res.json();

  const filtered = items.filter(i => i.code === code);

  list.innerHTML = "";

  filtered.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:14px">
        <div class="title">${i.name}</div>
        <div class="label">${i.code}-${i.number}</div>
      </div>
    `;

    list.appendChild(div);
  });
}

// =========================
// PRINT QR LABELS
// =========================
async function printLabels(){
  const res = await fetch('/items');
  const items = await res.json();

  const filtered = items.filter(i => i.code === code);

  printArea.innerHTML = `<div class="label-sheet" id="sheet"></div>`;
  const sheet = document.getElementById("sheet");

  for(const i of filtered){
    const div = document.createElement("div");
    div.className = "label";

    const codeText = `${i.code}-${i.number}`;

    div.innerHTML = `
      <div class="label-code">${codeText}</div>
      <canvas id="qr-${i.id}"></canvas>
      <div class="label-name">${i.name}</div>
    `;

    sheet.appendChild(div);

    await QRCode.toCanvas(
      document.getElementById(`qr-${i.id}`),
      codeText,
      { width: 100 }
    );
  }

  setTimeout(()=> window.print(), 500);
}

// =========================
// NAV
// =========================
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
