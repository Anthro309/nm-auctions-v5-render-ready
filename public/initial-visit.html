<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2>Start Visit</h2>
    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">
    <button onclick="startVisit()">Start</button>
  </div>

  <div id="section" class="card" style="display:none;">
    <h2>Add Item</h2>
    <input id="itemName" placeholder="Item Name">
    <input type="file" id="photoInput" accept="image/*">
    <button onclick="addItem()">Add</button>

    <div id="list" class="grid"></div>
  </div>

</div>

<script>
let code, count=1;

function startVisit(){
  const f = first.value.slice(0,3).toUpperCase();
  const l = last.value.slice(0,3).toUpperCase();
  code = f + l;

  section.style.display = "block";
}

async function addItem(){
  const file = photoInput.files[0];
  let photo = "";

  if(file){
    const form = new FormData();
    form.append("photo", file);

    const res = await fetch('/upload',{method:'POST',body:form});
    const data = await res.json();
    photo = data.path;
  }

  const item = {
    name: itemName.value,
    consigner: first.value + " " + last.value,
    code,
    number: count++,
    photos: photo ? [photo] : []
  };

  await fetch('/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(item)
  });

  loadItems();
}

async function loadItems(){
  const res = await fetch('/items');
  const items = await res.json();

  const filtered = items.filter(i=>i.code===code);

  list.innerHTML = "";

  filtered.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:14px">
        <div class="title">${i.name}</div>
      </div>
    `;

    list.appendChild(div);
  });
}

function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
