<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit - NM Auctions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    .box {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: white;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .print-btn {
      background: #22c55e;
    }

    .canvas-box {
      margin-top: 15px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    canvas {
      width: 100%;
      height: 200px;
      background: #fff;
      border-radius: 8px;
    }

    .clear-btn {
      background: #ef4444;
    }

    .card {
      background: #111827;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🏠 Initial Visit</h1>
  <p id="user"></p>

  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">

  <button onclick="startVisit()">Start Visit</button>

  <h3 id="code"></h3>

  <div id="section" style="display:none; margin-top:20px;">

    <input id="itemName" placeholder="Item Name">
    <input type="file" id="photoInput" accept="image/*" capture="environment">

    <button onclick="addItem()">Add Item</button>

    <!-- SIGNATURE PAD -->
    <div class="canvas-box">
      <p style="color:black;">Consigner Signature</p>
      <canvas id="signaturePad"></canvas>
      <button class="clear-btn" onclick="clearSignature()">Clear Signature</button>
    </div>

    <!-- PRINT -->
    <button class="print-btn" onclick="printReport()">🖨 Print Report</button>

    <div id="list"></div>

  </div>

  <button onclick="back()">⬅ Back</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

document.getElementById('user').innerText = "Logged in as " + user.name;

let consigner = null;
let items = [];
let signatureData = null;

// ===== SIGNATURE PAD =====
const canvas = document.getElementById('signaturePad');
const ctx = canvas.getContext('2d');

let drawing = false;

canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mousemove', draw);

canvas.addEventListener('touchstart', () => drawing = true);
canvas.addEventListener('touchend', () => drawing = false);
canvas.addEventListener('touchmove', drawTouch);

function draw(e) {
  if (!drawing) return;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#000';

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function drawTouch(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];

  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  if (!drawing) return;

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function clearSignature() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ===== CORE =====
function genCode(f, l) {
  return (f.slice(0,3) + l.slice(0,3)).toUpperCase();
}

function startVisit() {
  const f = first.value.trim();
  const l = last.value.trim();

  if (!f || !l) return alert("Enter full name");

  consigner = {
    name: f + " " + l,
    code: genCode(f, l)
  };

  code.innerText = "Consigner Code: " + consigner.code;
  section.style.display = "block";
}

async function addItem() {
  const name = itemName.value.trim();
  if (!name) return alert("Enter item name");

  const item = {
    name,
    consigner: consigner.name,
    code: consigner.code,
    number: items.length + 1,
    photos: []
  };

  await fetch('/items', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(item)
  });

  items.push(item);
  render();

  itemName.value = "";
}

function render() {
  list.innerHTML = "";

  items.forEach(i=>{
    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `<b>${i.code}-${i.number}</b><br>${i.name}`;
    list.appendChild(div);
  });
}

// ===== PRINT =====
function printReport() {
  if (!items.length) return alert("No items");

  const signature = canvas.toDataURL();

  let rows = "";
  items.forEach(i => {
    rows += `<tr><td>${i.code}-${i.number}</td><td>${i.name}</td></tr>`;
  });

  const html = `
  <html>
  <head>
    <style>
      body { font-family: Arial; padding: 40px; }
      .logo { width: 220px; }
      table { width:100%; border-collapse: collapse; margin-top:20px; }
      th, td { border:1px solid #ccc; padding:10px; }
    </style>
  </head>
  <body>

    <img src="/logo.png" class="logo">

    <h2>Consignment Intake Report</h2>

    <p><b>Consigner:</b> ${consigner.name}</p>
    <p><b>Code:</b> ${consigner.code}</p>
    <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>

    <table>
      <tr><th>Item Code</th><th>Description</th></tr>
      ${rows}
    </table>

    <h3>Signature</h3>
    <img src="${signature}" width="300">

  </body>
  </html>
  `;

  const win = window.open('', '', 'width=900,height=700');
  win.document.write(html);
  win.document.close();
  win.print();
}

function back() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
