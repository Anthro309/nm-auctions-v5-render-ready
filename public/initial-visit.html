<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit - NM Auctions</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .print-btn {
      background: #22c55e;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🏠 Initial Visit</h1>
  <p id="user"></p>

  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">

  <button class="primary" onclick="startVisit()">Start Visit</button>

  <h3 id="code"></h3>

  <div id="section" style="display:none; margin-top:20px;">

    <input id="itemName" placeholder="Item Name">

    <input type="file" id="photoInput" accept="image/*" capture="environment">

    <button class="primary" onclick="addItem()">Add Item</button>

    <!-- 🖨 PRINT BUTTON -->
    <button class="print-btn" onclick="printReport()">
      🖨 Print Consigner Report
    </button>

    <div id="list" class="grid"></div>

  </div>

  <button onclick="back()">⬅ Back</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

document.getElementById('user').innerText =
  "Logged in as " + user.name;

let consigner = null;
let items = [];

// CODE
function genCode(f, l) {
  return (f.slice(0,3) + l.slice(0,3)).toUpperCase();
}

// START
function startVisit() {
  const f = first.value.trim();
  const l = last.value.trim();

  if (!f || !l) return alert("Enter full name");

  consigner = {
    name: f + " " + l,
    code: genCode(f, l)
  };

  code.innerText = "Consigner Code: " + consigner.code;
  section.style.display = "block";
}

// UPLOAD
async function uploadPhoto(file) {
  const form = new FormData();
  form.append("photo", file);

  const res = await fetch('/upload', {
    method: 'POST',
    body: form
  });

  const data = await res.json();
  return data.path;
}

// ADD ITEM
async function addItem() {
  const name = itemName.value.trim();
  const file = photoInput.files[0];

  if (!name) return alert("Enter item name");

  let photoPath = null;

  if (file) {
    photoPath = await uploadPhoto(file);
  }

  const item = {
    name,
    consigner: consigner.name,
    code: consigner.code,
    number: items.length + 1,
    photos: photoPath ? [photoPath] : []
  };

  await fetch('/items', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(item)
  });

  items.push(item);
  render();

  itemName.value = "";
  photoInput.value = "";
}

// RENDER
function render() {
  list.innerHTML = "";

  items.forEach(i=>{
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <b>${i.code}-${i.number}</b>
      <div>${i.name}</div>
    `;

    list.appendChild(div);
  });
}

// 🖨 PRINT REPORT
function printReport() {
  if (!items.length) {
    alert("No items to print");
    return;
  }

  let content = `
    <h2>NM Auctions</h2>
    <p><b>Consigner:</b> ${consigner.name}</p>
    <p><b>Code:</b> ${consigner.code}</p>
    <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>

    <hr>

    <ol>
  `;

  items.forEach(i => {
    content += `<li>${i.code}-${i.number} — ${i.name}</li>`;
  });

  content += `
    </ol>

    <br><br>
    <p>Consigner Signature: __________________________</p>
  `;

  const win = window.open('', '', 'width=800,height=600');
  win.document.write(content);
  win.document.close();
  win.print();
}

// BACK
function back() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
