<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background:#0b1b2b;
  color:white;
  padding:15px;
}

.card {
  background:#13283b;
  padding:18px;
  border-radius:18px;
  margin-bottom:18px;
}

input, textarea {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}

button {
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  width:100%;
}

button.secondary {
  background:#16a34a;
}

/* LOADER */
.loader {
  margin-top:10px;
  height:6px;
  background:#1e3a5f;
  border-radius:10px;
  overflow:hidden;
  display:none;
}

.loader-bar {
  height:100%;
  width:0%;
  background:#3b82f6;
  animation: loading 1s infinite;
}

@keyframes loading {
  0% { width:0% }
  50% { width:80% }
  100% { width:0% }
}

.label {
  background:white;
  color:black;
  border-radius:14px;
  padding:12px;
  display:flex;
  gap:12px;
  margin-top:12px;
  align-items:center;
}

.qr {
  width:85px;
  height:85px;
}

/* PRINT */
#printSheet { display:none; }

@media print {
  body * { visibility:hidden; }

  #printSheet, #printSheet * {
    visibility:visible;
  }

  #printSheet {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    display:block;
  }

  .sheet {
    display:grid;
    grid-template-columns: repeat(3, 2.625in);
    grid-auto-rows: 1in;
    width:8.5in;
  }

  .print-label {
    display:flex;
    gap:6px;
    padding:4px;
    align-items:center;
  }

  .print-qr {
    width:0.7in;
    height:0.7in;
  }

  .print-text {
    font-size:10px;
    color:black;
  }
}
</style>
</head>

<body>

<div class="card">
  <h2>Initial Visit</h2>
  <input id="firstInput" placeholder="First Name">
  <input id="lastInput" placeholder="Last Name">
  <button onclick="startVisit()">Start Visit</button>
  <div id="codeDisplay"></div>
</div>

<div id="itemSection" class="card" style="display:none;">
  <h2>Add Item</h2>

  <input id="itemName" placeholder="Item Name">
  <textarea id="itemDescription" placeholder="Description"></textarea>
  <input id="itemCategory" placeholder="Category">
  <input id="itemCondition" placeholder="Condition">

  <input type="file" id="photo" accept="image/*" capture="environment">

  <div class="loader" id="loader">
    <div class="loader-bar"></div>
  </div>

  <button onclick="analyzePhoto()">Analyze Photo with AI</button>
  <button onclick="addItem()">Add Item</button>
  <button class="secondary" onclick="endVisit()">End Visit & Print Labels</button>
</div>

<div id="labels"></div>
<div id="printSheet"></div>

<script>
let session=null;
let items=[];
let currentPhotoPath=null;

function startVisit(){
  const first=document.getElementById("firstInput").value.trim();
  const last=document.getElementById("lastInput").value.trim();

  if(!first||!last) return alert("Enter name");

  session={
    first,
    last,
    code:(first.slice(0,3)+last.slice(0,3)).toUpperCase(),
    date:new Date().toLocaleDateString()
  };

  document.getElementById("codeDisplay").innerText="Code: "+session.code;
  document.getElementById("itemSection").style.display="block";
}

function showLoader(){
  document.getElementById("loader").style.display="block";
}

function hideLoader(){
  document.getElementById("loader").style.display="none";
}

async function uploadPhoto(){
  const file=document.getElementById("photo").files[0];
  if(!file) return null;

  const form=new FormData();
  form.append("photo",file);

  const res=await fetch("/upload",{method:"POST",body:form});
  const data=await res.json();

  if(!data.success) throw new Error("Upload failed");

  return data.path;
}

async function analyzePhoto(){
  if(!session) return alert("Start visit first");

  try{
    showLoader();

    const file=document.getElementById("photo").files[0];
    if(!file) throw new Error("No photo selected");

    currentPhotoPath=await uploadPhoto();

    const res=await fetch("/analyze-image",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        imageUrl:window.location.origin+currentPhotoPath
      })
    });

    const data=await res.json();

    document.getElementById("itemName").value=data.title||"";
    document.getElementById("itemDescription").value=data.description||"";
    document.getElementById("itemCategory").value=data.category||"";
    document.getElementById("itemCondition").value=data.condition||"";

  }catch(err){
    alert("AI failed: "+err.message);
  }finally{
    hideLoader();
  }
}

async function addItem(){
  if(!session) return alert("Start visit first");

  let name=document.getElementById("itemName").value.trim();
  if(!name) return alert("Enter name");

  if(!currentPhotoPath){
    currentPhotoPath=await uploadPhoto();
  }

  const month="ABCDEFGHIJKL"[new Date().getMonth()];
  const lotRes=await fetch(`/next-lot-code?month=${month}`);
  const lotData=await lotRes.json();

  const lotCode=lotData.lotCode;

  const res=await fetch("/addItems",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      items:[{
        title:name,
        description:document.getElementById("itemDescription").value,
        category:document.getElementById("itemCategory").value,
        condition:document.getElementById("itemCondition").value,
        consignerFirstName:session.first,
        consignerLastName:session.last,
        consignerCode:session.code,
        lotCode,
        photo:currentPhotoPath,
        createdBy:"Fabian"
      }]
    })
  });

  const result=await res.json();
  if(!result.success) return alert("Save failed");

  items.push({
    name,
    lotCode
  });

  renderLabels();

  document.getElementById("itemName").value="";
  document.getElementById("itemDescription").value="";
  document.getElementById("itemCategory").value="";
  document.getElementById("itemCondition").value="";
  document.getElementById("photo").value="";
  currentPhotoPath=null;
}

function renderLabels(){
  const container=document.getElementById("labels");

  container.innerHTML=items.map(i=>`
    <div class="label">
      <canvas id="qr-${i.lotCode}" class="qr"></canvas>
      <div>
        <strong>${i.name}</strong><br>
        ${i.lotCode}
      </div>
    </div>
  `).join("");

  items.forEach(i=>{
    QRCode.toCanvas(
      document.getElementById(`qr-${i.lotCode}`),
      i.lotCode
    );
  });
}

async function endVisit(){
  if(!items.length) return alert("No items");

  if(confirm("Print labels?")){
    await buildPrint();

    // 🔥 CRITICAL FIX (ensures QR renders before print)
    setTimeout(()=>{
      window.print();
    },700);
  }
}

async function buildPrint(){
  const sheet=document.getElementById("printSheet");

  sheet.innerHTML=`
    <div class="sheet">
      ${items.map(i=>`
        <div class="print-label">
          <canvas id="pqr-${i.lotCode}" class="print-qr"></canvas>
          <div class="print-text">
            <strong>${i.name}</strong>
            ${i.lotCode}<br>
            ${session.code}
          </div>
        </div>
      `).join("")}
    </div>
  `;

  for(const i of items){
    await QRCode.toCanvas(
      document.getElementById(`pqr-${i.lotCode}`),
      i.lotCode
    );
  }
}
</script>

</body>
</html>
