<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link rel="stylesheet" href="/styles.css">
<style>
.iv-card {
  background: white;
  padding: 20px;
  border-radius: 18px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.06);
}

.iv-card h2 {
  font-size: 17px;
  font-weight: 700;
  margin: 0 0 14px;
  color: #111827;
}

.iv-btn {
  margin-top: 12px;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: 700;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s;
  font-family: inherit;
}
.iv-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
.iv-btn.green { background: #16a34a; }
.iv-btn.green:hover { background: #15803d; }

.loader {
  margin-top: 10px;
  height: 5px;
  background: #e0e7ef;
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.loader-bar {
  height: 100%;
  width: 0%;
  background: #2563eb;
  animation: loading 1s infinite;
}
@keyframes loading {
  0%   { width: 0% }
  50%  { width: 80% }
  100% { width: 0% }
}

.status {
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #f0f7ff;
  color: #1e40af;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid #bfdbfe;
}

/* Tablet: 2-column layout */
@media (min-width: 600px) {
  .iv-card { padding: 28px; border-radius: 20px; }
  .iv-card h2 { font-size: 19px; }
  .iv-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .iv-layout > .iv-card { margin-bottom: 0; }
}

/* ── ON-SCREEN LABEL PREVIEW ── */
.label-preview {
  background: white;
  color: black;
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
  border: 1px solid #ddd;
}

.label-preview canvas {
  width: 70px !important;
  height: 70px !important;
  flex-shrink: 0;
}

.label-preview-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}

.label-preview-name {
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 220px;
}

.label-preview-details {
  font-size: 11px;
  color: #555;
}

/* ── PRINT SHEET (hidden on screen) ── */
#printSheet { display: none; }

@media print {
  @page {
    size: letter;
    margin: 0.5in 0.19in;
  }

  body * { visibility: hidden; }

  #printSheet,
  #printSheet * { visibility: visible; }

  #printSheet {
    display: block !important;
    position: absolute;
    top: 0;
    left: 0;
  }

  .avery-sheet {
    display: grid;
    grid-template-columns: repeat(3, 2.625in);
    grid-auto-rows: 1in;
    column-gap: 0.125in;
    row-gap: 0in;
    width: 8.125in;
  }

  .avery-label {
    width: 2.625in;
    height: 1in;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 5px;
    box-sizing: border-box;
    overflow: hidden;
  }

  .avery-qr {
    width: 0.78in !important;
    height: 0.78in !important;
    flex-shrink: 0;
  }

  .avery-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    gap: 1px;
  }

  .avery-name {
    font-size: 8pt;
    font-weight: bold;
    color: black;
    line-height: 1.2;
    max-height: 2.4em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .avery-details {
    font-size: 7pt;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

<div class="page-header-block">
  <div class="page-header-icon">📋</div>
  <div>
    <div class="page-header-title">Initial Visit</div>
    <div class="page-header-sub">Capture consignments &amp; print labels</div>
  </div>
</div>

<div class="iv-layout">

  <div>
  <div id="visitCard" class="iv-card">
    <h2>Initial Visit</h2>
    <input id="firstInput" placeholder="First Name">
    <input id="lastInput" placeholder="Last Name">
    <button class="iv-btn" onclick="startVisit()">Start Visit</button>
    <div id="codeDisplay" class="status" style="display:none;"></div>
  </div>

  <div id="itemSection" class="iv-card" style="display:none;">
    <h2>Add Item</h2>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <input id="itemName" placeholder="Item Name" style="flex:1;margin-top:0;">
      <button id="voiceBtn" onclick="startVoice()" title="Speak to fill fields" style="background:#1e3a5c;color:white;border:none;border-radius:12px;padding:0 14px;font-size:20px;cursor:pointer;flex-shrink:0;">🎙️</button>
    </div>
    <div id="dupWarning" style="display:none;background:#fff7ed;border:1.5px solid #f97316;border-radius:10px;padding:10px 14px;margin-top:8px;font-size:13px;color:#9a3412;"></div>
    <textarea id="itemDescription" placeholder="Description" rows="3"></textarea>
    <input id="itemCategory" placeholder="Category">
    <input id="itemCondition" placeholder="Condition">
    <input type="file" id="photo" accept="image/*" capture="environment" style="margin-top:12px;">
    <div class="loader" id="loader">
      <div class="loader-bar"></div>
    </div>
    <button class="iv-btn" onclick="analyzePhoto()">📷 Analyze Photo with AI</button>
    <button class="iv-btn" onclick="addItem()">Add Item</button>
    <button class="iv-btn green" onclick="endVisit()">🖨️ End Visit & Print Labels</button>
    <div id="statusBox" class="status">Ready.</div>
  </div>

  </div><!-- end left column -->

  <!-- RIGHT: label previews -->
  <div id="labelsColumn">
    <div id="labels"></div>
  </div>

</div><!-- end iv-layout -->
</div><!-- end container -->

<!-- PRINT-ONLY SHEET -->
<div id="printSheet"></div>

<script>
let session = null;
let items = [];
let currentPhotoPath = null;
let currentTags = [];
let currentEstValueLow = 0;
let currentEstValueHigh = 0;

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function setStatus(msg) {
  const box = document.getElementById('statusBox');
  if (box) box.innerText = msg;
}

function showLoader() { document.getElementById('loader').style.display = 'block'; }
function hideLoader() { document.getElementById('loader').style.display = 'none'; }

function safeFilenameRequired() {
  return !!document.getElementById('photo').files[0];
}

async function safeJson(res) {
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { throw new Error('Server returned invalid response'); }
}

function truncate(str, max) {
  return str && str.length > max ? str.slice(0, max) + '..' : str || '';
}

function startVisit() {
  const first = document.getElementById('firstInput').value.trim();
  const last = document.getElementById('lastInput').value.trim();
  if (!first || !last) { alert('Enter first and last name'); return; }
  session = {
    first, last,
    code: (first.slice(0,3) + last.slice(0,3)).toUpperCase(),
    date: new Date().toLocaleDateString()
  };
  document.getElementById('visitCard').style.display = 'none';
  document.getElementById('itemSection').style.display = 'block';
  setStatus('Visit started for ' + session.code + '. Add items below.');
}

async function uploadPhoto() {
  const file = document.getElementById('photo').files[0];
  if (!file) return null;
  const form = new FormData();
  form.append('photo', file);
  const res = await fetch('/upload', { method: 'POST', body: form });
  const data = await safeJson(res);
  if (!data.success) throw new Error(data.message || 'Upload failed');
  return data.path;
}

async function analyzePhoto() {
  if (!session) { alert('Start visit first'); return; }
  if (!safeFilenameRequired()) { alert('Choose or take a photo first'); return; }
  try {
    showLoader();
    setStatus('Uploading photo...');
    currentPhotoPath = await uploadPhoto();
    setStatus('Analyzing with AI...');
    const res = await fetch('/analyze-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageUrl: window.location.origin + currentPhotoPath })
    });
    const data = await safeJson(res);
    if (!data.success) throw new Error(data.message || 'AI failed');
    document.getElementById('itemName').value = data.title || '';
    document.getElementById('itemDescription').value = data.description || '';
    document.getElementById('itemCategory').value = data.category || '';
    document.getElementById('itemCondition').value = data.condition || '';
    currentTags = data.tags || [];
    currentEstValueLow  = data.estimatedValueLow  || 0;
    currentEstValueHigh = data.estimatedValueHigh || 0;
    checkDuplicate(data.title);
    setStatus('AI filled in the details. Review and click Add Item.');
  } catch (err) {
    setStatus('AI failed: ' + err.message);
  } finally {
    hideLoader();
  }
}

// ── VOICE TO ITEM ──
let recognition = null;
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Voice input not supported on this browser'); return; }
  if (recognition) { recognition.stop(); return; }
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  const btn = document.getElementById('voiceBtn');
  btn.innerText = '⏹️';
  btn.style.background = '#dc2626';
  setStatus('Listening... speak the item description');
  recognition.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    recognition = null;
    btn.innerText = '🎙️'; btn.style.background = '#1e3a5c';
    setStatus('Processing speech with AI...');
    try {
      const res = await fetch('/voice-to-item', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript })
      });
      const data = await safeJson(res);
      if (data.success) {
        if (data.title)       document.getElementById('itemName').value = data.title;
        if (data.description) document.getElementById('itemDescription').value = data.description;
        if (data.category)    document.getElementById('itemCategory').value = data.category;
        if (data.condition)   document.getElementById('itemCondition').value = data.condition;
        setStatus('Fields filled from voice. Review and click Add Item.');
        checkDuplicate(data.title);
      }
    } catch (err) { setStatus('Voice processing failed'); }
  };
  recognition.onerror = () => { recognition = null; btn.innerText = '🎙️'; btn.style.background = '#1e3a5c'; setStatus('Voice error. Try again.'); };
  recognition.onend   = () => { if (recognition) { recognition = null; btn.innerText = '🎙️'; btn.style.background = '#1e3a5c'; } };
  recognition.start();
}

// ── DUPLICATE DETECTION ──
let allExistingItems = [];
async function loadExistingItems() {
  try { const r = await fetch('/items'); allExistingItems = await r.json(); } catch {}
}
loadExistingItems();

function checkDuplicate(name) {
  if (!name || !allExistingItems.length) return;
  const n = name.toLowerCase();
  const matches = allExistingItems.filter(i => {
    const sim = (i.name || '').toLowerCase();
    return sim.includes(n.slice(0, Math.floor(n.length * 0.6))) ||
           n.includes(sim.slice(0, Math.floor(sim.length * 0.6)));
  });
  const warn = document.getElementById('dupWarning');
  if (matches.length) {
    warn.innerHTML = `⚠️ Similar item may already exist: <strong>${matches[0].name}</strong> (Lot ${matches[0].lotNumber || '—'}, ${matches[0].consigner || 'unknown consigner'})`;
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }
}

document.getElementById('itemName').addEventListener('blur', function() {
  checkDuplicate(this.value.trim());
});

async function addItem() {
  if (!session) { alert('Start visit first'); return; }
  const name = document.getElementById('itemName').value.trim();
  const description = document.getElementById('itemDescription').value.trim();
  const category = document.getElementById('itemCategory').value.trim();
  const condition = document.getElementById('itemCondition').value.trim();
  if (!name) { alert('Enter item name'); return; }

  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const createdBy = user.name || 'unknown';

  try {
    showLoader();
    setStatus('Saving item...');
    if (!currentPhotoPath && safeFilenameRequired()) {
      currentPhotoPath = await uploadPhoto();
    }
    const month = 'ABCDEFGHIJKL'[new Date().getMonth()];
    const lotRes = await fetch(`/next-lot-code?month=${month}`);
    const lotData = await safeJson(lotRes);
    if (!lotData.success || !lotData.lotCode) throw new Error('Could not get lot code');
    const lotCode = lotData.lotCode;

    const res = await fetch('/addItems', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: [{
          title: name, description, category, condition,
          consignerFirstName: session.first,
          consignerLastName: session.last,
          consignerCode: session.code,
          lotCode,
          photo: currentPhotoPath,
          createdBy,
          tags: currentTags,
          estimatedValueLow: currentEstValueLow,
          estimatedValueHigh: currentEstValueHigh
        }]
      })
    });
    const result = await safeJson(res);
    if (!result.success) throw new Error(result.message || 'Save failed');

    items.push({ name, description, category, condition, lotCode });
    renderLabels();

    document.getElementById('itemName').value = '';
    document.getElementById('itemDescription').value = '';
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemCondition').value = '';
    document.getElementById('photo').value = '';
    document.getElementById('dupWarning').style.display = 'none';
    currentPhotoPath = null;
    currentTags = []; currentEstValueLow = 0; currentEstValueHigh = 0;
    setStatus('✅ Item added (' + items.length + ' total). Add another or print.');
  } catch (err) {
    setStatus('Failed: ' + err.message);
    alert('Add item failed: ' + err.message);
  } finally {
    hideLoader();
  }
}

function renderLabels() {
  const container = document.getElementById('labels');
  container.innerHTML = items.map(i => `
    <div class="label-preview" id="label-${i.lotCode}">
      <canvas id="qr-${i.lotCode}"></canvas>
      <div class="label-preview-text" style="flex:1;">
        <div class="label-preview-name">${escapeHtml(truncate(i.name, 40))}</div>
        <div class="label-preview-details">Lot ${escapeHtml(i.lotCode)} · ${escapeHtml(session.date)} · ${escapeHtml(session.code)}</div>
      </div>
      <button onclick="deleteItem('${escapeHtml(i.lotCode)}')" style="background:#dc2626;color:white;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">✕</button>
    </div>
  `).join('');

  items.forEach(i => {
    QRCode.toCanvas(document.getElementById(`qr-${i.lotCode}`), i.lotCode, { width: 70 });
  });
}

async function deleteItem(lotCode) {
  const idx = items.findIndex(i => i.lotCode === lotCode);
  if (idx === -1) return;
  const name = items[idx].name;
  if (!confirm('Remove "' + name + '" from this visit?')) return;

  // Find item id from server to delete
  try {
    const res = await fetch('/items/by-lot/' + lotCode);
    const serverItem = await res.json();
    if (serverItem && serverItem.id) {
      await fetch('/items/' + serverItem.id, { method: 'DELETE' });
    }
  } catch (err) { /* best effort */ }

  items.splice(idx, 1);
  renderLabels();
  setStatus('Item removed. ' + items.length + ' item(s) remaining.');
}

async function endVisit() {
  if (!items.length) { alert('No items added yet'); return; }
  if (confirm('Print labels for ' + items.length + ' item(s)?')) {
    await buildPrint();
    setTimeout(() => { window.print(); }, 800);
  }
}

async function buildPrint() {
  const sheet = document.getElementById('printSheet');
  sheet.innerHTML = `
    <div class="avery-sheet">
      ${items.map(i => `
        <div class="avery-label">
          <canvas id="pqr-${i.lotCode}" class="avery-qr"></canvas>
          <div class="avery-text">
            <div class="avery-name">${escapeHtml(truncate(i.name, 50))}</div>
            <div class="avery-details">Lot ${escapeHtml(i.lotCode)} · ${escapeHtml(session.date)} · ${escapeHtml(session.code)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  for (const i of items) {
    await QRCode.toCanvas(
      document.getElementById(`pqr-${i.lotCode}`),
      i.lotCode,
      { width: 75 }
    );
  }
  setStatus('Labels ready — printing...');
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>

<script src="/nav.js"></script>
</body>
</html>
