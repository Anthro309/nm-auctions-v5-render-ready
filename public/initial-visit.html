<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1b2b;
  color: white;
}

.header {
  background: #0f2a3d;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}

.logout {
  font-size: 14px;
  color: #ccc;
  cursor: pointer;
}

.container {
  padding: 16px;
}

.card {
  background: #132a3a;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden {
  display: none;
}

.label {
  background: white;
  color: black;
  display: flex;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
  align-items: center;
}

.label-text {
  padding-left: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title" onclick="goHome()">Auction Legacy</div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="container">

  <!-- STEP 1: CONSIGNER -->
  <div class="card">
    <h2>Initial Visit</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button type="button" onclick="startSession()">Start</button>

    <p id="code"></p>
  </div>

  <!-- STEP 2: ITEMS -->
  <div id="itemSection" class="card hidden">
    <h3>Add Item</h3>

    <input id="title" placeholder="Item Name">
    <input type="file" id="photo">

    <button type="button" onclick="addItem()">Add Item + Print Label</button>
  </div>

  <div id="labels"></div>

</div>

<script>
let consignerCode = "";
let sessionStarted = false;
let user = JSON.parse(localStorage.getItem("user") || "{}");

function goHome() {
  window.location.href = "/dashboard.html";
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/";
}

function startSession() {
  const first = document.getElementById("first").value.trim();
  const last = document.getElementById("last").value.trim();

  if (!first || !last) {
    alert("Enter consigner name");
    return;
  }

  consignerCode = (first.slice(0,3) + last.slice(0,3)).toUpperCase();

  document.getElementById("code").innerText =
    "Consigner Code: " + consignerCode;

  document.getElementById("itemSection").classList.remove("hidden");

  sessionStarted = true;
}

async function addItem() {

  if (!sessionStarted) {
    alert("Start session first");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const file = document.getElementById("photo").files[0];

  if (!title) {
    alert("Enter item name");
    return;
  }

  let photoPath = null;

  try {
    // UPLOAD PHOTO
    if (file) {
      const formData = new FormData();
      formData.append("photo", file);

      const uploadRes = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const uploadData = await uploadRes.json();

      if (!uploadData.success) {
        alert("Upload failed");
        return;
      }

      photoPath = uploadData.path;
    }

    // GET LOT CODE
    const lotRes = await fetch("/next-lot-code");
    const lotData = await lotRes.json();

    const lotCode = lotData.lotCode;

    // SAVE ITEM
    const res = await fetch("/addItems", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        items: [{
          title,
          consignerCode,
          lotCode,
          itemNumber: 1,
          partCount: 1,
          createdBy: user.name || "system",
          createdAt: new Date().toISOString(),
          photo: photoPath
        }]
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Failed to save");
      return;
    }

    renderLabel(title, lotCode);

    document.getElementById("title").value = "";
    document.getElementById("photo").value = "";

    setTimeout(() => window.print(), 300);

  } catch (err) {
    console.error(err);
    alert("Something broke");
  }
}

function renderLabel(title, lotCode) {
  const id = Date.now();

  document.getElementById("labels").innerHTML += `
    <div class="label">
      <canvas id="qr-${id}"></canvas>
      <div class="label-text">
        <strong>${title}</strong><br>
        Lot ${lotCode}<br>
        ${consignerCode}
      </div>
    </div>
  `;

  QRCode.toCanvas(
    document.getElementById(`qr-${id}`),
    lotCode
  );
}
</script>

</body>
</html>
