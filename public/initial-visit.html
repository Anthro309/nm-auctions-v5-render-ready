<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1b2b;
  color: white;
  padding: 16px;
}

.header {
  background: #0f2a3d;
  padding: 16px;
  display: flex;
  justify-content: space-between;
}

.card {
  background: #132a3a;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden { display:none; }

.status {
  background: black;
  color: lime;
  padding: 10px;
  font-size: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.label {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="goHome()">Auction Legacy</div>
  <div onclick="logout()">Logout</div>
</div>

<div id="status" class="status">Ready...</div>

<div class="card">
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button type="button" onclick="startSession()">Start</button>
  <p id="code"></p>
</div>

<div id="itemSection" class="card hidden">
  <input id="title" placeholder="Item Name">
  <input type="file" id="photo">
  <button type="button" onclick="addItem()">Add Item</button>
</div>

<div id="labels"></div>

<script>
let consignerCode = "";
let sessionStarted = false;

function log(msg){
  document.getElementById("status").innerText = msg;
}

function goHome(){
  window.location.href = "/dashboard.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function startSession(){
  const first = first.value.trim();
  const last = last.value.trim();

  if(!first || !last){
    log("❌ Missing name");
    return;
  }

  consignerCode = (first.slice(0,3)+last.slice(0,3)).toUpperCase();

  code.innerText = "Consigner Code: "+consignerCode;
  itemSection.classList.remove("hidden");

  sessionStarted = true;

  log("✅ Session started");
}

async function safeJSON(res){
  const text = await res.text();
  try{
    return JSON.parse(text);
  }catch{
    throw new Error("Server returned non-JSON: "+text.substring(0,100));
  }
}

async function addItem(){

  if(!sessionStarted){
    log("❌ Start session first");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const file = document.getElementById("photo").files[0];

  if(!title){
    log("❌ Missing title");
    return;
  }

  let photoPath = null;

  try{

    // UPLOAD
    if(file){
      log("📸 Uploading...");

      const formData = new FormData();
      formData.append("photo", file);

      const uploadRes = await fetch("/upload",{method:"POST",body:formData});
      const uploadData = await safeJSON(uploadRes);

      if(!uploadData.success){
        log("❌ Upload failed");
        return;
      }

      photoPath = uploadData.path;
      log("✅ Upload OK");
    }

    // LOT CODE
    log("🔢 Getting lot...");

    const lotRes = await fetch("/next-lot-code");
    const lotData = await safeJSON(lotRes);

    const lotCode = lotData.lotCode;

    log("💾 Saving...");

    const res = await fetch("/addItems",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        items:[{
          title,
          consignerCode,
          lotCode,
          itemNumber:1,
          partCount:1,
          createdBy:"mobile",
          createdAt:new Date().toISOString(),
          photo:photoPath
        }]
      })
    });

    const data = await safeJSON(res);

    if(!data.success){
      log("❌ Save failed: "+data.message);
      return;
    }

    log("✅ SAVED");

    renderLabel(title,lotCode);

  }catch(err){
    log("❌ ERROR: "+err.message);
  }
}

function renderLabel(title,lotCode){
  const id = Date.now();

  labels.innerHTML += `
    <div class="label">
      <canvas id="qr-${id}"></canvas>
      <div>
        <strong>${title}</strong><br>
        ${lotCode}<br>
        ${consignerCode}
      </div>
    </div>
  `;

  QRCode.toCanvas(document.getElementById(`qr-${id}`), lotCode);
}
</script>

</body>
</html>
