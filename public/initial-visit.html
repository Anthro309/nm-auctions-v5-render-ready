<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit - NM Auctions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    .box {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: white;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .print-btn {
      background: #22c55e;
    }

    .grid {
      margin-top: 15px;
    }

    .card {
      background: #111827;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🏠 Initial Visit</h1>
  <p id="user"></p>

  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">

  <button onclick="startVisit()">Start Visit</button>

  <h3 id="code"></h3>

  <div id="section" style="display:none; margin-top:20px;">

    <input id="itemName" placeholder="Item Name">

    <input type="file" id="photoInput" accept="image/*" capture="environment">

    <button onclick="addItem()">Add Item</button>

    <!-- PRINT -->
    <button class="print-btn" onclick="printReport()">
      🖨 Print Consigner Report
    </button>

    <div id="list" class="grid"></div>

  </div>

  <button onclick="back()">⬅ Back</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

document.getElementById('user').innerText =
  "Logged in as " + user.name;

let consigner = null;
let items = [];

// GENERATE CODE
function genCode(f, l) {
  return (f.slice(0,3) + l.slice(0,3)).toUpperCase();
}

// START VISIT
function startVisit() {
  const f = first.value.trim();
  const l = last.value.trim();

  if (!f || !l) return alert("Enter full name");

  consigner = {
    name: f + " " + l,
    code: genCode(f, l)
  };

  code.innerText = "Consigner Code: " + consigner.code;
  section.style.display = "block";
}

// UPLOAD PHOTO
async function uploadPhoto(file) {
  const form = new FormData();
  form.append("photo", file);

  const res = await fetch('/upload', {
    method: 'POST',
    body: form
  });

  const data = await res.json();
  return data.path;
}

// ADD ITEM
async function addItem() {
  const name = itemName.value.trim();
  const file = photoInput.files[0];

  if (!name) return alert("Enter item name");

  let photoPath = null;

  if (file) {
    photoPath = await uploadPhoto(file);
  }

  const item = {
    name,
    consigner: consigner.name,
    code: consigner.code,
    number: items.length + 1,
    photos: photoPath ? [photoPath] : []
  };

  await fetch('/items', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(item)
  });

  items.push(item);
  render();

  itemName.value = "";
  photoInput.value = "";
}

// RENDER ITEMS
function render() {
  list.innerHTML = "";

  items.forEach(i=>{
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <b>${i.code}-${i.number}</b><br>
      ${i.name}
    `;

    list.appendChild(div);
  });
}

// PRINT REPORT (PRO VERSION)
function printReport() {
  if (!items.length) {
    alert("No items to print");
    return;
  }

  const logoUrl = "/logo.png";

  let rows = "";
  items.forEach(i => {
    rows += `
      <tr>
        <td>${i.code}-${i.number}</td>
        <td>${i.name}</td>
      </tr>
    `;
  });

  const html = `
  <html>
  <head>
    <title>Consigner Report</title>
    <style>
      body {
        font-family: Arial;
        padding: 40px;
        color: #000;
      }

      .header {
        text-align: center;
      }

      .logo {
        width: 220px;
        margin-bottom: 10px;
      }

      h2 {
        margin: 5px 0;
      }

      .info {
        margin-top: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th, td {
        border: 1px solid #ccc;
        padding: 10px;
      }

      th {
        background: #f3f4f6;
      }

      .signature {
        margin-top: 60px;
      }

      .line {
        margin-top: 40px;
        border-top: 1px solid #000;
        width: 300px;
      }
    </style>
  </head>

  <body>

    <div class="header">
      <img src="${logoUrl}" class="logo">
      <h2>Consignment Intake Report</h2>
    </div>

    <div class="info">
      <p><strong>Consigner:</strong> ${consigner.name}</p>
      <p><strong>Code:</strong> ${consigner.code}</p>
      <p><strong>Date:</strong> ${new Date().toLocaleDateString()}</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Item Code</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>

    <div class="signature">
      <p>Consigner Signature:</p>
      <div class="line"></div>
    </div>

  </body>
  </html>
  `;

  const win = window.open('', '', 'width=900,height=700');
  win.document.write(html);
  win.document.close();
  win.print();
}

// BACK
function back() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
