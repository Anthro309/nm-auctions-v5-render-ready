<!DOCTYPE html>
<html>
<head>
  <title>Initial Visit</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1b2b;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 200px;
    }

    .container {
      background: #f3f4f6;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary {
      background: #1d4ed8;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
    }

    .success {
      background: #22c55e;
      color: white;
    }

    .danger {
      background: #ef4444;
      color: white;
    }

    canvas {
      width: 100%;
      height: 180px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
    }

    .item {
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <!-- CONSIGNER -->
  <div class="card">
    <div class="title">Initial Visit</div>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">

    <button class="primary" onclick="startVisit()">Start Visit</button>

    <p id="code"></p>
  </div>

  <!-- ITEMS -->
  <div class="card" id="section" style="display:none;">
    <div class="title">Items</div>

    <input id="itemName" placeholder="Item Name">

    <button class="primary" onclick="addItem()">Add Item</button>

    <div id="list"></div>
  </div>

  <!-- SIGNATURE -->
  <div class="card" id="sigBox" style="display:none;">
    <div class="title">Consigner Signature</div>

    <canvas id="signaturePad"></canvas>

    <button class="danger" onclick="clearSignature()">Clear</button>
  </div>

  <!-- ACTIONS -->
  <div class="card" id="actions" style="display:none;">
    <button class="success" onclick="printReport()">🖨 Print Report</button>
    <button class="secondary" onclick="back()">⬅ Back</button>
  </div>

</div>

<script>
let consigner = null;
let items = [];

function genCode(f,l){
  return (f.slice(0,3)+l.slice(0,3)).toUpperCase();
}

function startVisit(){
  const f = first.value.trim();
  const l = last.value.trim();

  if(!f||!l) return alert("Enter name");

  consigner = {
    name: f+" "+l,
    code: genCode(f,l)
  };

  code.innerText = "Code: "+consigner.code;

  section.style.display="block";
  sigBox.style.display="block";
  actions.style.display="block";
}

function addItem(){
  const name = itemName.value.trim();
  if(!name) return;

  const item = {
    name,
    code: consigner.code,
    number: items.length+1
  };

  items.push(item);
  render();

  itemName.value="";
}

function render(){
  list.innerHTML="";

  items.forEach(i=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerText = `${i.code}-${i.number} — ${i.name}`;
    list.appendChild(div);
  });
}

/* SIGNATURE */
const canvas = document.getElementById('signaturePad');
const ctx = canvas.getContext('2d');

let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=(e)=>{
  if(!drawing) return;
  ctx.lineWidth=2;
  ctx.lineCap="round";
  ctx.strokeStyle="#000";

  ctx.lineTo(e.offsetX,e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX,e.offsetY);
};

function clearSignature(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* PRINT */
function printReport(){
  const sig = canvas.toDataURL();

  let rows="";
  items.forEach(i=>{
    rows+=`<tr><td>${i.code}-${i.number}</td><td>${i.name}</td></tr>`;
  });

  const html=`
  <html>
  <body style="font-family:Arial;padding:40px;">
    <img src="/logo.png" width="200">

    <h2>Consignment Intake Report</h2>

    <p><b>Consigner:</b> ${consigner.name}</p>
    <p><b>Code:</b> ${consigner.code}</p>

    <table border="1" cellspacing="0" cellpadding="8" width="100%">
      <tr><th>Item</th><th>Description</th></tr>
      ${rows}
    </table>

    <h3>Signature</h3>
    <img src="${sig}" width="300">
  </body>
  </html>
  `;

  const win = window.open('');
  win.document.write(html);
  win.document.close();
  win.print();
}

function back(){
  window.location.href="/dashboard.html";
}
</script>

</body>
</html>
