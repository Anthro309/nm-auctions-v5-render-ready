<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #0b1b2b;
  color: white;
  padding: 15px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 22px;
  cursor: pointer;
}

/* CARD */
.card {
  background: #13283b;
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 18px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
}

/* BUTTON */
button {
  margin-top: 12px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  width: 100%;
  font-size: 15px;
}

button.secondary {
  background: #16a34a;
}

/* STATUS */
.status {
  background: #081421;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  font-size: 14px;
}

/* LABEL PREVIEW */
.label {
  background: white;
  color: black;
  border-radius: 14px;
  padding: 12px;
  display: flex;
  gap: 12px;
  margin-top: 12px;
  align-items: center;
}

.qr {
  width: 85px;
  height: 85px;
}

.hidden {
  display: none;
}

/* PRINT */
#printSheet { display:none; }

@media print {
  body * { visibility:hidden; }

  #printSheet, #printSheet * {
    visibility:visible;
  }

  #printSheet {
    position:absolute;
    top:0;
    left:0;
    width:100%;
  }

  .sheet {
    display:grid;
    grid-template-columns: repeat(3, 2.625in);
    grid-auto-rows: 1in;
    width:8.5in;
  }

  .print-label {
    display:flex;
    gap:6px;
    align-items:center;
    padding:4px;
  }

  .print-qr {
    width:0.7in;
    height:0.7in;
  }

  .print-text {
    font-size:10px;
    color:black;
    line-height:1.1;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1 onclick="goHome()">Auction Legacy</h1>
  <div onclick="logout()">Logout</div>
</div>

<div id="status" class="status">Ready.</div>

<!-- START VISIT -->
<div class="card">
  <h2>Initial Visit</h2>
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button onclick="startVisit()">Start Visit</button>
  <div id="codeDisplay" style="margin-top:10px;font-weight:bold;"></div>
</div>

<!-- ADD ITEM -->
<div id="itemSection" class="card hidden">
  <h2>Add Item</h2>

  <input id="itemName" placeholder="Item Name">
  <textarea id="itemDescription" placeholder="Quick description"></textarea>
  <input id="itemCategory" placeholder="Category">
  <input id="itemCondition" placeholder="Condition">

  <!-- CAMERA FIX -->
  <input type="file" id="photo" accept="image/*" capture="environment">

  <button onclick="analyzePhoto()">Analyze Photo with AI</button>
  <button onclick="addItem()">Add Item</button>
  <button class="secondary" onclick="endVisit()">End Visit & Print Labels</button>
</div>

<!-- LABELS -->
<div id="labels"></div>

<!-- PRINT -->
<div id="printSheet"></div>

<script>
let session = null;
let items = [];
let currentPhotoPath = null;

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function goHome(){
  window.location.href = "/dashboard.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function startVisit(){
  const first = document.getElementById("first").value.trim();
  const last = document.getElementById("last").value.trim();

  if(!first || !last){
    alert("Enter name");
    return;
  }

  session = {
    first,
    last,
    code:(first.slice(0,3)+last.slice(0,3)).toUpperCase(),
    date:new Date().toLocaleDateString()
  };

  document.getElementById("codeDisplay").innerText = "Code: " + session.code;
  document.getElementById("itemSection").classList.remove("hidden");

  setStatus("Visit started");
}

async function uploadPhoto(){
  const file = document.getElementById("photo").files[0];
  if(!file) return null;

  const form = new FormData();
  form.append("photo", file);

  const res = await fetch("/upload", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  if(!data.success){
    throw new Error("Upload failed");
  }

  return data.path;
}

async function analyzePhoto(){
  if(!session){
    alert("Start visit first");
    return;
  }

  try{
    setStatus("Uploading...");
    currentPhotoPath = await uploadPhoto();

    setStatus("AI thinking...");

    const res = await fetch("/analyze-image",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        imageUrl: window.location.origin + currentPhotoPath
      })
    });

    const data = await res.json();

    if(!data.success){
      throw new Error(data.message);
    }

    itemName.value = data.title || "";
    itemDescription.value = data.description || "";
    itemCategory.value = data.category || "";
    itemCondition.value = data.condition || "";

    setStatus("AI filled fields");
  }catch(err){
    setStatus("AI failed");
  }
}

async function addItem(){
  if(!session){
    alert("Start visit first");
    return;
  }

  let name = itemName.value.trim();
  if(!name){
    alert("Enter item name");
    return;
  }

  if(!currentPhotoPath){
    currentPhotoPath = await uploadPhoto();
  }

  const month = "ABCDEFGHIJKL"[new Date().getMonth()];
  const lotRes = await fetch(`/next-lot-code?month=${month}`);
  const lotData = await lotRes.json();

  const lotCode = lotData.lotCode;

  await fetch("/addItems",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      items:[{
        title:name,
        description:itemDescription.value,
        category:itemCategory.value,
        condition:itemCondition.value,
        consignerFirstName:session.first,
        consignerLastName:session.last,
        consignerCode:session.code,
        lotCode,
        photo:currentPhotoPath,
        createdBy:"Fabian"
      }]
    })
  });

  items.push({ name, lotCode });

  renderLabels();

  itemName.value="";
  itemDescription.value="";
  itemCategory.value="";
  itemCondition.value="";
  photo.value="";
  currentPhotoPath=null;

  setStatus("Item added");
}

function renderLabels(){
  const container = document.getElementById("labels");

  container.innerHTML = items.map(i=>`
    <div class="label">
      <canvas id="qr-${i.lotCode}" class="qr"></canvas>
      <div>
        <strong>${i.name}</strong><br>
        ${i.lotCode}<br>
        ${session.code}
      </div>
    </div>
  `).join("");

  items.forEach(i=>{
    QRCode.toCanvas(
      document.getElementById(`qr-${i.lotCode}`),
      i.lotCode
    );
  });
}

function endVisit(){
  if(!items.length){
    alert("No items");
    return;
  }

  if(confirm("Print labels now?")){
    buildPrint();
    window.print();
  }

  location.reload();
}

function buildPrint(){
  const sheet = document.getElementById("printSheet");

  sheet.innerHTML = `
    <div class="sheet">
      ${items.map(i=>`
        <div class="print-label">
          <canvas id="pqr-${i.lotCode}" class="print-qr"></canvas>
          <div class="print-text">
            <strong>${i.name}</strong>
            ${i.lotCode}<br>
            ${session.code}<br>
            ${session.date}
          </div>
        </div>
      `).join("")}
    </div>
  `;

  items.forEach(i=>{
    QRCode.toCanvas(
      document.getElementById(`pqr-${i.lotCode}`),
      i.lotCode
    );
  });
}
</script>

</body>
</html>
