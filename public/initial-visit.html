<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1b2b;
  color:white;
  padding:15px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h1 {
  font-size:20px;
  cursor:pointer;
}

.card {
  background:#13283b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  width:100%;
  font-weight:bold;
}

.hidden {
  display:none;
}

.label {
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  margin-top:10px;
}

.qr {
  width:80px;
  height:80px;
}
</style>
</head>

<body>

<div class="header">
  <h1 onclick="goDashboard()">Auction Legacy</h1>
  <div onclick="logout()">Logout</div>
</div>

<!-- START VISIT -->
<div class="card">
  <h2>Initial Visit</h2>
  <input id="first" placeholder="First Name">
  <input id="last" placeholder="Last Name">
  <button onclick="startVisit()">Start Visit</button>
</div>

<!-- ADD ITEM -->
<div id="itemSection" class="card hidden">
  <h2>Add Item</h2>
  <input id="itemName" placeholder="Item Name">
  <input type="file" id="photo">
  <button onclick="addItem()">Add Item + Print Label</button>
</div>

<!-- LABELS -->
<div id="labels"></div>

<script>

let session = null;
let items = [];

function goDashboard(){
  window.location.href = "/dashboard.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

function startVisit(){
  const first = document.getElementById("first").value.trim();
  const last = document.getElementById("last").value.trim();

  if(!first || !last){
    alert("Enter name");
    return;
  }

  session = {
    first,
    last,
    code: (first.slice(0,3)+last.slice(0,3)).toUpperCase()
  };

  document.getElementById("itemSection").classList.remove("hidden");
}

async function addItem(){
  if(!session){
    alert("Start visit first");
    return;
  }

  const name = document.getElementById("itemName").value;
  const file = document.getElementById("photo").files[0];

  if(!name){
    alert("Enter item name");
    return;
  }

  let photoPath = null;

  // UPLOAD IMAGE
  if(file){
    const formData = new FormData();
    formData.append("photo", file);

    const uploadRes = await fetch("/upload", {
      method:"POST",
      body:formData
    });

    const uploadData = await uploadRes.json();

    if(!uploadData.success){
      alert("Upload failed");
      return;
    }

    photoPath = uploadData.path;
  }

  // GET LOT CODE
  const month = "ABCDEFGHIJKL"[new Date().getMonth()];
  const lotRes = await fetch(`/next-lot-code?month=${month}`);
  const lotData = await lotRes.json();

  const lotCode = lotData.lotCode;

  // SAVE ITEM
  const res = await fetch("/addItems", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      items:[{
        title:name,
        consignerFirstName:session.first,
        consignerLastName:session.last,
        consignerCode:session.code,
        lotCode,
        photo:photoPath,
        createdBy:"Fabian"
      }]
    })
  });

  const data = await res.json();

  if(!data.success){
    alert(data.message || "Something broke");
    return;
  }

  items.push({name, lotCode});

  renderLabels();
}

function renderLabels(){
  const container = document.getElementById("labels");

  container.innerHTML = items.map(item=>`
    <div class="label">
      <canvas id="qr-${item.lotCode}" class="qr"></canvas>
      <div>
        <strong>${item.name}</strong><br>
        Lot ${item.lotCode}
      </div>
    </div>
  `).join("");

  items.forEach(item=>{
    QRCode.toCanvas(
      document.getElementById(`qr-${item.lotCode}`),
      item.lotCode
    );
  });
}

</script>

</body>
</html>
