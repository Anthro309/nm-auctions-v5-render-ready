<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Visit</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link rel="stylesheet" href="/styles.css">
<style>
.iv-card {
  background:#13283b;
  padding:18px;
  border-radius:18px;
  margin-bottom:18px;
}

input, textarea {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  box-sizing:border-box;
  font-size:16px;
}

.iv-btn {
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  width:100%;
  font-size:16px;
  cursor:pointer;
}

.iv-btn.green {
  background:#16a34a;
}

.loader {
  margin-top:10px;
  height:6px;
  background:#1e3a5f;
  border-radius:10px;
  overflow:hidden;
  display:none;
}

.loader-bar {
  height:100%;
  width:0%;
  background:#3b82f6;
  animation: loading 1s infinite;
}

@keyframes loading {
  0% { width:0% }
  50% { width:80% }
  100% { width:0% }
}

.status {
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  background: #081421;
  color: #dbeafe;
  font-size: 14px;
}

.label {
  background:white;
  color:black;
  border-radius:14px;
  padding:12px;
  display:flex;
  gap:12px;
  margin-top:12px;
  align-items:center;
}

.qr {
  width:85px;
  height:85px;
  flex-shrink:0;
}

#printSheet { display:none; }

@media print {
  body * { visibility:hidden; }
  #printSheet, #printSheet * { visibility:visible; }
  #printSheet {
    position:absolute;
    top:0; left:0;
    width:100%;
    display:block;
  }
  .sheet {
    display:grid;
    grid-template-columns: repeat(3, 2.625in);
    grid-auto-rows: 1in;
    width:8.5in;
  }
  .print-label {
    display:flex;
    gap:6px;
    padding:4px;
    align-items:center;
  }
  .print-qr {
    width:0.7in;
    height:0.7in;
  }
  .print-text {
    font-size:10px;
    color:black;
    line-height:1.1;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/scanner.html">Scanner</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

<div class="iv-card">
  <h2>Initial Visit</h2>
  <input id="firstInput" placeholder="First Name">
  <input id="lastInput" placeholder="Last Name">
  <button class="iv-btn" onclick="startVisit()">Start Visit</button>
  <div id="codeDisplay" class="status" style="display:none;"></div>
</div>

<div id="itemSection" class="iv-card" style="display:none;">
  <h2>Add Item</h2>
  <input id="itemName" placeholder="Item Name">
  <textarea id="itemDescription" placeholder="Description" rows="3"></textarea>
  <input id="itemCategory" placeholder="Category">
  <input id="itemCondition" placeholder="Condition">
  <input type="file" id="photo" accept="image/*" capture="environment" style="margin-top:12px;">
  <div class="loader" id="loader">
    <div class="loader-bar"></div>
  </div>
  <button class="iv-btn" onclick="analyzePhoto()">📷 Analyze Photo with AI</button>
  <button class="iv-btn" onclick="addItem()">Add Item</button>
  <button class="iv-btn green" onclick="endVisit()">🖨️ End Visit & Print Labels</button>
  <div id="statusBox" class="status">Ready.</div>
</div>

</div>

<div id="labels" style="padding:0 16px;"></div>
<div id="printSheet"></div>

<script>
let session = null;
let items = [];
let currentPhotoPath = null;

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function setStatus(message) {
  const box = document.getElementById('statusBox');
  if (box) box.innerText = message;
}

function showLoader() {
  document.getElementById('loader').style.display = 'block';
}

function hideLoader() {
  document.getElementById('loader').style.display = 'none';
}

function safeFilenameRequired() {
  const file = document.getElementById('photo').files[0];
  return !!file;
}

async function safeJson(res) {
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error('Server returned invalid response');
  }
}

function startVisit() {
  const first = document.getElementById('firstInput').value.trim();
  const last = document.getElementById('lastInput').value.trim();
  if (!first || !last) { alert('Enter name'); return; }

  session = {
    first,
    last,
    code: (first.slice(0, 3) + last.slice(0, 3)).toUpperCase(),
    date: new Date().toLocaleDateString()
  };

  const codeDisplay = document.getElementById('codeDisplay');
  codeDisplay.style.display = 'block';
  codeDisplay.innerText = 'Code: ' + session.code;
  document.getElementById('itemSection').style.display = 'block';
  setStatus('Visit started.');
}

async function uploadPhoto() {
  const file = document.getElementById('photo').files[0];
  if (!file) return null;
  const form = new FormData();
  form.append('photo', file);
  const res = await fetch('/upload', { method: 'POST', body: form });
  const data = await safeJson(res);
  if (!data.success) throw new Error(data.message || 'Upload failed');
  return data.path;
}

async function analyzePhoto() {
  if (!session) { alert('Start visit first'); return; }
  if (!safeFilenameRequired()) { alert('Choose or take a photo first'); return; }
  try {
    showLoader();
    setStatus('Uploading photo...');
    currentPhotoPath = await uploadPhoto();
    setStatus('Analyzing photo...');
    const res = await fetch('/analyze-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageUrl: window.location.origin + currentPhotoPath })
    });
    const data = await safeJson(res);
    if (!data.success) throw new Error(data.message || 'AI failed');
    document.getElementById('itemName').value = data.title || '';
    document.getElementById('itemDescription').value = data.description || '';
    document.getElementById('itemCategory').value = data.category || '';
    document.getElementById('itemCondition').value = data.condition || '';
    setStatus('AI filled item details.');
  } catch (err) {
    setStatus('AI failed: ' + err.message);
    alert('AI failed: ' + err.message);
  } finally {
    hideLoader();
  }
}

async function addItem() {
  if (!session) { alert('Start visit first'); return; }
  const name = document.getElementById('itemName').value.trim();
  const description = document.getElementById('itemDescription').value.trim();
  const category = document.getElementById('itemCategory').value.trim();
  const condition = document.getElementById('itemCondition').value.trim();
  if (!name) { alert('Enter item name'); return; }

  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const createdBy = user.name || 'unknown';

  try {
    showLoader();
    setStatus('Preparing item...');
    if (!currentPhotoPath && safeFilenameRequired()) {
      currentPhotoPath = await uploadPhoto();
    }
    const month = 'ABCDEFGHIJKL'[new Date().getMonth()];
    const lotRes = await fetch(`/next-lot-code?month=${month}`);
    const lotData = await safeJson(lotRes);
    if (!lotData.success || !lotData.lotCode) throw new Error('Could not get lot code');
    const lotCode = lotData.lotCode;

    const res = await fetch('/addItems', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: [{
          title: name,
          description,
          category,
          condition,
          consignerFirstName: session.first,
          consignerLastName: session.last,
          consignerCode: session.code,
          lotCode,
          photo: currentPhotoPath,
          createdBy
        }]
      })
    });

    const result = await safeJson(res);
    if (!result.success) throw new Error(result.message || 'Save failed');

    items.push({ name, description, category, condition, lotCode });
    renderLabels();

    document.getElementById('itemName').value = '';
    document.getElementById('itemDescription').value = '';
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemCondition').value = '';
    document.getElementById('photo').value = '';
    currentPhotoPath = null;
    setStatus('Item added. Add another or end visit.');
  } catch (err) {
    setStatus('Add item failed: ' + err.message);
    alert('Add item failed: ' + err.message);
  } finally {
    hideLoader();
  }
}

function renderLabels() {
  const container = document.getElementById('labels');
  container.innerHTML = items.map(i => `
    <div class="label">
      <canvas id="qr-${i.lotCode}" class="qr"></canvas>
      <div>
        <strong>${escapeHtml(i.name)}</strong><br>
        ${escapeHtml(i.lotCode)}<br>
        ${escapeHtml(session.code)}
      </div>
    </div>
  `).join('');
  items.forEach(i => {
    QRCode.toCanvas(document.getElementById(`qr-${i.lotCode}`), i.lotCode);
  });
}

async function endVisit() {
  if (!items.length) { alert('No items added yet'); return; }
  if (confirm('Print labels for ' + items.length + ' item(s)?')) {
    await buildPrint();
    setTimeout(() => { window.print(); }, 700);
  }
}

async function buildPrint() {
  const sheet = document.getElementById('printSheet');
  sheet.innerHTML = `
    <div class="sheet">
      ${items.map(i => `
        <div class="print-label">
          <canvas id="pqr-${i.lotCode}" class="print-qr"></canvas>
          <div class="print-text">
            <strong>${escapeHtml(i.name)}</strong><br>
            ${escapeHtml(i.lotCode)}<br>
            ${escapeHtml(session.code)}<br>
            ${escapeHtml(session.date)}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  for (const i of items) {
    await QRCode.toCanvas(document.getElementById(`pqr-${i.lotCode}`), i.lotCode);
  }
  setStatus('Labels ready to print.');
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>

</body>
</html>
