<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner | Auction Legacy</title>
<link rel="stylesheet" href="/styles.css">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
.item-name {
  font-size: 22px;
  font-weight: 800;
  color: #111827;
  margin-bottom: 6px;
}
.item-lot {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 6px;
}
.item-stage {
  display: inline-block;
  background: #eff6ff;
  color: #1d4ed8;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 14px;
}
.btn-advance {
  width: 100%;
  background: #16a34a;
  color: white;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s;
}
.btn-advance:hover {
  background: #15803d;
  transform: translateY(-1px);
}
.scan-input {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.04em;
  padding: 18px !important;
}
.btn-camera {
  width: 100%;
  background: #0b1b2b;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.15s;
}
.btn-camera:hover { background: #1a3a5c; }
.btn-stop {
  width: 100%;
  background: #dc2626;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}
#cameraVideo {
  width: 100%;
  border-radius: 12px;
  background: #000;
  display: block;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div id="statusBar" class="status-bar">Ready to scan...</div>

  <div class="card">
    <input id="scanInput" class="scan-input" placeholder="Scan or enter lot code" autofocus>
    <button class="btn-camera" onclick="startCamera()">📷 Use Camera to Scan QR</button>
  </div>

  <div id="cameraCard" class="card" style="display:none;">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas" style="display:none;"></canvas>
    <button class="btn-stop" onclick="stopCamera()">✕ Cancel Camera</button>
  </div>

  <div id="itemBox" class="card" style="display:none;">
    <div class="item-name" id="itemName"></div>
    <div class="item-lot" id="lotDisplay"></div>
    <div class="item-stage" id="stageDisplay"></div>
    <button class="btn-advance" onclick="advanceStage()">Move to Next Stage →</button>
  </div>

</div>

<script>
const stages = [
  "Received at Studio",
  "Review & Cleaning",
  "Photograph",
  "Prep for Pickup",
  "Picked Up"
];

let currentItem = null;

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function log(msg) {
  document.getElementById('statusBar').innerText = msg;
}

document.getElementById('scanInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    loadItem(this.value.trim());
  }
});

// ── CAMERA QR SCANNING ──
let cameraStream = null;
let scanLoop = null;

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('cameraVideo');
    video.srcObject = cameraStream;
    document.getElementById('cameraCard').style.display = 'block';
    log('Point camera at a QR code...');

    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      scanLoop = setInterval(async () => {
        try {
          const codes = await detector.detect(video);
          if (codes.length) {
            stopCamera();
            document.getElementById('scanInput').value = codes[0].rawValue;
            loadItem(codes[0].rawValue);
          }
        } catch {}
      }, 400);
    } else {
      // jsQR fallback
      const canvas = document.getElementById('cameraCanvas');
      const ctx = canvas.getContext('2d');
      scanLoop = setInterval(() => {
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if (code) {
          stopCamera();
          document.getElementById('scanInput').value = code.data;
          loadItem(code.data);
        }
      }, 400);
    }
  } catch (err) {
    log('Camera error: ' + err.message);
  }
}

function stopCamera() {
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraCard').style.display = 'none';
}

async function loadItem(lotCode) {
  if (!lotCode) { log('No code entered'); return; }

  log('Looking up...');

  try {
    const res = await fetch(`/items/by-lot/${lotCode}`);
    const item = await res.json();

    if (!item) { log('Item not found'); return; }

    currentItem = item;

    document.getElementById('itemBox').style.display = 'block';
    document.getElementById('itemName').innerText = item.name || 'No name';
    document.getElementById('stageDisplay').innerText = item.stage;
    document.getElementById('lotDisplay').innerText = 'Lot: ' + item.lotNumber;

    log('Loaded: ' + (item.name || item.lotNumber));

  } catch (err) {
    log('Error loading item');
  }
}

async function advanceStage() {
  if (!currentItem) { log('No item loaded'); return; }

  const currentIndex = stages.indexOf(currentItem.stage);
  if (currentIndex === -1 || currentIndex === stages.length - 1) {
    log('Already at final stage');
    return;
  }

  const nextStage = stages[currentIndex + 1];
  log('Moving to ' + nextStage + '...');

  try {
    const res = await fetch(`/items/${currentItem.id}/stage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage: nextStage, employee: 'scanner' })
    });

    const data = await res.json();
    if (!data.success) { log('Failed to advance stage'); return; }

    currentItem = data.item;
    document.getElementById('stageDisplay').innerText = currentItem.stage;
    log('Moved to ' + nextStage);

    setTimeout(() => {
      document.getElementById('scanInput').value = '';
      document.getElementById('itemBox').style.display = 'none';
      currentItem = null;
      log('Ready to scan...');
    }, 1500);

  } catch (err) {
    log('Error advancing stage');
  }
}
</script>

<script src="/nav.js"></script>
</body>
</html>
