<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner | Auction Legacy</title>
<link rel="stylesheet" href="/styles.css">
<style>
.item-name {
  font-size: 22px;
  font-weight: 800;
  color: #111827;
  margin-bottom: 6px;
}
.item-lot {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 6px;
}
.item-stage {
  display: inline-block;
  background: #eff6ff;
  color: #1d4ed8;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 14px;
}
.scan-recorded {
  width: 100%;
  background: #16a34a;
  color: white;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  display: none;
}
.item-last-handled {
  font-size: 13px;
  color: #6b7280;
  margin-top: 6px;
}
.scan-input {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.04em;
  padding: 18px !important;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> AI Photo Studio</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="page-header-block">
    <div class="page-header-icon">📷</div>
    <div>
      <div class="page-header-title">Scanner</div>
      <div class="page-header-sub">Scan items &amp; advance workflow stages</div>
    </div>
  </div>

  <div id="statusBar" class="status-bar">Ready to scan...</div>

  <div class="card">
    <input id="scanInput" class="scan-input" placeholder="Scan or enter lot code" autofocus>
  </div>

  <div id="itemBox" class="card" style="display:none;">
    <div class="item-name" id="itemName"></div>
    <div class="item-lot" id="lotDisplay"></div>
    <div class="item-stage" id="stageDisplay"></div>
    <div class="item-last-handled" id="lastHandledDisplay"></div>
    <div class="scan-recorded" id="scanRecorded">✓ Scan Recorded</div>
  </div>

</div>

<script>
let currentItem = null;

function getEmployee() {
  try {
    const u = JSON.parse(localStorage.getItem('user') || 'null');
    return (u && u.name) ? u.name : 'unknown';
  } catch { return 'unknown'; }
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function log(msg) {
  document.getElementById('statusBar').innerText = msg;
}

document.getElementById('scanInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    loadItem(this.value.trim());
  }
});

async function loadItem(lotCode) {
  if (!lotCode) { log('No code entered'); return; }

  log('Looking up...');

  try {
    const res = await fetch(`/items/by-lot/${lotCode}`);
    const item = await res.json();

    if (!item) { log('Item not found'); return; }

    currentItem = item;

    document.getElementById('itemBox').style.display = 'block';
    document.getElementById('itemName').innerText = item.name || 'No name';
    document.getElementById('stageDisplay').innerText = item.stage;
    document.getElementById('lotDisplay').innerText = 'Lot: ' + item.lotNumber;

    const lastEl = document.getElementById('lastHandledDisplay');
    if (item.lastHandledBy) {
      lastEl.innerText = 'Last handled by: ' + item.lastHandledBy;
    } else {
      lastEl.innerText = '';
    }

    document.getElementById('scanRecorded').style.display = 'none';
    log('Loaded: ' + (item.name || item.lotNumber));

    // Auto-record this employee's scan
    recordScan(item.id);

  } catch (err) {
    log('Error loading item');
  }
}

async function recordScan(itemId) {
  try {
    const res = await fetch(`/items/${itemId}/scan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ employee: getEmployee() })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('lastHandledDisplay').innerText = 'Last handled by: ' + getEmployee();
      document.getElementById('scanRecorded').style.display = 'block';
      setTimeout(() => {
        document.getElementById('scanInput').value = '';
        document.getElementById('itemBox').style.display = 'none';
        document.getElementById('scanRecorded').style.display = 'none';
        currentItem = null;
        log('Ready to scan...');
      }, 1800);
    }
  } catch (err) {
    log('Error recording scan');
  }
}
</script>

</body>
</html>
