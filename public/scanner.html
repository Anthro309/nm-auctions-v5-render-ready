  font-weight: 800;
  color: #111827;
  margin-bottom: 6px;
}
.item-lot {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 6px;
}
.item-stage {
  display: inline-block;
  background: #eff6ff;
  color: #1d4ed8;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 14px;
}
.btn-checkin {
  width: 100%;
  background: #16a34a;
  color: white;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}
.btn-checkin:active { background: #15803d; }
.scan-recorded {
  width: 100%;
  background: #16a34a;
  color: white;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  display: none;
}
.item-last-handled {
  font-size: 13px;
  color: #6b7280;
  margin-top: 6px;
}
.search-results {
  margin-top: 10px;
}
.search-result-row {
  display: flex;
  flex-direction: column;
  padding: 12px 14px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  background: white;
}
.search-result-row:active { background: #f1f5f9; }
.search-result-name { font-size: 14px; font-weight: 700; color: #111827; }
.search-result-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
.scan-input {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.04em;
  padding: 18px !important;
}
.btn-camera {
  width: 100%;
  background: #0b1b2b;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.15s;
}
.btn-camera:hover { background: #1a3a5c; }
.btn-stop {
  width: 100%;
  background: #dc2626;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}
#cameraVideo {
  width: 100%;
  border-radius: 12px;
  background: #000;
  display: block;
}
</style>
</head>

<body>

  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> AI Photo Studio</a>
    <a href="/intake-estimator.html"><span class="sidebar-icon">💰</span> Intake Estimator</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="page-header-block">
    <div class="page-header-icon">📷</div>
    <div>
      <div class="page-header-title">Scanner</div>
      <div class="page-header-sub">Scan items &amp; advance workflow stages</div>
    </div>
  </div>

  <div id="statusBar" class="status-bar">Ready to scan...</div>

  <div class="card">
    <input id="scanInput" class="scan-input" placeholder="Scan lot code or search by name" autofocus>
    <button class="btn-camera" onclick="startCamera()">📷 Use Camera to Scan QR</button>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div id="cameraCard" class="card" style="display:none;">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas" style="display:none;"></canvas>
    <button class="btn-stop" onclick="stopCamera()">✕ Cancel Camera</button>
  </div>

  <div id="itemBox" class="card" style="display:none;">
    <div class="item-name" id="itemName"></div>
    <div class="item-lot" id="lotDisplay"></div>
    <div class="item-stage" id="stageDisplay"></div>
    <div class="item-last-handled" id="lastHandledDisplay"></div>
    <button class="btn-checkin" id="checkInBtn" style="display:none;" onclick="checkInToStudio()">Check In to Studio →</button>
    <div class="scan-recorded" id="scanRecorded">✓ Scan Recorded</div>
  </div>

</div>

<script>
let currentItem = null;

function getEmployee() {
  try {
    const u = JSON.parse(localStorage.getItem('user') || 'null');
    return (u && u.name) ? u.name : 'unknown';
  } catch { return 'unknown'; }
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function log(msg) {
  document.getElementById('statusBar').innerText = msg;
}

const scanInput = document.getElementById('scanInput');
let searchTimer = null;

scanInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    clearTimeout(searchTimer);
    document.getElementById('searchResults').innerHTML = '';
    loadItem(this.value.trim());
  }
});

scanInput.addEventListener('input', function() {
  clearTimeout(searchTimer);
  const val = this.value.trim();
  if (val.length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
  searchTimer = setTimeout(() => searchByName(val), 350);
});

async function searchByName(q) {
  try {
    const res = await fetch('/items/search?q=' + encodeURIComponent(q));
    const results = await res.json();
    const container = document.getElementById('searchResults');
    container.innerHTML = '';
    if (!results.length) return;
    results.forEach(item => {
      const row = document.createElement('div');
      row.className = 'search-result-row';
      row.innerHTML = `
        <div class="search-result-name">${item.name || 'Unnamed'}</div>
        <div class="search-result-meta">Lot ${item.lotNumber || '—'} · ${item.stage || '—'} · ${item.consigner || '—'}</div>
      `;
      row.onclick = () => {
        container.innerHTML = '';
        scanInput.value = item.lotNumber || '';
        loadItem(item.lotNumber);
      };
      container.appendChild(row);
    });
  } catch (err) { /* silent */ }
}

// ── CAMERA QR SCANNING ──
let cameraStream = null;
let scanLoop = null;

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('cameraVideo');
    video.srcObject = cameraStream;
    document.getElementById('cameraCard').style.display = 'block';
    log('Point camera at a QR code...');

    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      scanLoop = setInterval(async () => {
        try {
          const codes = await detector.detect(video);
          if (codes.length) {
            stopCamera();
            document.getElementById('scanInput').value = codes[0].rawValue;
            loadItem(codes[0].rawValue);
          }
        } catch {}
      }, 400);
    } else {
      // jsQR fallback
      const canvas = document.getElementById('cameraCanvas');
      const ctx = canvas.getContext('2d');
      scanLoop = setInterval(() => {
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if (code) {
          stopCamera();
          document.getElementById('scanInput').value = code.data;
          loadItem(code.data);
        }
      }, 400);
    }
  } catch (err) {
    log('Camera error: ' + err.message);
  }
}

function stopCamera() {
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraCard').style.display = 'none';
}

async function loadItem(lotCode) {
  if (!lotCode) { log('No code entered'); return; }

  log('Looking up...');

  try {
    const res = await fetch(`/items/by-lot/${lotCode}`);
    const item = await res.json();

    if (!item) { log('Item not found'); return; }

    currentItem = item;

    document.getElementById('itemBox').style.display = 'block';
    document.getElementById('itemName').innerText = item.name || 'No name';
    document.getElementById('stageDisplay').innerText = item.stage;
    document.getElementById('lotDisplay').innerText = 'Lot: ' + item.lotNumber;

    const lastEl = document.getElementById('lastHandledDisplay');
    if (item.lastHandledBy) {
      lastEl.innerText = 'Last handled by: ' + item.lastHandledBy;
    } else {
      lastEl.innerText = '';
    }

    document.getElementById('scanRecorded').style.display = 'none';
    document.getElementById('checkInBtn').style.display =
      item.stage === 'Home Visit' ? 'block' : 'none';
    log('Loaded: ' + (item.name || item.lotNumber));

    // Auto-record this employee's scan
    recordScan(item.id);

  } catch (err) {
    log('Error loading item');
  }
}

async function checkInToStudio() {
  if (!currentItem) return;
  document.getElementById('checkInBtn').disabled = true;
  try {
    const res = await fetch(`/items/${currentItem.id}/stage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage: 'Received at Studio', employee: getEmployee() })
    });
    const data = await res.json();
    if (data.success) {
      currentItem = data.item;
      document.getElementById('stageDisplay').innerText = 'Received at Studio';
      document.getElementById('checkInBtn').style.display = 'none';
      document.getElementById('scanRecorded').innerText = '✓ Checked In to Studio';
      document.getElementById('scanRecorded').style.display = 'block';
      log('Checked in: ' + (currentItem.name || currentItem.lotNumber));
      setTimeout(resetScanner, 2000);
    }
  } catch (err) {
    log('Check-in failed');
    document.getElementById('checkInBtn').disabled = false;
  }
}

function resetScanner() {
  document.getElementById('scanInput').value = '';
  document.getElementById('itemBox').style.display = 'none';
  document.getElementById('scanRecorded').style.display = 'none';
  document.getElementById('scanRecorded').innerText = '✓ Scan Recorded';
  currentItem = null;
  log('Ready to scan...');
}

async function recordScan(itemId) {
  try {
    const res = await fetch(`/items/${itemId}/scan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ employee: getEmployee() })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('lastHandledDisplay').innerText = 'Last handled by: ' + getEmployee();
      if (!currentItem || currentItem.stage !== 'Home Visit') {
        document.getElementById('scanRecorded').style.display = 'block';
        setTimeout(resetScanner, 1800);
      }
    }
  } catch (err) {
    log('Error recording scan');
  }
}
</script>

</body>
