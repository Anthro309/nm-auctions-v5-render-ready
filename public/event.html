<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event | Auction Legacy</title>
<link rel="stylesheet" href="/styles.css">
<style>
.lot-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid #f1f5f9;
}
.lot-card:last-child { border-bottom: none; }
.lot-thumb {
  width: 48px; height: 48px; min-width: 48px; border-radius: 10px;
  object-fit: cover; background: #e5e7eb; flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.lot-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lot-info { flex: 1; min-width: 0; }
.lot-name { font-size: 14px; font-weight: 700; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lot-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
.lot-sold { font-size: 13px; font-weight: 800; color: #15803d; }
.lot-payout { font-size: 11px; color: #6b7280; }
.lot-remove {
  background: none; border: none; color: #9ca3af; font-size: 18px;
  cursor: pointer; padding: 4px; border-radius: 6px; line-height: 1;
  flex-shrink: 0;
}
.lot-remove:hover { color: #b91c1c; background: #fef2f2; box-shadow: none; transform: none; }

/* Add lots panel */
.add-lot-wrap { position: relative; }
.add-lot-results {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border: 1.5px solid #e5e7eb; border-radius: 12px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.12); z-index: 10; display: none; overflow: hidden;
}
.add-lot-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-bottom: 1px solid #f3f4f6; cursor: pointer;
}
.add-lot-row:last-child { border-bottom: none; }
.add-lot-row:hover { background: #f8fafc; }

/* Results import */
.csv-area {
  width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e5e7eb;
  font-size: 13px; font-family: monospace; background: #f8fafc; resize: vertical;
  margin-top: 8px; box-sizing: border-box; color: #111827;
}
.import-results-table {
  width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px;
}
.import-results-table th {
  background: #f8fafc; padding: 8px 10px; text-align: left;
  font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase;
  letter-spacing: 0.04em; border-bottom: 1px solid #e5e7eb;
}
.import-results-table td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; }
.import-results-table tr:last-child td { border-bottom: none; }
.payout-total {
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px;
  padding: 14px; margin-top: 12px;
}
.payout-total-label { font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
.payout-total-amount { font-size: 28px; font-weight: 800; color: #15803d; }
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-left" onclick="window.location.href='/events.html'">‹</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="overlay" class="overlay" onclick="document.getElementById('overlay').classList.remove('show')"></div>

<div class="container">

  <div class="page-header-block" id="evHeader">
    <div class="page-header-icon">🏷️</div>
    <div>
      <div class="page-header-title" id="evName">Loading…</div>
      <div class="page-header-sub" id="evMeta"></div>
    </div>
  </div>

  <!-- Status toggle (admin) -->
  <div class="card" id="statusCard" style="display:none;">
    <h3 style="margin-bottom:8px;">Event Status</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="setStatus('upcoming')" id="btnUpcoming" style="flex:1;font-size:13px;padding:10px;">📅 Upcoming</button>
      <button onclick="setStatus('active')"   id="btnActive"   style="flex:1;font-size:13px;padding:10px;background:#16a34a;">🔴 Active</button>
      <button onclick="setStatus('completed')" id="btnCompleted" style="flex:1;font-size:13px;padding:10px;background:#6b7280;">✓ Completed</button>
    </div>
  </div>

  <!-- Assign lots -->
  <div class="card">
    <h3 style="margin-bottom:8px;">Assigned Lots <span id="lotCount" style="font-weight:400;color:#6b7280;"></span></h3>

    <div class="add-lot-wrap" style="margin-bottom:14px;">
      <input id="addLotSearch" placeholder="Search item to add…" oninput="searchToAdd(this)" autocomplete="off" style="margin-top:0;">
      <div class="add-lot-results" id="addLotResults"></div>
    </div>

    <div id="autoAssignRow" style="margin-bottom:12px;display:none;">
      <button onclick="autoAssignAll()" style="width:100%;background:#7c3aed;font-size:13px;padding:11px;">✨ AI: Auto-Assign Ready Items to This Event</button>
      <div id="autoAssignMsg" style="display:none;margin-top:8px;padding:10px;background:#f5f3ff;color:#5b21b6;border-radius:10px;font-size:13px;font-weight:600;"></div>
    </div>

    <div id="lotList"></div>
  </div>

  <!-- Auction Results Import -->
  <div class="card" id="importCard">
    <h3 style="margin-bottom:4px;">Import Auction Results</h3>
    <p style="font-size:13px;color:#6b7280;margin:0 0 10px;">Paste CSV: <code>LotNumber,SoldPrice</code> — one per line. Automatically calculates payouts at <span id="commRate">35</span>% commission.</p>
    <textarea class="csv-area" id="csvInput" rows="6" placeholder="NM-001-A,250.00&#10;NM-002-B,45.00&#10;NM-003-C,120.00"></textarea>
    <button onclick="previewImport()" style="width:100%;margin-top:10px;">Preview Results</button>
    <div id="importPreview" style="display:none;margin-top:12px;"></div>
    <button id="confirmImportBtn" onclick="confirmImport()" style="width:100%;margin-top:10px;background:#16a34a;display:none;">✅ Confirm & Import Results</button>
    <div id="importMsg" style="display:none;margin-top:10px;padding:12px;background:#ecfdf5;color:#047857;border-radius:10px;font-size:13px;font-weight:600;"></div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user) window.location.href = '/';

const evId = new URLSearchParams(window.location.search).get('id');
if (!evId) window.location.href = '/events.html';

let ev = null;
let parsedResults = [];
let searchTimer = null;

async function load() {
  const res = await fetch('/events/' + evId);
  ev = await res.json();

  document.getElementById('evName').innerText = ev.name;
  const dateStr = new Date(ev.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'long', day:'numeric', year:'numeric' });
  document.getElementById('evMeta').innerText = `📅 ${dateStr} · ${ev.status} · ${ev.commissionRate || 35}% commission`;
  document.getElementById('commRate').innerText = ev.commissionRate || 35;

  if (user.isAdmin) {
    document.getElementById('statusCard').style.display = 'block';
    document.getElementById('autoAssignRow').style.display = 'block';
  }

  renderLots();
}

function renderLots() {
  const lots = ev.lotItems || [];
  document.getElementById('lotCount').innerText = '(' + lots.length + ')';

  const list = document.getElementById('lotList');
  if (!lots.length) {
    list.innerHTML = '<div style="color:#6b7280;font-size:13px;padding:8px 0;">No lots assigned yet. Search above to add items.</div>';
    return;
  }

  list.innerHTML = '';
  lots.forEach(item => {
    const div = document.createElement('div');
    div.className = 'lot-card';
    const hasSold = item.soldPrice && item.soldPrice > 0;
    div.innerHTML = `
      <div class="lot-thumb">
        ${item.photos?.[0] ? `<img src="${item.photos[0]}" loading="lazy">` : '📦'}
      </div>
      <div class="lot-info">
        <div class="lot-name">${item.name || 'Unnamed'}</div>
        <div class="lot-meta">Lot ${item.lotNumber || '—'} · ${item.consigner || '—'} · ${item.stage}</div>
        ${hasSold ? `<div class="lot-sold">Sold $${item.soldPrice}</div><div class="lot-payout">Payout $${item.payoutAmount} · ${item.payoutStatus}</div>` : ''}
      </div>
      <button class="lot-remove" onclick="removeLot('${item.id}')" title="Remove from event">✕</button>
    `;
    div.querySelector('.lot-info').onclick = () => window.location.href = '/item.html?id=' + item.id;
    list.appendChild(div);
  });
}

async function removeLot(itemId) {
  if (!confirm('Remove this lot from the event?')) return;
  await fetch(`/events/${evId}/lots/${itemId}`, { method: 'DELETE' });
  await load();
}

function searchToAdd(input) {
  clearTimeout(searchTimer);
  const q = input.value.trim();
  const resultsEl = document.getElementById('addLotResults');
  if (q.length < 2) { resultsEl.style.display = 'none'; return; }

  searchTimer = setTimeout(async () => {
    const res = await fetch(`/items/search?q=${encodeURIComponent(q)}`);
    const items = await res.json();
    const assigned = (ev.lots || []).map(String);
    const available = items.filter(i => !assigned.includes(String(i.id)));

    if (!available.length) { resultsEl.style.display = 'none'; return; }
    resultsEl.innerHTML = available.slice(0, 6).map(i => `
      <div class="add-lot-row" onclick="assignLot('${i.id}')">
        ${i.photos?.[0] ? `<img src="${i.photos[0]}" style="width:32px;height:32px;border-radius:6px;object-fit:cover;" loading="lazy">` : '<div style="width:32px;height:32px;border-radius:6px;background:#e5e7eb;"></div>'}
        <div>
          <div style="font-size:13px;font-weight:700;">${i.name || 'Unnamed'}</div>
          <div style="font-size:11px;color:#6b7280;">Lot ${i.lotNumber || '—'} · ${i.stage}</div>
        </div>
      </div>`).join('');
    resultsEl.style.display = 'block';
  }, 300);
}

async function assignLot(itemId) {
  document.getElementById('addLotResults').style.display = 'none';
  document.getElementById('addLotSearch').value = '';
  await fetch(`/events/${evId}/assign`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ itemId, employee: user.name })
  });
  await load();
}

async function autoAssignAll(btn) {
  const msg = document.getElementById('autoAssignMsg');
  msg.style.display = 'none';
  // Get all items ready for auction (Photograph or Prep for Pick Up) without an event
  const res = await fetch('/items');
  const items = await res.json();
  const eligible = items.filter(i =>
    !i.eventId &&
    (i.stage === 'Photograph' || i.stage === 'Prep for Pick Up' || i.stage === 'Ready for Pick Up')
  );
  if (!eligible.length) { msg.innerText = 'No eligible unassigned items found.'; msg.style.display = 'block'; return; }

  msg.innerText = `Auto-assigning ${eligible.length} items…`;
  msg.style.display = 'block';
  let count = 0;
  for (const item of eligible.slice(0, 20)) {
    const r = await fetch(`/items/${item.id}/auto-assign-event`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ employee: user.name })
    });
    const d = await r.json();
    if (d.success && d.event && String(d.event.id) === String(evId)) count++;
  }
  msg.innerText = `✅ Assigned ${count} items to this event.`;
  await load();
}

async function setStatus(status) {
  await fetch(`/events/${evId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  await load();
}

function previewImport() {
  const csv = document.getElementById('csvInput').value.trim();
  if (!csv) { alert('Paste CSV data first'); return; }
  parsedResults = [];
  const lines = csv.split('\n').filter(l => l.trim());
  const commRate = (ev.commissionRate || 35) / 100;

  const rows = lines.map(line => {
    const parts = line.split(',');
    const lotNumber = (parts[0] || '').trim();
    const soldPrice = parseFloat((parts[1] || '0').trim()) || 0;
    const payout = parseFloat((soldPrice * (1 - commRate)).toFixed(2));
    return { lotNumber, soldPrice, payout };
  }).filter(r => r.lotNumber);

  parsedResults = rows;
  const total = rows.reduce((s, r) => s + r.payout, 0);

  const preview = document.getElementById('importPreview');
  preview.innerHTML = `
    <table class="import-results-table">
      <thead><tr><th>Lot Number</th><th>Sold</th><th>Payout</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${r.lotNumber}</td><td>$${r.soldPrice.toFixed(2)}</td><td style="color:#15803d;font-weight:700;">$${r.payout.toFixed(2)}</td></tr>`).join('')}</tbody>
    </table>
    <div class="payout-total">
      <div class="payout-total-label">Total Consigner Payouts</div>
      <div class="payout-total-amount">$${total.toFixed(2)}</div>
    </div>`;
  preview.style.display = 'block';
  document.getElementById('confirmImportBtn').style.display = 'block';
}

async function confirmImport() {
  if (!parsedResults.length) return;
  if (!confirm(`Import ${parsedResults.length} results? This will mark matched lots as Picked Up and record payouts.`)) return;

  const btn = document.getElementById('confirmImportBtn');
  btn.disabled = true; btn.innerText = 'Importing…';

  const res = await fetch(`/events/${evId}/import-results`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ results: parsedResults, employee: user.name })
  });
  const data = await res.json();
  const msg = document.getElementById('importMsg');
  if (data.success) {
    msg.innerText = `✅ Matched ${data.matched} lots.` + (data.unmatched?.length ? ` ⚠️ Unmatched: ${data.unmatched.join(', ')}` : '');
    msg.style.display = 'block';
    btn.style.display = 'none';
    document.getElementById('importPreview').style.display = 'none';
    await load();
  } else {
    alert('Import failed: ' + data.message);
    btn.disabled = false; btn.innerText = '✅ Confirm & Import Results';
  }
}

// Close add-lot dropdown on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.add-lot-wrap')) {
    document.getElementById('addLotResults').style.display = 'none';
  }
});

load();
</script>
<script src="/nav.js"></script>
</body>
</html>
