<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Auction Legacy</title>
<link rel="stylesheet" href="/styles.css">
<style>
.profile-hero {
  background: linear-gradient(135deg, #0b1b2b 0%, #1e3a5f 100%);
  border-radius: 20px;
  padding: 36px 24px 28px;
  text-align: center;
  margin-bottom: 16px;
  color: white;
  position: relative;
}
.profile-avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  margin: 0 auto 16px;
  overflow: hidden;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  font-weight: 800;
  color: white;
  border: 4px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  font-family: inherit;
  cursor: pointer;
  position: relative;
}
.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.avatar-edit-hint {
  font-size: 11px;
  opacity: 0.5;
  margin-top: 4px;
  margin-bottom: 0;
}
.profile-name {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.profile-role {
  font-size: 12px;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.admin-badge-pill {
  display: inline-block;
  background: rgba(37,99,235,0.3);
  color: #93c5fd;
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 8px;
  border: 1px solid rgba(147,197,253,0.3);
}
.btn-logout {
  width: 100%;
  background: #fef2f2;
  color: #dc2626;
  border: 1.5px solid #fecaca;
  padding: 15px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}
.btn-logout:hover { background: #fee2e2; box-shadow: none; transform: none; }
.btn-admin {
  width: 100%;
  background: #eff6ff;
  color: #1d4ed8;
  border: 1.5px solid #bfdbfe;
  padding: 15px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 0;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-admin:hover { background: #dbeafe; box-shadow: none; transform: none; }
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;">
    <div class="nav-logo">AL</div>
    <span class="nav-title">Auction Legacy</span>
  </div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;" id="navAvatarWrap">
    <div id="navAvatar" class="nav-avatar"></div>
  </div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header"></div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/review-visit.html"><span class="sidebar-icon">✅</span> Review Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> Photo Studio</a>
    <a href="/intake-estimator.html"><span class="sidebar-icon">💰</span> Intake Estimator</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<input type="file" id="photoFileInput" accept="image/*" capture="environment" style="display:none;">

<div class="container" style="max-width:500px;">

  <div class="profile-hero">
    <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('photoFileInput').click()" title="Tap to change photo"></div>
    <p class="avatar-edit-hint">Tap photo to update</p>
    <div class="profile-name" id="profileName"></div>
    <div class="profile-role" id="profileRole"></div>
    <div id="adminPill" style="display:none;"><div class="admin-badge-pill">Admin</div></div>
  </div>

  <!-- CHANGE OWN PIN -->
  <div class="card">
    <h2>Change My PIN</h2>
    <input id="currentPin" type="password" inputmode="numeric" placeholder="Current PIN">
    <input id="newPin" type="password" inputmode="numeric" placeholder="New PIN (4+ digits)">
    <input id="confirmPin" type="password" inputmode="numeric" placeholder="Confirm new PIN">
    <button onclick="changePin()" style="width:100%;margin-top:14px;">Update PIN</button>
    <div id="pinMsg" style="display:none;margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;"></div>
  </div>

  <!-- ADMIN PANEL LINK -->
  <div id="adminSection" class="card" style="display:none;">
    <h2>Admin</h2>
    <button class="btn-admin" onclick="window.location.href='/admin.html'">⚙️ Manage Employees</button>
  </div>

  <!-- LOGOUT -->
  <div class="card">
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user) window.location.href = '/';

// Populate profile
document.getElementById('profileName').innerText = user.name;
document.getElementById('profileRole').innerText = user.isAdmin ? 'Administrator' : 'Employee';
if (user.isAdmin) {
  document.getElementById('adminPill').style.display = 'block';
  document.getElementById('adminSection').style.display = 'block';
  // Add Admin link to sidebar
  const nav = document.querySelector('.sidebar nav');
  const a = document.createElement('a');
  a.href = '/admin.html';
  a.innerHTML = '<span class="sidebar-icon">⚙️</span> Admin';
  nav.appendChild(a);
}

function setAvatar(el, u) {
  if (u.photo) {
    el.innerHTML = `<img src="${u.photo}" alt="${u.name}">`;
  } else {
    el.textContent = u.name[0].toUpperCase();
  }
}

setAvatar(document.getElementById('profileAvatar'), user);
setAvatar(document.getElementById('navAvatar'), user);

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

// ── CHANGE OWN PIN ──
async function changePin() {
  const current = document.getElementById('currentPin').value.trim();
  const newPin  = document.getElementById('newPin').value.trim();
  const confirm = document.getElementById('confirmPin').value.trim();
  const msg = document.getElementById('pinMsg');

  if (!current || !newPin || !confirm) { showMsg(msg, 'Fill in all fields', false); return; }
  if (newPin !== confirm) { showMsg(msg, 'PINs do not match', false); return; }
  if (newPin.length < 4) { showMsg(msg, 'PIN must be at least 4 digits', false); return; }

  // Verify current PIN by attempting login
  const check = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: user.name, pin: current })
  });
  const checkData = await check.json();
  if (!checkData.success) { showMsg(msg, 'Current PIN is incorrect', false); return; }

  // Use admin endpoint with self as requestedBy (server will allow if name matches or user is admin)
  const res = await fetch(`/employees/${encodeURIComponent(user.name)}/pin`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ newPin, requestedBy: user.name })
  });
  const data = await res.json();
  if (data.success) {
    showMsg(msg, '✅ PIN updated', true);
    document.getElementById('currentPin').value = '';
    document.getElementById('newPin').value = '';
    document.getElementById('confirmPin').value = '';
  } else {
    showMsg(msg, data.message || 'Failed', false);
  }
}

// ── PHOTO UPLOAD ──
document.getElementById('photoFileInput').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('photo', file);
  form.append('requestedBy', user.name);
  const res = await fetch(`/employees/${encodeURIComponent(user.name)}/photo`, {
    method: 'POST',
    body: form
  });
  const data = await res.json();
  if (data.success) {
    user.photo = data.photo;
    localStorage.setItem('user', JSON.stringify(user));
    setAvatar(document.getElementById('profileAvatar'), user);
    setAvatar(document.getElementById('navAvatar'), user);
    showMsg(document.getElementById('pinMsg'), '✅ Profile photo updated', true);
  } else {
    showMsg(document.getElementById('pinMsg'), data.message || 'Photo upload failed', false);
  }
  this.value = '';
});

function showMsg(el, text, success) {
  el.textContent = text;
  el.style.background = success ? '#ecfdf5' : '#fef2f2';
  el.style.color = success ? '#047857' : '#b91c1c';
  el.style.display = 'block';
  if (success) setTimeout(() => { el.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
