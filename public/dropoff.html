<!DOCTYPE html>
<html>
<head>
  <title>Received at Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2>Scan Item</h2>
    <button onclick="startScanner()">Start Scanner</button>
    <video id="video" autoplay></video>
  </div>

  <div id="workspace"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

<script>
let items = [];
let code;

async function startScanner(){
  const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" }});
  video.srcObject = stream;
  scan();
}

function scan(){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  if(!video.videoWidth){
    requestAnimationFrame(scan);
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const qr = jsQR(img.data,canvas.width,canvas.height);

  if(qr){
    handleScan(qr.data);
  } else {
    requestAnimationFrame(scan);
  }
}

async function handleScan(data){
  const res = await fetch('/items');
  const all = await res.json();

  const found = all.find(i => `${i.code}-${i.number}` === data);
  if(!found) return alert("Item not found");

  code = found.code;
  items = all.filter(i => i.code === code).map(i => ({...i, received:false}));

  render();
}

function render(){
  workspace.innerHTML = `
    <div class="card">
      <h2>Confirm Items</h2>
      <div class="grid" id="grid"></div>
      <button onclick="confirm()">Confirm Intake</button>
    </div>
  `;

  const grid = document.getElementById("grid");

  items.forEach((i,index)=>{
    const div = document.createElement("div");
    div.className = "item";

    if(i.received) div.classList.add("received");

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:14px">
        <div class="title">${i.name}</div>
      </div>
    `;

    div.onclick = ()=>{
      items[index].received = !items[index].received;
      render();
    };

    grid.appendChild(div);
  });
}

async function confirm(){
  for(const i of items){
    await fetch(`/items/${i.id}/stage`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        stage: i.received ? "Received at Studio" : "Missing at Drop Off"
      })
    });
  }

  window.location.href = "/consigner.html?code=" + code;
}

function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
