<!DOCTYPE html>
<html>
<head>
  <title>Drop Off</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b1b2b; }
    .header { text-align:center; padding:20px; }
    .logo { width:200px; }

    .container {
      background:#f3f4f6;
      min-height:100vh;
      padding:20px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:20px;
      margin-bottom:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      text-align:center;
    }

    button {
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      font-size:15px;
    }

    .primary { background:#1d4ed8; color:white; }
    .success { background:#22c55e; color:white; }
  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <div class="card">
    <h2>Drop Off Scanner</h2>
    <button class="primary" onclick="startScanner()">Start Scanner</button>
    <video id="video" width="100%" style="margin-top:10px;"></video>
  </div>

  <div id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
let video = document.getElementById("video");
let scanning=false;

async function startScanner(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject=stream;
  scanning=true;
  scan();
}

function scan(){
  if(!scanning) return;

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const code=jsQR(img.data,canvas.width,canvas.height);

  if(code){
    scanning=false;
    handleScan(code.data);
  } else {
    requestAnimationFrame(scan);
  }
}

async function handleScan(data){
  const res = await fetch('/items');
  const items = await res.json();

  const found = items.find(i => `${i.code}-${i.number}` === data);

  if(!found){
    result.innerHTML="<div class='card'>Not found</div>";
    return;
  }

  const same = items.filter(i=>i.code===found.code);

  let html=`<div class="card"><h3>${found.code}</h3>`;

  same.forEach(i=>{
    html+=`
      <div style="margin-top:10px;">
        ${i.code}-${i.number} — ${i.name}
        <button class="success" onclick="receive(${i.id}, this)">Receive</button>
      </div>
    `;
  });

  html+="</div>";

  result.innerHTML=html;
}

async function receive(id,btn){
  await fetch(`/items/${id}/stage`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      stage:"Back of House",
      employee:"system"
    })
  });

  btn.innerText="Received";
  btn.disabled=true;
}
</script>

</body>
</html>
