<!DOCTYPE html>
<html>
<head>
  <title>Received at Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center"><img src="/logo.png"></div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <h2>Scan Item</h2>
    <button onclick="startScanner()">Start Scanner</button>
    <video id="video" autoplay style="width:100%;margin-top:10px;border-radius:10px;"></video>
  </div>

  <div id="workspace"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
const user = JSON.parse(localStorage.getItem("user")) || { name: "system" };

let video = document.getElementById("video");
let scanning = false;
let items = [];
let consignerCode = null;

async function startScanner(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  video.srcObject = stream;
  scanning = true;
  scanLoop();
}

function scanLoop(){
  if(!scanning) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  if(!video.videoWidth){
    requestAnimationFrame(scanLoop);
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const code = jsQR(img.data,canvas.width,canvas.height);

  if(code){
    scanning = false;
    handleScan(code.data);
  } else {
    requestAnimationFrame(scanLoop);
  }
}

async function handleScan(data){
  const res = await fetch('/items');
  const all = await res.json();

  const found = all.find(i => `${i.code}-${i.number}` === data);

  if(!found){
    alert("Item not found");
    return;
  }

  consignerCode = found.code;
  items = all.filter(i => i.code === consignerCode)
    .map(i => ({ ...i, received:false }));

  render();
}

function render(){
  workspace.innerHTML = `
    <div class="card">
      <h2>Items</h2>
      <div class="grid" id="grid"></div>
      <button onclick="confirm()">Confirm Intake</button>
    </div>
  `;

  const grid = document.getElementById("grid");

  items.forEach((i,index)=>{
    const div = document.createElement("div");
    div.className = "item";

    if(i.received) div.classList.add("received");

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:10px">
        <div class="title">${i.code}-${i.number}</div>
        <div class="label">${i.name}</div>
      </div>
    `;

    div.onclick = ()=>{
      items[index].received = !items[index].received;
      render();
    };

    grid.appendChild(div);
  });
}

async function confirm(){
  for(const i of items){
    await fetch(`/items/${i.id}/stage`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        stage: i.received ? "Received at Studio" : "Missing at Drop Off",
        employee: user.name
      })
    });
  }

  alert("Intake complete");
  window.location.href = "/consigner.html?code=" + consignerCode;
}

/* NAV */
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
