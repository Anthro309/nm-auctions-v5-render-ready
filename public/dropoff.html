<!DOCTYPE html>
<html>
<head>
  <title>Received at Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2>Scan Item</h2>
    <button onclick="startScanner()">Start Scanner</button>
    <video id="video" autoplay></video>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

<script>
let scanning = false;

async function startScanner(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  video.srcObject = stream;
  scanning = true;

  scan();
}

function scan(){
  if(!scanning) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  if(!video.videoWidth){
    requestAnimationFrame(scan);
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const qr = jsQR(img.data,canvas.width,canvas.height);

  if(qr){
    scanning = false;
    handleScan(qr.data);
  } else {
    requestAnimationFrame(scan);
  }
}

// =========================
// 🔥 AUTO OPEN ITEM
// =========================
async function handleScan(data){
  const res = await fetch('/items');
  const items = await res.json();

  const item = items.find(i => `${i.code}-${i.number}` === data);

  if(!item){
    alert("Item not found");
    scanning = true;
    scan();
    return;
  }

  // 🚀 redirect instantly
  window.location.href = "/item.html?id=" + item.id;
}

// =========================
// NAV
// =========================
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}
</script>

</body>
</html>
