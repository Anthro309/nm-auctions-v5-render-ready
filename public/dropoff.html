<!DOCTYPE html>
<html>
<head>
  <title>Received at Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <link rel="stylesheet" href="styles.css">

  <style>
    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .item-card {
      background: #111827;
      border-radius: 12px;
      padding: 10px;
      position: relative;
    }

    .item-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .received {
      border: 3px solid #22c55e;
    }

    .missing {
      border: 3px solid #dc2626;
      opacity: 0.5;
    }

    .status {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 4px 6px;
      border-radius: 6px;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-center">Received at Studio</div>
</div>

<div class="container">

  <!-- SCANNER -->
  <div class="card">
    <h2>Scan Items</h2>
    <div id="reader"></div>
  </div>

  <!-- ITEMS GRID -->
  <div class="card">
    <h2>Consigner Items</h2>
    <div id="grid" class="grid"></div>
  </div>

  <!-- CONTROLS -->
  <div class="card controls">
    <button onclick="confirmReceived()">Confirm Received</button>
    <button onclick="flagMissing()">Flag Missing</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

let items = [];
let receivedSet = new Set();
let currentCode = null;
let scanner;

// =========================
// START SCANNER
// =========================
function startScanner(){
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScan
  );
}

// =========================
// ON SCAN
// =========================
async function onScan(decodedText){
  const [code, number] = decodedText.split("-");

  if(!currentCode){
    currentCode = code;
    await loadConsigner(code);
  }

  const item = items.find(i =>
    i.code === code && String(i.number) === String(number)
  );

  if(!item) return;

  receivedSet.add(item.id);
  renderGrid();
}

// =========================
// LOAD CONSIGNER ITEMS
// =========================
async function loadConsigner(code){
  const res = await fetch('/items');
  const all = await res.json();

  items = all.filter(i => i.code === code);

  renderGrid();
}

// =========================
// RENDER GRID
// =========================
function renderGrid(){
  grid.innerHTML = "";

  items.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item-card";

    if(receivedSet.has(i.id)){
      div.classList.add("received");
    }

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div>${i.name}</div>
      <div class="status">
        ${receivedSet.has(i.id) ? "Received" : "Pending"}
      </div>
    `;

    grid.appendChild(div);
  });
}

// =========================
// CONFIRM RECEIVED
// =========================
async function confirmReceived(){
  for(const i of items){
    if(receivedSet.has(i.id)){
      await fetch(`/items/${i.id}/stage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          stage: "Received at Studio",
          employee: user.name
        })
      });
    }
  }

  alert("Items received!");
  location.reload();
}

// =========================
// FLAG MISSING
// =========================
async function flagMissing(){
  for(const i of items){
    if(!receivedSet.has(i.id)){
      await fetch(`/items/${i.id}/stage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          stage: "Missing at Drop Off",
          employee: user.name,
          reason: "Not scanned"
        })
      });
    }
  }

  alert("Missing items flagged");
}

// INIT
startScanner();
</script>

</body>
</html>
