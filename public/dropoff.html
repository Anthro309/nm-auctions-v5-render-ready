<!DOCTYPE html>
<html>
<head>
  <title>Drop Off</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1b2b;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 200px;
    }

    .container {
      background: #f3f4f6;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 15px;
    }

    .primary { background:#1d4ed8; color:white; }
    .success { background:#22c55e; color:white; }

    video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 15px;
    }

    .item {
      background: white;
      border-radius: 10px;
      padding: 8px;
      border: 3px solid transparent;
      cursor: pointer;
    }

    .item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
    }

    .item.received {
      border: 3px solid #22c55e;
    }

    .item.missing {
      border: 3px solid #ef4444;
      opacity: 0.6;
    }

    .label {
      font-size: 12px;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <div class="card">
    <h2>Scan Item</h2>
    <button class="primary" onclick="startScanner()">Start Scanner</button>
    <video id="video" autoplay></video>
  </div>

  <div id="workspace"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
let video = document.getElementById("video");
let scanning = false;
let currentItems = [];

async function startScanner(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;
  scanning = true;
  scanLoop();
}

function scanLoop(){
  if(!scanning) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const code = jsQR(img.data,canvas.width,canvas.height);

  if(code){
    scanning = false;
    handleScan(code.data);
  } else {
    requestAnimationFrame(scanLoop);
  }
}

async function handleScan(data){
  const res = await fetch('/items');
  const items = await res.json();

  const found = items.find(i => `${i.code}-${i.number}` === data);

  if(!found){
    workspace.innerHTML = "<div class='card'>Item not found</div>";
    return;
  }

  const consignerItems = items.filter(i => i.code === found.code);

  currentItems = consignerItems.map(i => ({
    ...i,
    received: false
  }));

  renderGrid();
}

function renderGrid(){
  let html = `<div class="card"><h3>Consigner Items</h3><div class="grid">`;

  currentItems.forEach((item, index) => {
    html += `
      <div class="item ${item.received ? 'received':''}" onclick="toggleItem(${index})">
        ${item.photos && item.photos[0] ? `<img src="${item.photos[0]}">` : ""}
        <div class="label"><b>${item.code}-${item.number}</b></div>
        <div class="label">${item.name}</div>
      </div>
    `;
  });

  html += `</div>
    <button class="success" onclick="confirmIntake()">Confirm Intake</button>
  </div>`;

  workspace.innerHTML = html;
}

function toggleItem(index){
  currentItems[index].received = !currentItems[index].received;
  renderGrid();
}

async function confirmIntake(){
  for(const item of currentItems){

    if(item.received){
      await fetch(`/items/${item.id}/stage`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          stage:"Back of House"
        })
      });
    } else {
      await fetch(`/items/${item.id}/stage`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          stage:"Missing at Drop Off"
        })
      });
    }

  }

  alert("Intake complete");
  location.reload();
}
</script>

</body>
</html>
