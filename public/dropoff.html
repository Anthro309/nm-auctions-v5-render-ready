<!DOCTYPE html>
<html>
<head>
  <title>Drop Off Scanner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
    }

    .wrapper {
      padding: 20px;
    }

    video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 16px;
    }

    .item {
      margin-top: 15px;
      padding: 12px;
      background: #111827;
      border-radius: 10px;
      text-align: left;
    }

    .receive {
      background: #22c55e;
      margin-top: 8px;
    }

    .received {
      opacity: 0.4;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <h1>📱 Drop Off Scanner</h1>

  <button onclick="startScanner()">Start Scanner</button>

  <video id="video" autoplay></video>

  <div id="result"></div>

  <button onclick="goBack()">⬅ Back</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

let video = document.getElementById("video");
let scanning = false;

// START CAMERA
async function startScanner() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
  scanning = true;

  scanLoop();
}

// SCAN LOOP
function scanLoop() {
  if (!scanning) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  if (code) {
    scanning = false;
    handleScan(code.data);
  } else {
    requestAnimationFrame(scanLoop);
  }
}

// HANDLE SCAN
async function handleScan(data) {
  const res = await fetch('/items');
  const items = await res.json();

  const item = items.find(i =>
    `${i.code}-${i.number}` === data
  );

  if (!item) {
    document.getElementById('result').innerHTML =
      "<p>Item not found</p>";
    return;
  }

  const consignerCode = item.code;

  const viewAll = confirm(
    `View all items for ${consignerCode}?`
  );

  if (viewAll) {
    showConsignerItems(items, consignerCode);
  } else {
    showSingleItem(item);
  }
}

// SHOW SINGLE
function showSingleItem(item) {
  document.getElementById('result').innerHTML = `
    <div class="item">
      <b>${item.code}-${item.number}</b><br>
      ${item.name}<br>
      ${item.consigner}

      <button class="receive" onclick="receiveItem(${item.id}, this)">
        Mark Received
      </button>
    </div>
  `;
}

// SHOW ALL FROM CONSIGNER
function showConsignerItems(items, code) {
  const container = document.getElementById('result');
  container.innerHTML = `<h3>Items for ${code}</h3>`;

  items
    .filter(i => i.code === code)
    .forEach(i => {
      const div = document.createElement('div');
      div.className = "item";

      div.innerHTML = `
        <b>${i.code}-${i.number}</b><br>
        ${i.name}<br>
        ${i.consigner}

        <button class="receive" onclick="receiveItem(${i.id}, this)">
          Mark Received
        </button>
      `;

      container.appendChild(div);
    });
}

// RECEIVE
async function receiveItem(id, btn) {
  await fetch(`/items/${id}/stage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      stage: "Back of House",
      employee: user.name,
      skipped: false,
      reason: null
    })
  });

  btn.innerText = "Received ✅";
  btn.disabled = true;
  btn.parentElement.classList.add("received");
}

// BACK
function goBack() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
