<!DOCTYPE html>
<html>
<head>
  <title>Intake Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filters input { margin-top: 0; }
    .print-sheet {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      margin-top: 0;
    }
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .action-row button { flex: 1; }
    .report-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: background 0.1s;
    }
    .report-card:last-child { border-bottom: none; }
    .report-card:hover { background: #f8fafc; }
    .report-title {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }
    .report-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
    .report-badge {
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { position: absolute; top: 0; left: 0; width: 100%; }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/review-visit.html"><span class="sidebar-icon">✅</span> Review Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> AI Photo Studio</a>
    <a href="/intake-estimator.html"><span class="sidebar-icon">💰</span> Intake Estimator</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <!-- ANALYTICS -->
  <div class="stat-grid">
    <div class="stat-tile">
      <div id="totalReports" class="stat-number">0</div>
      <div class="stat-label">Reports</div>
    </div>
    <div class="stat-tile">
      <div id="totalItems" class="stat-number">0</div>
      <div class="stat-label">Items</div>
    </div>
    <div class="stat-tile">
      <div id="topConsigner" class="stat-number" style="font-size:14px;">—</div>
      <div class="stat-label">Top Consigner</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card">
    <h2>Intake Reports</h2>
    <div class="filters">
      <input id="search" placeholder="Search consigner or item..." oninput="render()" style="flex:1;margin-top:0;">
      <input id="dateFilter" type="date" onchange="render()" style="width:auto;flex-shrink:0;margin-top:0;">
    </div>
    <div id="list" style="margin-top:14px;"></div>
  </div>

  <!-- REPORT VIEW -->
  <div id="printArea" class="card print-sheet" style="display:none;"></div>

  <div class="action-row">
    <button onclick="printReport()">🖨️ Print</button>
    <button onclick="exportPDF()" style="background:#6b7280;">📄 Export PDF</button>
  </div>

</div>

<script>
// Auth guard
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user) window.location.href = '/';

let reports = [];
let currentReport = null;

// =========================
// LOAD
// =========================
async function load(){
  try {
    const res = await fetch('/intake');
    reports = await res.json();
    buildAnalytics();
    render();
  } catch (err) {
    console.error('Failed to load intake:', err);
  }
}

// =========================
// ANALYTICS
// =========================
function buildAnalytics(){
  document.getElementById('totalReports').innerText = reports.length;

  let itemCount = 0;
  const consigners = {};

  reports.forEach(r => {
    itemCount += (r.items || []).length;
    consigners[r.consigner] = (consigners[r.consigner] || 0) + (r.items || []).length;
  });

  document.getElementById('totalItems').innerText = itemCount;

  const top = Object.entries(consigners).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('topConsigner').innerText = top ? top[0] : '—';
}

// =========================
// RENDER
// =========================
function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const dateVal = document.getElementById('dateFilter').value;
  const listEl = document.getElementById('list');
  listEl.innerHTML = "";

  const filtered = reports.filter(r => {
    const reportDate = new Date(r.createdAt);
    const matchDate = !dateVal || reportDate.toISOString().slice(0, 10) === dateVal;
    const matchText = (r.consigner || '').toLowerCase().includes(q) ||
      (r.items || []).some(i => (i.name || '').toLowerCase().includes(q));
    return matchDate && matchText;
  });

  if (!filtered.length) {
    listEl.innerHTML = '<div style="color:#6b7280;font-size:14px;padding:12px 0;">No intake sessions found.</div>';
    return;
  }

  filtered.forEach(r => {
    const div = document.createElement('div');
    div.className = 'report-card';
    const reportDate = new Date(r.createdAt);
    div.innerHTML = `
      <div>
        <div class="report-title">${escHtml(r.consigner)}</div>
        <div class="report-sub">${reportDate.toLocaleDateString()} · ${(r.items || []).length} item${(r.items || []).length !== 1 ? 's' : ''}</div>
      </div>
      <span class="report-badge">${escHtml(r.code || '')}</span>
    `;
    div.onclick = () => openReport(r);
    listEl.appendChild(div);
  });
}

// =========================
// OPEN REPORT
// =========================
function openReport(r){
  currentReport = r;

  let html = `
    <h2 style="margin-bottom:4px;">Consignment Intake</h2>
    <p style="color:#6b7280;margin-bottom:4px;">${escHtml(r.consigner)} — Code: ${escHtml(r.code || '')}</p>
    <p style="color:#6b7280;margin-bottom:16px;">${new Date(r.createdAt).toLocaleDateString()}</p>
    <hr style="margin-bottom:14px;">
  `;

  (r.items || []).forEach(i => {
    html += `<div style="margin-bottom:10px;"><b>${escHtml(i.code)}-${i.number || '?'}</b> · ${escHtml(i.name)}${i.lotNumber ? ` <span style="color:#6b7280;font-size:12px;">(${escHtml(i.lotNumber)})</span>` : ''}</div>`;
  });

  document.getElementById('printArea').innerHTML = html;
  document.getElementById('printArea').style.display = 'block';
  document.getElementById('printArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escHtml(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =========================
// PRINT
// =========================
function printReport(){
  window.print();
}

// =========================
// EXPORT PDF
// =========================
function exportPDF(){
  if(!currentReport) return alert('Open a report first');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 14;
  doc.setFontSize(16);
  doc.text('Consignment Intake', 10, y); y += 10;
  doc.setFontSize(12);
  doc.text(currentReport.consigner || '', 10, y); y += 8;
  doc.text(new Date(currentReport.createdAt).toLocaleDateString(), 10, y); y += 10;
  doc.setFontSize(11);

  (currentReport.items || []).forEach(i => {
    if (y > 270) { doc.addPage(); y = 14; }
    doc.text(`${i.code || '?'}-${i.number || '?'} — ${i.name || ''}`, 10, y);
    y += 8;
  });

  doc.save('intake-report.pdf');
}

// =========================
// NAV
// =========================
function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout(){
  localStorage.removeItem('user');
  window.location.href = '/';
}

load();
</script>

<script src="/nav.js"></script>
</body>
</html>
