<!DOCTYPE html>
<html>
<head>
  <title>Intake Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filters input { margin-top: 0; }
    .print-sheet {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      margin-top: 0;
    }
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .action-row button { flex: 1; }
    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { position: absolute; top: 0; left: 0; width: 100%; }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <!-- ANALYTICS -->
  <div class="stat-grid">
    <div class="stat-tile">
      <div id="totalReports" class="stat-number">0</div>
      <div class="stat-label">Reports</div>
    </div>
    <div class="stat-tile">
      <div id="totalItems" class="stat-number">0</div>
      <div class="stat-label">Items</div>
    </div>
    <div class="stat-tile">
      <div id="topConsigner" class="stat-number" style="font-size:14px;">—</div>
      <div class="stat-label">Top Consigner</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card">
    <h2>Intake Reports</h2>
    <div class="filters">
      <input id="search" placeholder="Search consigner or item..." oninput="render()" style="flex:1;margin-top:0;">
      <input id="dateFilter" type="date" onchange="render()" style="width:auto;flex-shrink:0;margin-top:0;">
    </div>
    <div id="list" style="margin-top:14px;"></div>
  </div>

  <!-- REPORT VIEW -->
  <div id="printArea" class="card print-sheet" style="display:none;"></div>

  <div class="action-row">
    <button onclick="printReport()">🖨️ Print</button>
    <button onclick="exportPDF()" style="background:#6b7280;">📄 Export PDF</button>
  </div>

</div>

<script>
let reports = [];
let currentReport = null;

// =========================
// LOAD
// =========================
async function load(){
  const res = await fetch('/intake');
  reports = await res.json();

  buildAnalytics();
  render();
}

// =========================
// ANALYTICS
// =========================
function buildAnalytics(){
  totalReports.innerText = reports.length;

  let itemCount = 0;
  let consigners = {};

  reports.forEach(r=>{
    itemCount += r.items.length;

    consigners[r.consigner] =
      (consigners[r.consigner] || 0) + r.items.length;
  });

  totalItems.innerText = itemCount;

  const top = Object.entries(consigners)
    .sort((a,b)=>b[1]-a[1])[0];

  topConsigner.innerText = top ? top[0] : "-";
}

// =========================
// RENDER
// =========================
function render(){
  const q = search.value.toLowerCase();
  const dateVal = dateFilter.value;

  list.innerHTML = "";

  reports.slice().reverse().forEach(r=>{
    const reportDate = new Date(r.createdAt);
    const matchDate = !dateVal || reportDate.toISOString().slice(0,10) === dateVal;

    const matchText =
      r.consigner.toLowerCase().includes(q) ||
      r.items.some(i => i.name.toLowerCase().includes(q));

    if (!matchDate || !matchText) return;

    const div = document.createElement("div");
    div.className = "report-card";

    div.innerHTML = `
      <div class="report-title">${r.consigner}</div>
      <div class="report-sub">
        ${reportDate.toLocaleDateString()} • ${r.items.length} items
      </div>
    `;

    div.onclick = ()=> openReport(r);

    list.appendChild(div);
  });
}

// =========================
// OPEN REPORT
// =========================
function openReport(r){
  currentReport = r;

  let html = `
    <h2>Consignment Intake</h2>
    <p>${r.consigner}</p>
    <p>${new Date(r.createdAt).toLocaleDateString()}</p>
    <hr>
  `;

  r.items.forEach(i=>{
    html += `<div><b>${i.code}-${i.number}</b> - ${i.name}</div>`;
  });

  printArea.innerHTML = html;
  printArea.style.display = "block";
}

// =========================
// PRINT
// =========================
function printReport(){
  window.print();
}

// =========================
// EXPORT PDF
// =========================
function exportPDF(){
  if(!currentReport) return alert("Open a report first");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.text("Consignment Intake", 10, y);
  y += 10;

  doc.text(currentReport.consigner, 10, y);
  y += 10;

  currentReport.items.forEach(i=>{
    doc.text(`${i.code}-${i.number} - ${i.name}`, 10, y);
    y += 8;
  });

  doc.save("intake-report.pdf");
}

// =========================
// NAV
// =========================
function toggleMenu(){
  sidebar?.classList.toggle("open");
  overlay?.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
