<!DOCTYPE html>
<html>
<head>
  <title>Intake Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <style>
    .report-card {
      padding: 16px;
      border-radius: 12px;
      background: #111827;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .report-title {
      font-weight: bold;
      font-size: 16px;
    }

    .report-sub {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filters input {
      flex: 1;
      min-width: 120px;
    }

    .print-sheet {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .link-btn {
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Daily Reports</a>
  <a href="/intake.html">Intake Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2>Intake Reports</h2>

    <!-- FILTERS -->
    <div class="filters">
      <input id="search" placeholder="Search..." oninput="render()">
      <input id="dateFilter" type="date" onchange="render()">
      <input id="employeeFilter" placeholder="Employee..." oninput="render()">
    </div>

    <div id="list"></div>
  </div>

  <!-- REPORT VIEW -->
  <div id="printArea" class="card print-sheet" style="display:none;"></div>

  <button id="printBtn" onclick="printReport()" style="display:none;">
    🖨️ Print
  </button>

  <button id="openConsignerBtn" class="link-btn" style="display:none;">
    Open Consigner View
  </button>

</div>

<script>
let reports = [];
let currentReport = null;

// =========================
// LOAD
// =========================
async function load(){
  const res = await fetch('/intake');
  reports = await res.json();
  render();
}

// =========================
// RENDER WITH FILTERS
// =========================
function render(){
  const q = search.value.toLowerCase();
  const dateVal = dateFilter.value;
  const employeeVal = employeeFilter.value.toLowerCase();

  list.innerHTML = "";

  reports.slice().reverse().forEach(r=>{
    const reportDate = new Date(r.createdAt);
    const dateMatch = !dateVal || reportDate.toISOString().slice(0,10) === dateVal;

    const textMatch =
      r.consigner.toLowerCase().includes(q) ||
      r.code.toLowerCase().includes(q) ||
      r.items.some(i => i.name.toLowerCase().includes(q));

    const employeeMatch =
      !employeeVal ||
      r.items.some(i => (i.employee || '').toLowerCase().includes(employeeVal));

    if (!dateMatch || !textMatch || !employeeMatch) return;

    const div = document.createElement("div");
    div.className = "report-card";

    div.innerHTML = `
      <div class="report-title">${r.consigner}</div>
      <div class="report-sub">
        ${reportDate.toLocaleDateString()} • ${r.items.length} items
      </div>
    `;

    div.onclick = ()=> openReport(r);

    list.appendChild(div);
  });
}

// =========================
// OPEN REPORT
// =========================
function openReport(r){
  currentReport = r;

  let html = `
    <h2>Consignment Intake</h2>
    <p>${r.consigner}</p>
    <p>${new Date(r.createdAt).toLocaleDateString()}</p>
    <hr>
  `;

  r.items.forEach(i=>{
    html += `
      <div style="margin-bottom:10px;">
        <b>${i.code}-${i.number}</b><br>
        ${i.name}
      </div>
      <hr>
    `;
  });

  printArea.innerHTML = html;
  printArea.style.display = "block";
  printBtn.style.display = "block";
  openConsignerBtn.style.display = "block";

  // 🔗 LINK TO CONSIGNER
  openConsignerBtn.onclick = ()=>{
    window.location.href = "/consigner.html?code=" + r.code;
  };
}

// =========================
// PRINT
// =========================
function printReport(){
  window.print();
}

// =========================
// NAV
// =========================
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
