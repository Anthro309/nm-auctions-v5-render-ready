<!DOCTYPE html>
<html>
<head>
  <title>Intake Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .report-card {
      padding: 16px;
      border-radius: 12px;
      background: #111827;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .report-title { font-weight: bold; }
    .report-sub { font-size: 13px; color: #9ca3af; }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .analytics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat {
      background: #1f2937;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-number {
      font-size: 20px;
      font-weight: bold;
    }

    .stat-label {
      font-size: 12px;
      color: #9ca3af;
    }

    .print-sheet {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div class="container">

  <!-- ANALYTICS -->
  <div class="card analytics">
    <div class="stat">
      <div id="totalReports" class="stat-number">0</div>
      <div class="stat-label">Reports</div>
    </div>

    <div class="stat">
      <div id="totalItems" class="stat-number">0</div>
      <div class="stat-label">Items</div>
    </div>

    <div class="stat">
      <div id="topConsigner" class="stat-number">-</div>
      <div class="stat-label">Top Consigner</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card">
    <div class="filters">
      <input id="search" placeholder="Search..." oninput="render()">
      <input id="dateFilter" type="date" onchange="render()">
    </div>

    <div id="list"></div>
  </div>

  <!-- REPORT VIEW -->
  <div id="printArea" class="card print-sheet" style="display:none;"></div>

  <button class="btn" onclick="printReport()">🖨️ Print</button>
  <button class="btn" onclick="exportPDF()">📄 Export PDF</button>

</div>

<script>
let reports = [];
let currentReport = null;

// =========================
// LOAD
// =========================
async function load(){
  const res = await fetch('/intake');
  reports = await res.json();

  buildAnalytics();
  render();
}

// =========================
// ANALYTICS
// =========================
function buildAnalytics(){
  totalReports.innerText = reports.length;

  let itemCount = 0;
  let consigners = {};

  reports.forEach(r=>{
    itemCount += r.items.length;

    consigners[r.consigner] =
      (consigners[r.consigner] || 0) + r.items.length;
  });

  totalItems.innerText = itemCount;

  const top = Object.entries(consigners)
    .sort((a,b)=>b[1]-a[1])[0];

  topConsigner.innerText = top ? top[0] : "-";
}

// =========================
// RENDER
// =========================
function render(){
  const q = search.value.toLowerCase();
  const dateVal = dateFilter.value;

  list.innerHTML = "";

  reports.slice().reverse().forEach(r=>{
    const reportDate = new Date(r.createdAt);
    const matchDate = !dateVal || reportDate.toISOString().slice(0,10) === dateVal;

    const matchText =
      r.consigner.toLowerCase().includes(q) ||
      r.items.some(i => i.name.toLowerCase().includes(q));

    if (!matchDate || !matchText) return;

    const div = document.createElement("div");
    div.className = "report-card";

    div.innerHTML = `
      <div class="report-title">${r.consigner}</div>
      <div class="report-sub">
        ${reportDate.toLocaleDateString()} • ${r.items.length} items
      </div>
    `;

    div.onclick = ()=> openReport(r);

    list.appendChild(div);
  });
}

// =========================
// OPEN REPORT
// =========================
function openReport(r){
  currentReport = r;

  let html = `
    <h2>Consignment Intake</h2>
    <p>${r.consigner}</p>
    <p>${new Date(r.createdAt).toLocaleDateString()}</p>
    <hr>
  `;

  r.items.forEach(i=>{
    html += `<div><b>${i.code}-${i.number}</b> - ${i.name}</div>`;
  });

  printArea.innerHTML = html;
  printArea.style.display = "block";
}

// =========================
// PRINT
// =========================
function printReport(){
  window.print();
}

// =========================
// EXPORT PDF
// =========================
function exportPDF(){
  if(!currentReport) return alert("Open a report first");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.text("Consignment Intake", 10, y);
  y += 10;

  doc.text(currentReport.consigner, 10, y);
  y += 10;

  currentReport.items.forEach(i=>{
    doc.text(`${i.code}-${i.number} - ${i.name}`, 10, y);
    y += 8;
  });

  doc.save("intake-report.pdf");
}

// =========================
// NAV
// =========================
function toggleMenu(){
  sidebar?.classList.toggle("open");
  overlay?.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
