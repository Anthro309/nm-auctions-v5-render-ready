<!DOCTYPE html>
<html>
<head>
  <title>Auction Legacy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1b2b">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>

<body style="background:#0b1b2b;display:flex;justify-content:center;align-items:center;min-height:100vh;">

<div style="width:100%;max-width:380px;padding:20px;box-sizing:border-box;">

  <div style="text-align:center;margin-bottom:24px;color:white;">
    <div style="font-size:28px;font-weight:800;letter-spacing:0.06em;">Auction Legacy</div>
    <div style="font-size:13px;opacity:0.75;margin-top:6px;">Studio Operations</div>
  </div>

  <div class="card">
    <h2 style="margin-bottom:12px;">Sign In</h2>

    <input id="name" placeholder="Name">
    <input id="pin" placeholder="PIN" type="password">

    <button style="width:100%;" onclick="login()">Login</button>

    <p id="error" style="color:#b91c1c;font-size:12px;margin-top:12px;"></p>
  </div>

</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}

async function login() {
  const name = document.getElementById('name').value;
  const pin = document.getElementById('pin').value;

  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, pin })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard.html';
  } else {
    document.getElementById('error').innerText = 'Invalid login';
  }
}
</script>

</body>
</html>
