<!DOCTYPE html>
<html>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">

<h1>NM Auctions V5 (LIVE)</h1>

<h3>Login</h3>
<input id="name" placeholder="Name">
<input id="pin" placeholder="PIN">
<button onclick="login()">Login</button>

<div id="app" style="display:none;">
  <h3>Add Item</h3>
  <input id="itemName" placeholder="Item name">
  <button onclick="addItem()">Add</button>

  <h3>Items</h3>
  <pre id="items"></pre>

  <button onclick="closeDay()">Daily Close Out</button>
</div>

<script>
async function login(){
  const res = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({firstName:name.value,pin:pin.value})
  });

  if(res.ok){
    app.style.display = 'block';
    loadItems();
  } else {
    alert("Login failed");
  }
}

async function addItem(){
  await fetch('/api/items',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name:itemName.value})
  });
  loadItems();
}

async function loadItems(){
  const res = await fetch('/api/items');
  const data = await res.json();
  items.textContent = JSON.stringify(data,null,2);
}

async function closeDay(){
  await fetch('/api/close-day',{method:'POST'});
  alert("Day closed");
}
</script>

</body>
</html>
