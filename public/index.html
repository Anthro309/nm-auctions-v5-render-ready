<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auction Legacy</title>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b1b2b" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Auction Legacy" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="background:#0b1b2b;display:flex;justify-content:center;align-items:center;min-height:100vh;">
  <div style="width:100%;max-width:380px;padding:20px;box-sizing:border-box;">
    <div style="text-align:center;margin-bottom:24px;color:white;">
      <div style="font-size:28px;font-weight:800;letter-spacing:0.06em;">Auction Legacy</div>
      <div style="font-size:13px;opacity:0.75;margin-top:6px;">Studio Operations</div>
    </div>

    <div class="card">
      <h2 style="margin-bottom:12px;">Sign In</h2>

      <form id="loginForm" novalidate>
        <input id="name" name="name" placeholder="Name" autocomplete="username" />
        <input id="pin" name="pin" placeholder="PIN" type="password" inputmode="numeric" autocomplete="current-password" />
        <button id="loginBtn" type="submit" style="width:100%;">Login</button>
      </form>

      <p id="error" style="color:#b91c1c;font-size:12px;margin-top:12px;min-height:16px;"></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const nameInput = document.getElementById("name");
    const pinInput = document.getElementById("pin");
    const loginBtn = document.getElementById("loginBtn");
    const errorEl = document.getElementById("error");

    function setError(message) {
      errorEl.textContent = message || "";
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Signing In..." : "Login";
    }

    async function login() {
      const name = nameInput.value.trim();
      const pin = pinInput.value.trim();

      setError("");

      if (!name || !pin) {
        setError("Enter your name and PIN.");
        return;
      }

      try {
        setLoading(true);

        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, pin })
        });

        let data = null;
        try {
          data = await res.json();
        } catch (jsonErr) {
          throw new Error("Server returned an invalid response.");
        }

        if (!res.ok || !data.success) {
          setError(data?.message || "Invalid login");
          setLoading(false);
          return;
        }

        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/dashboard.html";
      } catch (err) {
        console.error("Login error:", err);
        setError(err.message || "Unable to sign in right now.");
        setLoading(false);
      }
    }

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      login();
    });

    // Optional PWA registration, but safer
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("/service-worker.js");
        } catch (err) {
          console.warn("Service worker registration failed:", err);
        }
      });
    }
  </script>
</body>
</html>
