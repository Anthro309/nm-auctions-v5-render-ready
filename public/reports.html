<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reports</title>
<link rel="stylesheet" href="/styles.css">
<style>
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { position: absolute; top: 0; left: 0; width: 100%; }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/scanner.html">Scanner</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2>Daily Report</h2>
    <button onclick="generateReport()" style="width:100%;margin-bottom:8px;">Generate Today's Report</button>
    <button onclick="window.print()" style="width:100%;background:#6b7280;">🖨️ Print</button>
  </div>

  <div id="printArea" class="card" style="display:none;background:white;color:black;"></div>

  <div class="card">
    <h2>Past Reports</h2>
    <div id="reportHistory"></div>
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

async function generateReport() {
  try {
    const res = await fetch('/closeout', { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      renderReport(data.report);
      loadHistory();
    }
  } catch (err) {
    alert('Failed to generate report');
  }
}

function renderReport(report) {
  const area = document.getElementById('printArea');
  let html = `<h2>NM Auctions</h2><h3>Daily Lot Report</h3><p>${report.date}</p><hr>`;
  report.items.forEach(i => {
    html += `<div style="margin-bottom:12px;"><b>${i.lotNumber || '—'}</b> — ${i.name}<br><span style="font-size:12px;color:#666;">${i.consigner} · ${i.stage}</span></div><hr>`;
  });
  area.innerHTML = html;
  area.style.display = 'block';
}

async function loadHistory() {
  try {
    const res = await fetch('/reports');
    const reports = await res.json();
    const historyEl = document.getElementById('reportHistory');
    historyEl.innerHTML = '';

    if (!reports.length) {
      historyEl.innerHTML = '<div style="color:#6b7280;font-size:14px;">No reports yet.</div>';
      return;
    }

    reports.slice().reverse().forEach(r => {
      const div = document.createElement('div');
      div.className = 'button-card';
      div.style.marginBottom = '12px';
      div.innerHTML = `
        <div class="button-title">${r.date}</div>
        <div class="button-sub">${r.items.length} item${r.items.length !== 1 ? 's' : ''}</div>
      `;
      div.onclick = () => renderReport(r);
      historyEl.appendChild(div);
    });
  } catch (err) {
    console.error('Failed to load reports:', err);
  }
}

loadHistory();
</script>

</body>
</html>
