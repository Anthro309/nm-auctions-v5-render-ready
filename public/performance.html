<!DOCTYPE html>
<html>
<head>
  <title>Performance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .card-stat {
      background: #111827;
      padding: 16px;
      border-radius: 12px;
    }

    .name { font-weight: bold; margin-bottom: 8px; }
    .small { font-size: 13px; color: #9ca3af; margin: 2px 0; }

    .stage-box {
      background: #1f2937;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .slow {
      border: 2px solid #dc2626;
    }

    .alert {
      background: #7f1d1d;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    canvas {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div class="container">

  <!-- ALERTS -->
  <div class="card">
    <h2>⚠️ Alerts (Items Stuck)</h2>
    <div id="alerts"></div>
  </div>

  <!-- EMPLOYEE STATS -->
  <div class="card">
    <h2>Employee Performance</h2>
    <div id="employees" class="grid"></div>
    <canvas id="employeeChart"></canvas>
  </div>

  <!-- STAGE TIMES -->
  <div class="card">
    <h2>Stage Time Analysis</h2>
    <div id="stages"></div>
    <canvas id="stageChart"></canvas>
  </div>

</div>

<script>
let employeeChart, stageChart;

// =========================
// LOAD
// =========================
async function load(){
  const itemsRes = await fetch('/items');
  const items = await itemsRes.json();

  const perfRes = await fetch('/performance');
  const perf = await perfRes.json();

  buildAlerts(items);
  buildEmployees(perf);
  buildStageTimes(items);
}

// =========================
// ALERTS
// =========================
function buildAlerts(items){
  alerts.innerHTML = "";

  const now = new Date();

  items.forEach(i=>{
    if(!i.logs || i.logs.length === 0) return;

    const last = new Date(i.logs[i.logs.length-1].timestamp);
    const diffHours = (now - last) / (1000*60*60);

    if(diffHours > 24 && i.stage !== "Picked Up"){
      const div = document.createElement("div");
      div.className = "alert";

      div.innerHTML = `
        ${i.code}-${i.number} stuck in "${i.stage}" for ${Math.round(diffHours)} hrs
      `;

      alerts.appendChild(div);
    }
  });
}

// =========================
// EMPLOYEES
// =========================
function buildEmployees(data){
  employees.innerHTML = "";

  const labels = [];
  const values = [];

  data.forEach(e=>{
    labels.push(e.employee);
    values.push(e.created);

    const div = document.createElement("div");
    div.className = "card-stat";

    div.innerHTML = `
      <div class="name">${e.employee}</div>
      <div class="small">Created: ${e.created}</div>
      <div class="small">Accepted: ${e.handoffAccepted}</div>
      <div class="small">Rejected: ${e.handoffRejected}</div>
      <div class="small">Lots: ${e.lotsAssigned}</div>
    `;

    employees.appendChild(div);
  });

  if(employeeChart) employeeChart.destroy();

  employeeChart = new Chart(employeeChartCanvas(), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Items Created',
        data: values
      }]
    }
  });
}

function employeeChartCanvas(){
  return document.getElementById("employeeChart");
}

// =========================
// STAGE TIMES
// =========================
function buildStageTimes(items){
  const stageTimes = {};

  items.forEach(item=>{
    if(!item.logs || item.logs.length < 2) return;

    for(let i=1;i<item.logs.length;i++){
      const prev = item.logs[i-1];
      const curr = item.logs[i];

      if(prev.toStage && curr.toStage){
        const diff = (new Date(curr.timestamp) - new Date(prev.timestamp)) / 60000;

        if(!stageTimes[prev.toStage]) stageTimes[prev.toStage] = [];
        stageTimes[prev.toStage].push(diff);
      }
    }
  });

  stages.innerHTML = "";

  const labels = [];
  const values = [];

  Object.keys(stageTimes).forEach(stage=>{
    const times = stageTimes[stage];
    const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);

    labels.push(stage);
    values.push(avg);

    const div = document.createElement("div");
    div.className = "stage-box";

    if(avg > 1440) div.classList.add("slow"); // > 24 hrs

    div.innerHTML = `
      <div><b>${stage}</b></div>
      <div class="small">Avg: ${avg} mins</div>
      <div class="small">Samples: ${times.length}</div>
    `;

    stages.appendChild(div);
  });

  if(stageChart) stageChart.destroy();

  stageChart = new Chart(stageChartCanvas(), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Avg Minutes',
        data: values
      }]
    }
  });
}

function stageChartCanvas(){
  return document.getElementById("stageChart");
}

// =========================
// NAV
// =========================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
