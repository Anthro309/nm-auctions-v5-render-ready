<!DOCTYPE html>
<html>
<head>
  <title>Performance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    canvas { margin-top: 14px; }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> AI Photo Studio</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <!-- ALERTS -->
  <div class="card">
    <h2>⚠️ Alerts (Items Stuck)</h2>
    <div id="alerts"></div>
  </div>

  <!-- EMPLOYEE STATS -->
  <div class="card">
    <h2>Employee Performance</h2>
    <div id="employees" class="performance-grid"></div>
    <canvas id="employeeChart"></canvas>
  </div>

  <!-- STAGE TIMES -->
  <div class="card">
    <h2>Stage Time Analysis</h2>
    <div id="stages"></div>
    <canvas id="stageChart"></canvas>
  </div>

</div>

<script>
let employeeChart, stageChart;

// =========================
// LOAD
// =========================
async function load(){
  const itemsRes = await fetch('/items');
  const items = await itemsRes.json();

  const perfRes = await fetch('/performance');
  const perf = await perfRes.json();

  buildAlerts(items);
  buildEmployees(perf);
  buildStageTimes(items);
}

// =========================
// ALERTS
// =========================
function buildAlerts(items){
  alerts.innerHTML = "";

  const now = new Date();

  items.forEach(i=>{
    if(!i.logs || i.logs.length === 0) return;

    const last = new Date(i.logs[i.logs.length-1].timestamp);
    const diffHours = (now - last) / (1000*60*60);

    if(diffHours > 24 && i.stage !== "Picked Up"){
      const div = document.createElement("div");
      div.className = "alert-box";

      div.innerHTML = `
        ${i.code}-${i.number} stuck in "${i.stage}" for ${Math.round(diffHours)} hrs
      `;

      alerts.appendChild(div);
    }
  });
}

// =========================
// EMPLOYEES
// =========================
function buildEmployees(data){
  employees.innerHTML = "";

  const labels = [];
  const values = [];

  data.forEach(e=>{
    labels.push(e.employee);
    values.push(e.created);

    const div = document.createElement("div");
    div.className = "employee-card";

    div.innerHTML = `
      <div class="employee-name">${e.employee}</div>
      <div class="employee-stat">Created: ${e.created}</div>
      <div class="employee-stat">Accepted: ${e.handoffAccepted}</div>
      <div class="employee-stat">Rejected: ${e.handoffRejected}</div>
      <div class="employee-stat">Lots: ${e.lotsAssigned}</div>
    `;

    employees.appendChild(div);
  });

  if(employeeChart) employeeChart.destroy();

  employeeChart = new Chart(employeeChartCanvas(), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Items Created',
        data: values
      }]
    }
  });
}

function employeeChartCanvas(){
  return document.getElementById("employeeChart");
}

// =========================
// STAGE TIMES
// =========================
function buildStageTimes(items){
  const stageTimes = {};

  items.forEach(item=>{
    if(!item.logs || item.logs.length < 2) return;

    for(let i=1;i<item.logs.length;i++){
      const prev = item.logs[i-1];
      const curr = item.logs[i];

      if(prev.toStage && curr.toStage){
        const diff = (new Date(curr.timestamp) - new Date(prev.timestamp)) / 60000;

        if(!stageTimes[prev.toStage]) stageTimes[prev.toStage] = [];
        stageTimes[prev.toStage].push(diff);
      }
    }
  });

  stages.innerHTML = "";

  const labels = [];
  const values = [];

  Object.keys(stageTimes).forEach(stage=>{
    const times = stageTimes[stage];
    const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);

    labels.push(stage);
    values.push(avg);

    const div = document.createElement("div");
    div.className = "stage-box";

    if(avg > 1440) div.classList.add("slow"); // > 24 hrs

    div.innerHTML = `
      <div style="font-weight:700;margin-bottom:4px;">${stage}</div>
      <div class="employee-stat">Avg: ${avg} mins</div>
      <div class="employee-stat">Samples: ${times.length}</div>
    `;

    stages.appendChild(div);
  });

  if(stageChart) stageChart.destroy();

  stageChart = new Chart(stageChartCanvas(), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Avg Minutes',
        data: values
      }]
    }
  });
}

function stageChartCanvas(){
  return document.getElementById("stageChart");
}

// =========================
// NAV
// =========================
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
