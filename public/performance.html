<!DOCTYPE html>
<html>
<head>
  <title>Performance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/styles.css">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    canvas { margin-top: 14px; }

    .performance-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }
    @media (min-width: 600px) {
      .performance-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .employee-card {
      background: #f8fafc;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px 16px;
    }
    .employee-name {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 6px;
    }
    .employee-stat {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }
    .alert-box {
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #9a3412;
      margin-bottom: 8px;
    }
    .stage-box {
      background: #f8fafc;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .stage-box.slow {
      background: #fef2f2;
      border-color: #fecaca;
    }
    .stage-box.slow .employee-stat { color: #b91c1c; }
    #alerts:empty::before { content: '✅ No stuck items'; font-size: 14px; color: #6b7280; }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header"></div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/review-visit.html"><span class="sidebar-icon">✅</span> Review Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> Photo Studio</a>
    <a href="/intake-estimator.html"><span class="sidebar-icon">💰</span> Intake Estimator</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <!-- ALERTS -->
  <div class="card">
    <h2>⚠️ Alerts (Items Stuck)</h2>
    <div id="alerts"></div>
  </div>

  <!-- EMPLOYEE STATS -->
  <div class="card">
    <h2>Employee Performance</h2>
    <div id="employees" class="performance-grid"></div>
    <canvas id="employeeChart"></canvas>
  </div>

  <!-- STAGE TIMES -->
  <div class="card">
    <h2>Stage Time Analysis</h2>
    <div id="stages"></div>
    <canvas id="stageChart"></canvas>
  </div>

</div>

<script>
// Auth guard
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user) window.location.href = '/';

let employeeChart, stageChart;

// =========================
// LOAD
// =========================
async function load(){
  try {
    const [itemsRes, perfRes] = await Promise.all([
      fetch('/items'),
      fetch('/performance')
    ]);
    const items = await itemsRes.json();
    const perf  = await perfRes.json();

    buildAlerts(items);
    buildEmployees(perf);
    buildStageTimes(items);
  } catch (err) {
    console.error('Performance load error:', err);
  }
}

// =========================
// ALERTS
// =========================
function buildAlerts(items){
  const alertsEl = document.getElementById('alerts');
  alertsEl.innerHTML = "";

  const now = new Date();

  items.forEach(i=>{
    if(!i.logs || i.logs.length === 0) return;

    const last = new Date(i.logs[i.logs.length-1].timestamp);
    const diffHours = (now - last) / (1000*60*60);

    if(diffHours > 24 && i.stage !== "Picked Up" && i.stage !== "Missing at Drop Off"){
      const div = document.createElement("div");
      div.className = "alert-box";
      div.innerHTML = `${i.code || '?'}-${i.number || '?'} stuck in "<strong>${i.stage}</strong>" for ${Math.round(diffHours)} hrs`;
      alertsEl.appendChild(div);
    }
  });
}

// =========================
// EMPLOYEES
// =========================
function buildEmployees(data){
  const employeesEl = document.getElementById('employees');
  employeesEl.innerHTML = "";

  if (!data.length) {
    employeesEl.innerHTML = '<div style="color:#6b7280;font-size:14px;">No employee activity yet.</div>';
    return;
  }

  const labels = [];
  const values = [];

  data.forEach(e=>{
    labels.push(e.employee);
    values.push(e.created);

    const div = document.createElement("div");
    div.className = "employee-card";

    div.innerHTML = `
      <div class="employee-name">${e.employee}</div>
      <div class="employee-stat">Items Created: <strong>${e.created}</strong></div>
      <div class="employee-stat">Stage Changes: <strong>${e.stageChanges || 0}</strong></div>
      <div class="employee-stat">Scans: <strong>${e.scans || 0}</strong></div>
      <div class="employee-stat">Lots Assigned: <strong>${e.lotsAssigned}</strong></div>
    `;

    employeesEl.appendChild(div);
  });

  if(employeeChart) employeeChart.destroy();

  employeeChart = new Chart(document.getElementById("employeeChart"), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Items Created',
        data: values,
        backgroundColor: '#2563eb',
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });
}

// =========================
// STAGE TIMES
// =========================
function buildStageTimes(items){
  const stageTimes = {};

  items.forEach(item=>{
    if(!item.logs || item.logs.length < 2) return;

    for(let i=1;i<item.logs.length;i++){
      const prev = item.logs[i-1];
      const curr = item.logs[i];

      if(prev.toStage && curr.toStage){
        const diff = (new Date(curr.timestamp) - new Date(prev.timestamp)) / 60000;
        if (diff < 0) return; // skip clock skew
        if(!stageTimes[prev.toStage]) stageTimes[prev.toStage] = [];
        stageTimes[prev.toStage].push(diff);
      }
    }
  });

  const stagesEl = document.getElementById('stages');
  stagesEl.innerHTML = "";

  if (!Object.keys(stageTimes).length) {
    stagesEl.innerHTML = '<div style="color:#6b7280;font-size:14px;">No stage history yet.</div>';
    return;
  }

  const labels = [];
  const values = [];

  Object.keys(stageTimes).forEach(stage=>{
    const times = stageTimes[stage];
    const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);

    labels.push(stage);
    values.push(avg);

    const div = document.createElement("div");
    div.className = "stage-box";
    if(avg > 1440) div.classList.add("slow"); // > 24 hrs

    const hrs = avg >= 60 ? ` (${(avg/60).toFixed(1)} hrs)` : '';
    div.innerHTML = `
      <div style="font-weight:700;margin-bottom:4px;color:#111827;">${stage}</div>
      <div class="employee-stat">Avg time in stage: <strong>${avg} min${hrs}</strong></div>
      <div class="employee-stat">Sample size: ${times.length} item${times.length !== 1 ? 's' : ''}</div>
    `;

    stagesEl.appendChild(div);
  });

  if(stageChart) stageChart.destroy();

  stageChart = new Chart(document.getElementById("stageChart"), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Avg Minutes in Stage',
        data: values,
        backgroundColor: '#8b5cf6',
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });
}

// =========================
// NAV
// =========================
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

<script src="/nav.js"></script>
</body>
</html>
