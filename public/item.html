<!DOCTYPE html>
<html>
<head>
  <title>Item Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    .image-box {
      width: 100%;
      height: 220px;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
      margin-bottom: 16px;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .qr-box {
      text-align: center;
      background: #111827;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .qr-label {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 6px;
    }

    .print-btn {
      margin-top: 12px;
      width: 100%;
      padding: 14px;
      background: #16a34a;
      border-radius: 12px;
      border: none;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div class="container">

  <!-- IMAGE -->
  <div id="imageBox" class="image-box"></div>

  <!-- INFO -->
  <div class="card">
    <h2 id="title"></h2>
    <div id="code"></div>
    <div id="stage"></div>
  </div>

  <!-- QR + PRINT -->
  <div class="card qr-box">
    <canvas id="qr"></canvas>
    <div id="qrText" class="qr-label"></div>

    <button class="print-btn" onclick="printLabels()">
      🖨️ Print Labels
    </button>
  </div>

  <!-- LOCATION -->
  <div class="card">
    <h3>Location</h3>
    <input id="locationInput" placeholder="Rack A1">
    <button onclick="saveLocation()">Save Location</button>
  </div>

  <!-- HANDOFF -->
  <div class="card">
    <h3>Request Handoff</h3>

    <select id="stageSelect">
      <option>Received at Studio</option>
      <option>Review & Cleaning</option>
      <option>Photograph</option>
      <option>Prep for Pickup</option>
    </select>

    <input id="reason" placeholder="Reason (optional)">
    <button onclick="requestHandoff()">Send Handoff Request</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let item = null;

// =========================
// LOAD
// =========================
async function load(){
  const res = await fetch('/items/' + id);
  item = await res.json();

  title.innerText = item.name;
  code.innerText = item.code + "-" + item.number;
  stage.innerText = "Stage: " + item.stage;

  renderImage();
  generateQR();
}

// =========================
// IMAGE FIX
// =========================
function renderImage(){
  if(item.photos && item.photos.length){
    imageBox.innerHTML = `<img src="${item.photos[0]}">`;
  } else {
    imageBox.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;">
        No Image
      </div>
    `;
  }
}

// =========================
// QR
// =========================
function generateQR(){
  const value = item.code + "-" + item.number;

  QRCode.toCanvas(
    document.getElementById("qr"),
    value,
    { width: 200 }
  );

  qrText.innerText = value;
}

// =========================
// PRINT MULTI LABEL SHEET
// =========================
function printLabels(){
  const win = window.open('', '', 'width=800,height=1000');

  const name = (item.name || '').slice(0, 50);
  const code = item.code + "-" + item.number;
  const date = new Date().toLocaleDateString();

  win.document.write(`
    <html>
    <head>
      <style>
        body {
          font-family: Arial;
          padding: 10px;
        }

        .sheet {
          display: grid;
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .label {
          display: flex;
          align-items: center;
          border: 1px solid #ddd;
          border-radius: 10px;
          padding: 8px;
          height: 90px;
        }

        .qr {
          width: 70px;
          height: 70px;
          margin-right: 10px;
        }

        .text {
          font-size: 12px;
          line-height: 1.2;
        }

        .name {
          font-weight: bold;
        }

        canvas {
          width: 70px !important;
          height: 70px !important;
        }
      </style>
    </head>

    <body>

      <div class="sheet" id="sheet"></div>

      <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>

      <script>
        const sheet = document.getElementById("sheet");

        function createLabel(){
          const div = document.createElement("div");
          div.className = "label";

          div.innerHTML = \`
            <div class="qr"><canvas></canvas></div>
            <div class="text">
              <div class="name">${name}</div>
              <div>Lot: ${item.lotNumber || "-"}</div>
              <div>${date} • ${item.code}</div>
            </div>
          \`;

          sheet.appendChild(div);

          QRCode.toCanvas(
            div.querySelector("canvas"),
            "${code}",
            { width: 70 }
          );
        }

        // PRINT 8 LABELS (adjust if needed)
        for(let i = 0; i < 8; i++){
          createLabel();
        }

        window.print();
      <\/script>

    </body>
    </html>
  `);

  win.document.close();
}

// =========================
// LOCATION
// =========================
async function saveLocation(){
  await fetch(`/items/${item.id}/location`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      location: locationInput.value,
      employee: user.name
    })
  });

  alert("Saved");
}

// =========================
// HANDOFF
// =========================
async function requestHandoff(){
  await fetch(`/items/${item.id}/request-handoff`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      stage: stageSelect.value,
      employee: user.name,
      reason: reason.value
    })
  });

  alert("Handoff sent");
}

// =========================
// NAV
// =========================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
