<!DOCTYPE html>
<html>
<head>
  <title>Item Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

  <!-- QR LIB -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    .qr-box {
      margin-top: 15px;
      text-align: center;
      background: #111827;
      padding: 15px;
      border-radius: 12px;
    }

    .qr-code canvas {
      width: 140px !important;
      height: 140px !important;
    }

    .qr-label {
      margin-top: 8px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div class="container">

  <div class="card">
    <h2 id="title"></h2>
    <div id="code"></div>
    <div id="stage"></div>
  </div>

  <!-- QR CODE -->
  <div class="card qr-box">
    <div class="qr-code">
      <canvas id="qr"></canvas>
    </div>
    <div id="qrText" class="qr-label"></div>
  </div>

  <!-- LOCATION -->
  <div class="card">
    <h3>Location</h3>
    <input id="locationInput" placeholder="Rack A1">
    <button onclick="saveLocation()">Save Location</button>
  </div>

  <!-- HANDOFF -->
  <div class="card">
    <h3>Request Handoff</h3>

    <select id="stageSelect">
      <option>Received at Studio</option>
      <option>Review & Cleaning</option>
      <option>Photograph</option>
      <option>Prep for Pickup</option>
    </select>

    <input id="reason" placeholder="Reason (optional)">
    <button onclick="requestHandoff()">Send Handoff Request</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let item = null;

// =========================
// LOAD ITEM
// =========================
async function load(){
  const res = await fetch('/items/' + id);
  item = await res.json();

  title.innerText = item.name;
  code.innerText = item.code + "-" + item.number;
  stage.innerText = "Stage: " + item.stage;

  generateQR();
}

// =========================
// QR GENERATION
// =========================
function generateQR(){
  const value = item.code + "-" + item.number;

  QRCode.toCanvas(
    document.getElementById("qr"),
    value,
    { width: 200 }
  );

  qrText.innerText = value;
}

// =========================
// LOCATION
// =========================
async function saveLocation(){
  await fetch(`/items/${item.id}/location`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      location: locationInput.value,
      employee: user.name
    })
  });

  alert("Saved");
}

// =========================
// HANDOFF
// =========================
async function requestHandoff(){
  await fetch(`/items/${item.id}/request-handoff`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      stage: stageSelect.value,
      employee: user.name,
      reason: reason.value
    })
  });

  alert("Handoff sent");
}

// =========================
// NAV
// =========================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
