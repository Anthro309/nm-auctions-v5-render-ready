<!DOCTYPE html>
<html>
<head>
  <title>Item</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center"><img src="/logo.png"></div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <div id="image"></div>
    <h2 id="title"></h2>
    <div class="label" id="code"></div>
    <div class="label" id="stage"></div>
    <div class="label" id="locationText"></div>
    <div class="label" id="lot"></div>
  </div>

  <div class="card">
    <h3>Location</h3>
    <input id="location" placeholder="Rack A1">
    <button onclick="saveLocation()">Save</button>
  </div>

  <div class="card">
    <h3>Workflow</h3>
    <button onclick="setStage('Received at Studio')">Received at Studio</button>
    <button onclick="setStage('Review & Cleaning')">Review & Cleaning</button>
    <button onclick="setStage('Photograph')">Photograph</button>
    <button onclick="setStage('Prep for Pickup')">Prep for Pickup</button>
    <button onclick="setStage('Picked Up')">Picked Up</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user")) || { name:"system" };

let item;
let id = new URLSearchParams(window.location.search).get("id");

async function load(){
  const res = await fetch('/items');
  const items = await res.json();

  item = items.find(i => i.id == id);

  render();
}

function render(){
  image.innerHTML = item.photos?.[0]
    ? `<img src="${item.photos[0]}" style="width:100%;border-radius:10px;">`
    : "";

  title.innerText = item.name;
  code.innerText = item.code + "-" + item.number;
  stage.innerText = item.stage;
  locationText.innerText = item.location || "No location";
  lot.innerText = item.lotNumber ? "Lot: " + item.lotNumber : "";

  location.value = item.location || "";
}

async function saveLocation(){
  await fetch(`/items/${item.id}/location`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      location: location.value,
      employee: user.name
    })
  });

  load();
}

async function setStage(stageName){
  const res = await fetch(`/items/${item.id}/stage`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      stage: stageName,
      employee: user.name
    })
  });

  const data = await res.json();
  item = data.item;

  if(stageName === "Photograph" && item.lotNumber){
    alert("Lot assigned: " + item.lotNumber);
  }

  render();
}

/* NAV */
function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
