<!DOCTYPE html>
<html>
<head>
  <title>Item Detail</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    .wrapper {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .image {
      width: 100%;
      height: 300px;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .info {
      margin-top: 8px;
      color: #9ca3af;
      font-size: 14px;
    }

    .section {
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: white;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      cursor: pointer;
    }

    .primary {
      background: #2563eb;
    }

    .back {
      margin-top: 20px;
      background: #374151;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div id="image" class="image"></div>

  <div class="title" id="title"></div>

  <div class="info" id="code"></div>
  <div class="info" id="consigner"></div>
  <div class="info" id="stage"></div>

  <!-- Edit Name -->
  <div class="section">
    <input id="nameInput" placeholder="Edit item name">
    <button onclick="updateName()">Update Name</button>
  </div>

  <!-- Add Photo -->
  <div class="section">
    <input type="file" id="photoInput" accept="image/*" capture="environment">
    <button class="primary" onclick="addPhoto()">Add Photo</button>
  </div>

  <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>
let item = null;

// get id from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 🔐 protect route
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = "/";

// load item
async function loadItem() {
  const res = await fetch('/items');
  const items = await res.json();

  item = items.find(i => i.id == id);

  if (!item) {
    alert("Item not found");
    return;
  }

  render();
}

// 🎨 render
function render() {
  const imgDiv = document.getElementById('image');

  imgDiv.innerHTML = item.photos && item.photos[0]
    ? `<img src="${item.photos[0]}">`
    : "No Image";

  document.getElementById('title').innerText = item.name;
  document.getElementById('code').innerText = item.code + "-" + item.number;
  document.getElementById('consigner').innerText = item.consigner;
  document.getElementById('stage').innerText = "Stage: " + item.stage;

  document.getElementById('nameInput').value = item.name;
}

// ✏️ update name
async function updateName() {
  const newName = document.getElementById('nameInput').value;

  item.name = newName;

  await fetch('/items/' + item.id, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(item)
  });

  render();
}

// 📸 upload photo
async function uploadPhoto(file) {
  const form = new FormData();
  form.append("photo", file);

  const res = await fetch('/upload', {
    method: 'POST',
    body: form
  });

  const data = await res.json();
  return data.path;
}

// ➕ add photo
async function addPhoto() {
  const file = document.getElementById('photoInput').files[0];
  if (!file) return alert("Select photo");

  const path = await uploadPhoto(file);

  item.photos.push(path);

  await fetch('/items/' + item.id, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(item)
  });

  render();
}

// 🔙 back
function goBack() {
  window.location.href = "/items.html";
}

loadItem();
</script>

</body>
</html>
