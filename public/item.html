<!DOCTYPE html>
<html>
<head>
  <title>Item</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b1b2b; }

    .header { text-align:center; padding:20px; }
    .logo { width:200px; }

    .container {
      background:#f3f4f6;
      min-height:100vh;
      padding:20px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:20px;
      margin-bottom:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    button {
      width:100%;
      padding:12px;
      margin-top:8px;
      border:none;
      border-radius:8px;
    }

    .primary { background:#1d4ed8; color:white; }
  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <div class="card">
    <h2 id="title"></h2>
    <p id="code"></p>
    <p id="stage"></p>
  </div>

  <div class="card">
    <h3>Workflow</h3>

    <button class="primary" onclick="setStage('Back of House')">Back of House</button>
    <button class="primary" onclick="setStage('Review & Cleaning')">Review & Cleaning</button>
    <button class="primary" onclick="setStage('Photograph')">Photograph</button>
    <button class="primary" onclick="setStage('Prep for Pickup')">Prep for Pickup</button>
    <button class="primary" onclick="setStage('Picked Up')">Picked Up</button>
  </div>

</div>

<script>
let item=null;

const id=new URLSearchParams(location.search).get("id");

async function load(){
  const res = await fetch('/items');
  const items = await res.json();

  item = items.find(i=>i.id==id);

  title.innerText=item.name;
  code.innerText=item.code+"-"+item.number;
  stage.innerText="Stage: "+item.stage;
}

async function setStage(s){
  await fetch(`/items/${item.id}/stage`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({stage:s})
  });

  item.stage=s;
  load();
}

load();
</script>

</body>
</html>
