<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Item Library</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/scanner.html">Scanner</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">
  <div class="card">
    <h2>Item Library</h2>
    <input id="search" placeholder="Search by name, code, or consigner" oninput="render()">
    <div id="list" style="margin-top:15px;"></div>
  </div>

  <div class="card">
    <h2>Auction Listing Export</h2>
    <p style="font-size:13px;color:#6b7280;margin:0 0 14px;">Downloads a CSV of all items in <strong>Photograph</strong> or <strong>Prep for Pickup</strong> stage — ready to list.</p>
    <button onclick="exportAuctionCSV()" style="width:100%;">📤 Export Auction Listings CSV</button>
    <div id="exportMsg" style="display:none;margin-top:10px;padding:10px 14px;background:#ecfdf5;color:#047857;border-radius:10px;font-size:13px;font-weight:600;"></div>
  </div>
</div>

<script>
let allItems = [];

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

async function load() {
  const res = await fetch('/items');
  allItems = await res.json();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allItems.filter(i =>
    (i.name || '').toLowerCase().includes(q) ||
    (i.code || '').toLowerCase().includes(q) ||
    (i.consigner || '').toLowerCase().includes(q)
  );

  const grouped = {};
  filtered.forEach(i => {
    if (!grouped[i.code]) grouped[i.code] = [];
    grouped[i.code].push(i);
  });

  const list = document.getElementById('list');
  list.innerHTML = '';

  if (!Object.keys(grouped).length) {
    list.innerHTML = '<div style="color:#6b7280;font-size:14px;">No items found.</div>';
    return;
  }

  Object.keys(grouped).forEach(code => {
    const group = grouped[code];
    const div = document.createElement('div');
    div.className = 'button-card';
    div.style.marginBottom = '12px';
    div.innerHTML = `
      <div class="button-title">${group[0].consigner || code}</div>
      <div class="button-sub">${group.length} item${group.length !== 1 ? 's' : ''} · Code: ${code}</div>
    `;
    div.onclick = () => { window.location.href = '/consigner.html?code=' + code; };
    list.appendChild(div);
  });
}

function exportAuctionCSV() {
  const ready = allItems.filter(i =>
    i.stage === 'Photograph' || i.stage === 'Prep for Pickup'
  );

  const msgEl = document.getElementById('exportMsg');

  if (!ready.length) {
    msgEl.style.background = '#fef2f2';
    msgEl.style.color = '#b91c1c';
    msgEl.innerText = 'No items in Photograph or Prep for Pickup stage.';
    msgEl.style.display = 'block';
    setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
    return;
  }

  const headers = ['Lot Number', 'Item Name', 'Category', 'Condition', 'Description', 'Consigner', 'Stage'];
  const rows = ready.map(i => [
    i.lotNumber || '',
    i.name || '',
    i.category || '',
    i.condition || '',
    (i.description || '').replace(/"/g, '""').replace(/\n/g, ' '),
    i.consigner || '',
    i.stage || ''
  ]);

  const csv = [headers, ...rows]
    .map(row => row.map(v => `"${v}"`).join(','))
    .join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `auction-listings-${new Date().toLocaleDateString('en-US').replace(/\//g, '-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  msgEl.style.background = '#ecfdf5';
  msgEl.style.color = '#047857';
  msgEl.innerText = `✅ Exported ${ready.length} item${ready.length !== 1 ? 's' : ''}`;
  msgEl.style.display = 'block';
  setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
}

load();
</script>

</body>
</html>
