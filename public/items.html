<!DOCTYPE html>
<html>
<head>
  <title>Items</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2>Item Library</h2>

    <!-- SEARCH -->
    <input id="search" placeholder="Search by name, code, or consigner" oninput="render()">

    <div id="list" class="grid" style="margin-top:15px;"></div>
  </div>

</div>

<script>
let allItems = [];

function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

// =========================
// LOAD
// =========================
async function load(){
  const res = await fetch('/items');
  allItems = await res.json();
  render();
}

// =========================
// RENDER WITH SEARCH
// =========================
function render(){
  const q = search.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.code.toLowerCase().includes(q) ||
    i.consigner.toLowerCase().includes(q)
  );

  const grouped = {};

  filtered.forEach(i=>{
    if(!grouped[i.code]) grouped[i.code] = [];
    grouped[i.code].push(i);
  });

  list.innerHTML = "";

  Object.keys(grouped).forEach(code=>{
    const group = grouped[code];

    const div = document.createElement("div");
    div.className = "button-card";

    div.innerHTML = `
      <div class="button-title">${group[0].consigner}</div>
      <div class="button-sub">${group.length} items</div>
    `;

    div.onclick = ()=>{
      window.location.href = "/consigner.html?code=" + code;
    };

    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
