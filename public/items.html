<!DOCTYPE html>
<html>
<head>
  <title>Items</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center"><img src="/logo.png"></div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">
  <div id="list" class="grid"></div>
</div>

<script>
async function load(){
  const res = await fetch('/items');
  const items = await res.json();

  list.innerHTML = "";

  items.forEach(i=>{
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <div class="title">${i.code}-${i.number}</div>
      <div class="label">${i.name}</div>
      <div class="label">${i.stage}</div>
    `;

    div.onclick = () => {
      window.location.href = "/consigner.html?code=" + i.code;
    };

    list.appendChild(div);
  });
}

function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
