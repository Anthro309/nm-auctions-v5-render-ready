<!DOCTYPE html>
<html>
<head>
  <title>Items</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b1b2b; }

    .header { text-align:center; padding:20px; }
    .logo { width:200px; }

    .container {
      background:#f3f4f6;
      min-height:100vh;
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr;
      gap:15px;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      cursor:pointer;
    }

    .code { font-weight:bold; }
    .stage { font-size:12px; color:#6b7280; }
  </style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">
  <h2>Item Library</h2>

  <div id="list" class="grid"></div>
</div>

<script>
async function load(){
  const res = await fetch('/items');
  const items = await res.json();

  list.innerHTML="";

  items.forEach(i=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="code">${i.code}-${i.number}</div>
      <div>${i.name}</div>
      <div class="stage">${i.stage}</div>
    `;

    div.onclick=()=>location.href=`/item.html?id=${i.id}`;

    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
