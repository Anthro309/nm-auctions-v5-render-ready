<!DOCTYPE html>
<html>
<head>
  <title>Consigner</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
</div>

<div class="container">

  <!-- HEADER -->
  <div class="card">
    <h2 id="name"></h2>
    <div class="label" id="code"></div>
    <div class="label" id="stats"></div>

    <button class="secondary" onclick="goBack()">Back</button>
  </div>

  <!-- FILTERS -->
  <div class="card">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('received')">Received</button>
    <button onclick="setFilter('missing')">Missing</button>
  </div>

  <!-- GRID -->
  <div class="card">
    <div id="grid" class="grid"></div>
  </div>

</div>

<script>
let items = [];
let filtered = [];
let consignerCode = null;
let filter = "all";

const params = new URLSearchParams(window.location.search);
consignerCode = params.get("code");

async function load(){
  const res = await fetch('/items');
  items = await res.json();

  items = items.filter(i => i.code === consignerCode);

  document.getElementById('name').innerText = items[0]?.consigner || '';
  document.getElementById('code').innerText = "Code: " + consignerCode;

  updateStats();
  applyFilter();
}

function updateStats(){
  const total = items.length;
  const received = items.filter(i => i.stage === "Received at Studio").length;
  const missing = items.filter(i => i.stage === "Missing at Drop Off").length;

  document.getElementById('stats').innerText =
    `${received} received · ${missing} missing · ${total} total`;
}

function setFilter(f){
  filter = f;
  applyFilter();
}

function applyFilter(){
  if(filter === "received"){
    filtered = items.filter(i => i.stage === "Received at Studio");
  } else if(filter === "missing"){
    filtered = items.filter(i => i.stage === "Missing at Drop Off");
  } else {
    filtered = items;
  }

  render();
}

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  filtered.forEach(i=>{
    const div = document.createElement('div');

    let cls = "item";
    if(i.stage === "Received at Studio") cls += " received";
    if(i.stage === "Missing at Drop Off") cls += " missing";

    div.className = cls;

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:10px">
        <b>${i.code}-${i.number}</b>
        <div class="label">${i.name}</div>
        <div class="label">${i.stage}</div>
      </div>
    `;

    div.onclick = () => {
      window.location.href = "/item.html?id=" + i.id;
    };

    grid.appendChild(div);
  });
}

function goBack(){
  window.location.href = "/dashboard.html";
}

load();
</script>

</body>
</html>
