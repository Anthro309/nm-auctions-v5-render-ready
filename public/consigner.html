<!DOCTYPE html>
<html>
<head>
  <title>Consigner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center">Auction Legacy</div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-title">Auction Legacy</div>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2 id="name"></h2>
    <div id="stats" class="label"></div>
  </div>

  <div id="grid" class="grid"></div>

</div>

<script>
let code = new URLSearchParams(window.location.search).get("code");

async function load(){
  const res = await fetch('/items');
  const items = await res.json();

  const list = items.filter(i => i.code === code);

  name.innerText = list[0]?.consigner || "";
  stats.innerText = list.length + " items";

  grid.innerHTML = "";

  list.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";

    if(i.stage === "Received at Studio") div.classList.add("received");
    if(i.stage === "Missing at Drop Off") div.classList.add("missing");

    let badge = `<span class="badge blue">${i.stage}</span>`;
    if(i.stage === "Received at Studio") badge = `<span class="badge green">Received</span>`;
    if(i.stage === "Missing at Drop Off") badge = `<span class="badge red">Missing</span>`;

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:14px">
        <div class="title">${i.name}</div>
        <div class="label">${i.code}-${i.number}</div>
        ${badge}
      </div>
    `;

    div.onclick = ()=>{
      window.location.href = "/item.html?id=" + i.id;
    };

    grid.appendChild(div);
  });
}

function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
