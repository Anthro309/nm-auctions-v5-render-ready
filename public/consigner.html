<!DOCTYPE html>
<html>
<head>
  <title>Consigner</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center"><img src="/logo.png"></div>
  <div class="nav-right" onclick="logout()">Logout</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/initial-visit.html">Initial Visit</a>
  <a href="/dropoff.html">Received at Studio</a>
  <a href="/items.html">Item Library</a>
  <a href="/reports.html">Reports</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <div class="card">
    <h2 id="name"></h2>
    <div id="stats" class="label"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
let code = new URLSearchParams(window.location.search).get("code");

async function load(){
  const res = await fetch('/items');
  const items = await res.json();

  const list = items.filter(i => i.code === code);

  document.getElementById("name").innerText = list[0]?.consigner || "";

  document.getElementById("stats").innerText =
    list.length + " items";

  grid.innerHTML = "";

  list.forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";

    if(i.stage === "Received at Studio") div.classList.add("received");
    if(i.stage === "Missing at Drop Off") div.classList.add("missing");

    div.innerHTML = `
      ${i.photos?.[0] ? `<img src="${i.photos[0]}">` : ""}
      <div style="padding:10px">
        <div class="title">${i.code}-${i.number}</div>
        <div class="label">${i.name}</div>
      </div>
    `;

    div.onclick = () => {
      window.location.href = "/item.html?id=" + i.id;
    };

    grid.appendChild(div);
  });
}

function toggleMenu(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
