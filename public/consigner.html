<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consigner</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left" onclick="toggleMenu()">☰</div>
  <div class="nav-center" onclick="window.location.href='/dashboard.html'" style="cursor:pointer;"><div class="nav-logo">AL</div><span class="nav-title">Auction Legacy</span></div>
  <div class="nav-right" onclick="window.location.href='/profile.html'" style="cursor:pointer;"><div id="navAvatar" class="nav-avatar"></div></div>
</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Auction Legacy</div>
    <div class="sidebar-sub">Studio Operations</div>
  </div>
  <nav>
    <a href="/dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
    <a href="/initial-visit.html"><span class="sidebar-icon">📋</span> Initial Visit</a>
    <a href="/scanner.html"><span class="sidebar-icon">📷</span> Scanner</a>
    <a href="/items.html"><span class="sidebar-icon">📦</span> Item Library</a>
    <a href="/photography-queue.html"><span class="sidebar-icon">🎯</span> Photo Queue</a>
    <a href="/events.html"><span class="sidebar-icon">🏷️</span> Auction Events</a>
    <a href="/photo-upload.html"><span class="sidebar-icon">📸</span> AI Photo Studio</a>
    <a href="/reports.html"><span class="sidebar-icon">📊</span> Reports</a>
  </nav>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

  <!-- Page Header -->
  <div class="page-header-block">
    <div class="page-header-icon">🏷️</div>
    <div>
      <div class="page-header-title" id="consignerName">Consigner</div>
      <div class="page-header-sub" id="consignerStats">Loading…</div>
    </div>
  </div>

  <!-- Search + Filter -->
  <div class="search-bar-row">
    <input id="search" placeholder="Search items…" oninput="render()">
    <select id="stageFilter" onchange="render()">
      <option value="">All Stages</option>
      <option>Home Visit</option>
      <option>Received at Studio</option>
      <option>Review &amp; Cleaning</option>
      <option>Photograph</option>
      <option>Prep for Pick Up</option>
      <option>Ready for Pick Up</option>
      <option>Picked Up</option>
      <option>Missing at Drop Off</option>
    </select>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
const code = new URLSearchParams(window.location.search).get('code');
let allItems = [];

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function stageClass(stage) {
  if (stage === 'Received at Studio') return 'stage-received';
  if (stage === 'Missing at Drop Off') return 'stage-missing';
  if (stage === 'Picked Up') return 'stage-pickedup';
  return '';
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const stageF = document.getElementById('stageFilter').value;

  const list = allItems.filter(i => {
    const matchQ = !q ||
      (i.name || '').toLowerCase().includes(q) ||
      (i.lotNumber || '').toLowerCase().includes(q);
    const matchStage = !stageF || i.stage === stageF;
    return matchQ && matchStage;
  });

  document.getElementById('consignerStats').innerText =
    list.length + ' item' + (list.length !== 1 ? 's' : '') +
    (allItems.length !== list.length ? ' (filtered from ' + allItems.length + ')' : '');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = '<div class="card" style="grid-column:1/-1;">No items found.</div>';
    return;
  }

  list.forEach(i => {
    const div = document.createElement('div');
    div.className = 'photo-card';

    const lotLabel = i.lotNumber || (i.code + '-' + i.number) || '—';

    const imgHTML = i.photos?.[0]
      ? `<img src="${i.photos[0]}" alt="${i.name || 'Item'}" loading="lazy">`
      : `<div class="photo-card-placeholder">📦</div>`;

    const repairHTML = i.needsRepair
      ? `<div class="photo-card-repair">⚠️ Repair</div>`
      : '';

    const stageCls = stageClass(i.stage);
    const stageLabel = i.stage === 'Missing at Drop Off' ? 'Missing'
      : i.stage === 'Received at Studio' ? 'Received'
      : i.stage || '—';

    div.innerHTML = `
      ${imgHTML}
      <div class="photo-card-overlay"></div>
      <div class="photo-card-lot">${lotLabel}</div>
      ${repairHTML}
      <div class="photo-card-info">
        <div class="photo-card-name">${i.name || 'Unnamed'}</div>
        <div class="photo-card-bottom">
          <span class="photo-card-stage ${stageCls}">${stageLabel}</span>
          <span class="photo-card-consigner">${i.consigner || ''}</span>
        </div>
      </div>
    `;

    div.onclick = () => { window.location.href = '/item.html?id=' + i.id; };
    grid.appendChild(div);
  });
}

async function load() {
  const res = await fetch('/items');
  const items = await res.json();
  allItems = items.filter(i => i.code === code);

  document.getElementById('consignerName').innerText =
    allItems[0]?.consigner || code || 'Consigner';

  render();
}

load();
</script>

<script src="/nav.js"></script>
</body>
</html>
